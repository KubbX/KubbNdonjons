// HELPERS MULTICLASSE
// ============================================================
function getClasses(d) {
  if (d.classes && d.classes.length) return d.classes;
  if (d.class) return [{ name: d.class, level: d.level || 1 }];
  return [];
}
function totalLevel(d) {
  return getClasses(d).reduce((sum, c) => sum + c.level, 0) || d.level || 1;
}
function classesDisplay(d) {
  const cls = getClasses(d);
  if (cls.length === 0) return d.class || '—';
  if (cls.length === 1) return cls[0].name;
  return cls.map(c => `${c.name} ${c.level}`).join(' / ');
}
function classesDisplayFull(d) {
  const cls = getClasses(d);
  if (cls.length === 0) return (d.class || '—') + ' Niv.' + (d.level || 1);
  return cls.map(c => `${c.name} ${c.level}`).join(' / ');
}
function buildHitDiceStr(d) {
  const cls = getClasses(d);
  if (cls.length === 0) return d.hitDice || '1d8';
  return cls.map(c => {
    const clData = CLASSES[c.name];
    return `${c.level}d${clData ? clData.hd : 8}`;
  }).join(' + ');
}

          onchange="window._manualStat('${s}',this.value)">
        <span class="pb-mod">(mod: ${mod(wizardData.stats[s])>=0?'+':''}${mod(wizardData.stats[s])})</span>
      </div>`).join('')}

};
 
window._pbAdjust = (stat, delta) => {
  const costs = {8:0,9:1,10:2,11:3,12:4,13:5,14:7,15:9};
  const cur = wizardData.stats[stat];
  const nv = Math.max(8, Math.min(15, cur + delta));
  const diff = (costs[nv]||0) - (costs[cur]||0);
  if(diff > 0 && wizardData.pointsLeft < diff) return;
  wizardData.stats[stat] = nv;
  wizardData.pointsLeft -= diff;
  document.getElementById(`pb_${stat}`).textContent = nv;
  document.getElementById('pbLeft').textContent = wizardData.pointsLeft;
};
window._assignStandard = (stat, val) => {
  wizardData.standardAssign[stat] = parseInt(val);
  wizardData.stats = {...wizardData.standardAssign};
};
window._manualStat = (stat, val) => { wizardData.stats[stat] = parseInt(val)||8; };

    </div>`;
 
  // Store computed values
  wizardData._finalStats = finalStats;
  wizardData._hpMax = hpMax;
  wizardData._acBase = acBase;
}
 
window._wizardPrev = () => {
  collectCurrentStep();
  wizardStep--;
  renderWizardStep();
};
 
window._wizardNext = async () => {
  collectCurrentStep();
  if(wizardStep === 1 && !wizardData.name) { alert("Donne un nom à ton héros !"); return; }
  if(wizardStep === 2 && !wizardData.race) { alert("Choisis une race !"); return; }
  if(wizardStep === 3 && !wizardData.class) { alert("Choisis une classe !"); return; }
 
  if(wizardStep < WIZARD_STEPS) {
    wizardStep++;
    renderWizardStep();
  } else {
    await saveNewCharacter();
  }
};
 
function collectCurrentStep() {
  if(wizardStep === 1) {
    wizardData.name = document.getElementById('w_name')?.value || '';
    wizardData.age = document.getElementById('w_age')?.value || '';
    wizardData.gender = document.getElementById('w_gender')?.value || '';
    wizardData.alignment = document.getElementById('w_alignment')?.value || '';
    wizardData.background = document.getElementById('w_background')?.value || '';
    wizardData.ideals = document.getElementById('w_ideals')?.value || '';
    wizardData.bonds = document.getElementById('w_bonds')?.value || '';
    wizardData.flaws = document.getElementById('w_flaws')?.value || '';
    wizardData.personality = document.getElementById('w_personality')?.value || '';
  } else if(wizardStep === 2) {
    wizardData.race = document.getElementById('w_race')?.value || '';
    wizardData.subrace = document.getElementById('w_subrace')?.value || '';
  } else if(wizardStep === 3) {
    wizardData.class = document.getElementById('w_class')?.value || '';
  } else if(wizardStep === 4) {
    wizardData.statMethod = document.getElementById('w_statMethod')?.value || 'pointbuy';
  } else if(wizardStep === 5) {
    wizardData.appearance = document.getElementById('w_appearance')?.value || '';
    wizardData.backstory = document.getElementById('w_backstory')?.value || '';
  }
}
 
async function saveNewCharacter() {
  const rKey = wizardData.race;
  const srKey = wizardData.subrace;
  const cKey = wizardData.class;
  const rData = RACES[rKey] || {};
  const srData = srKey && rData.subraces ? rData.subraces[srKey] : null;
  const clData = CLASSES[cKey] || { hd:8, saves:[], skills:[] };
 
  const raceBonuses = srData?.stats || rData.stats || {};
  const finalStats = {};
  ['str','dex','con','int','wis','cha'].forEach(s => {
    finalStats[s] = (wizardData.stats[s]||8) + (raceBonuses[s]||0);
  });
 
  const conMod = mod(finalStats.con);
  const hpMax = clData.hd + conMod + (srData?.hpBonus||0);
  const profBonusVal = 2;
 
  // Skills proficiencies
  const allSkillProf = [...(wizardData.classSkills||[])];
  if(wizardData.background && BACKGROUNDS[wizardData.background]) {
    BACKGROUNDS[wizardData.background].skills.forEach(s => { if(!allSkillProf.includes(s)) allSkillProf.push(s); });
  }
  const skillProf = {};
  allSkillProf.forEach(s => skillProf[s] = 'prof');
 
  const saves = {};
  clData.saves.forEach(s => saves[s] = true);
 
  const newChar = {
    owner: currentUid,
    // Identité
    name: wizardData.name,
    age: wizardData.age||'',
    gender: wizardData.gender||'',
    alignment: wizardData.alignment||'',
    background: wizardData.background||'',
    ideals: wizardData.ideals||'',
    bonds: wizardData.bonds||'',
    flaws: wizardData.flaws||'',
    personality: wizardData.personality||'',
    appearance: wizardData.appearance||'',
    backstory: wizardData.backstory||'',
    // Identité de classe/race
    race: rKey,
    subrace: srKey||'',
    class: cKey,
    classes: [{ name: cKey, level: 1 }],
    level: 1,
    xp: 0,
    // Stats
    stats: finalStats,
    // Combat
    hp: hpMax, hpMax,
    tmpHp: 0,
    ac: 10 + mod(finalStats.dex),
    speed: rData.speed||9,
    initiative: mod(finalStats.dex),
    profBonus: profBonusVal,
    hitDice: `1d${clData.hd}`,
    deathSaves: { success:0, fail:0 },
    // Sauvegardes
    saveProficiencies: saves,
    // Compétences
    skillProficiencies: skillProf,
    // Inventaire
    cp:0, sp:0, ep:0, gp:10, pp:0,
    equipment: clData.equipment||'',
    weapons: '',
    armor: '',
    // Sorts
    spellcaster: clData.spellcaster||false,
    spellAbility: clData.spellAbility||'',
    spellAttackBonus: clData.spellcaster ? (profBonusVal + mod(finalStats[clData.spellAbility]||8)) : 0,
    spellSaveDC: clData.spellcaster ? (8 + profBonusVal + mod(finalStats[clData.spellAbility]||8)) : 0,
    spells: {},
    // Traits
    features: (clData.features||[]).filter(f=>f.lvl<=1).map(f=>({name:f.name,desc:f.desc})),
    traits: [...(rData.traits||[]),...(srData?.traits||[])],
    // Méta
    inspiration: false,
    notes: '',
    createdAt: new Date().toISOString()
  };
 
  await addDoc(collection(db, "characters"), newChar);
  window._closeForge();
}

async function loadCharacterList() {
  const q = query(collection(db, "characters"), where("owner", "==", currentUid));
  onSnapshot(q, (snapshot) => {
    const list = document.getElementById('charList');
    list.innerHTML = '';
    if(snapshot.empty) {
      list.innerHTML = '<p style="color:#888;text-align:center;margin-top:30px">Aucun personnage. Crée ton premier héros !</p>';
      return;
    }
    snapshot.forEach(docSnap => {
      const d = docSnap.data();
      const tLvl = totalLevel(d);
      const card = document.createElement('div');
      card.className = 'char-card';
      card.innerHTML = `
        <div class="char-card-main" onclick="window._selectChar('${docSnap.id}')">
          <div class="char-card-name">${d.name}</div>
          <div class="char-card-info">${d.subrace?d.subrace+' ':''} ${d.race||'—'} · ${classesDisplayFull(d)} (Niv.${tLvl})</div>
          <div class="char-card-stats">❤️ ${d.hp}/${d.hpMax} · 🛡 CA ${d.ac} · ${d.alignment||'—'}</div>
        </div>
        <div class="char-card-id">
          <small>ID : ${docSnap.id}</small>
          <button class="btn-copy" onclick="navigator.clipboard.writeText('${docSnap.id}');this.textContent='✓ Copié'">Copier ID</button>
        </div>`;
      list.appendChild(card);
    });
  });
}
 
window._selectChar = (id) => {
  activeCharId = id;
  if(activeCharUnsubscribe) activeCharUnsubscribe();
  activeCharUnsubscribe = onSnapshot(doc(db, "characters", id), (snap) => {
    if(!snap.exists()) return;
    renderCharSheet(snap.id, snap.data());
  });
  window._showTab('tab-sheet');
};

function mod(score) { return Math.floor((score - 10) / 2); }
function fmtMod(score) { const m = mod(score); return (m>=0?'+':'')+m; }
function profBonus(level) { return PROF_BONUS[(level||1)-1] || 2; }
 
function renderCharSheet(id, d) {
  const tLvl = totalLevel(d);

  function skillBonus(skill) {
    const s = SKILLS_LIST.find(x=>x.name===skill);
    if(!s) return 0;
    const base = mod(stats[s.stat]||10);
    const prof = d.skillProficiencies?.[skill];
    if(prof==='expert') return base + pb*2;
    if(prof==='prof') return base + pb;
    return base;
  }
  function saveBonus(stat) {
    const base = mod(stats[stat]||10);
    return d.saveProficiencies?.[stat] ? base + pb : base;

  function fmtB(v) { return (v>=0?'+':'')+v; }
 
  sheet.innerHTML = `

      </div>

  <div class="sheet-body">

async function startInlineEdit(el, charId, charData) {
  if(el.querySelector('input,textarea')) return;
  const field = el.dataset.field;
  const type = el.dataset.type;
  const currentVal = getNestedVal(charData, field);
 
  let input;
  if(type === 'textarea') {
    input = document.createElement('textarea');
    input.rows = 3;
  } else {
    input = document.createElement('input');
    input.type = type==='number'?'number':'text';
  }
  input.value = type==='bool' ? (currentVal?'true':'false') : (currentVal||'');
  input.className = 'inline-input';
  const orig = el.innerHTML;
  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
 
  const save = async () => {
    let val = input.value;
    if(type==='number') val = parseFloat(val)||0;
    if(type==='bool') val = (val==='true'||val==='★'||val===true);
    const update = buildNestedUpdate(field, val);
    try { await updateDoc(doc(db, "characters", charId), update); } catch(e) { el.innerHTML = orig; }
  };
 
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if(e.key==='Enter' && type!=='textarea') { e.preventDefault(); input.blur(); } if(e.key==='Escape') { el.innerHTML = orig; } });
}
 
function getNestedVal(obj, path) {
  return path.split('.').reduce((o,k) => o?.[k], obj);
}
function buildNestedUpdate(field, val) {
  return { [field]: val };
}

function gatherLevelUpInfo(className, newClassLevel, charData) {
  const clData = CLASSES[className];
  if (!clData) return { baseFeatures:[], subclassFeatures:[], isAsiLevel:false, subclassLevel:false, subclassData:null };
  const baseFeatures = (clData.features||[]).filter(f => f.lvl === newClassLevel);
  const asiLevels = getAsiLevels(className);
  const isAsiLevel = asiLevels.includes(newClassLevel);
  const sc = SUBCLASSES[className];
  const subclassLevel = sc && newClassLevel === sc.level;
  const chosenSubclass = charData?.subclasses?.[className];
  let subclassFeatures = [];
  if (sc && chosenSubclass && sc.options[chosenSubclass]) {
    subclassFeatures = sc.options[chosenSubclass].features.filter(f => f.lvl === newClassLevel);
  }
  return { baseFeatures, subclassFeatures, isAsiLevel, subclassLevel, subclassData: sc };
}

window._renderLevelUpDetails = () => {
  const d = window._lvlupCharData; if (!d) return;
  const chosenClass = document.getElementById('lvlup_class')?.value;
  const hpMode = document.getElementById('lvlup_hp_mode')?.value || 'average';
  const clData = CLASSES[chosenClass]; if (!clData) return;
  const classes = getClasses(d);
  const existing = classes.find(c => c.name === chosenClass);
  const newClassLevel = existing ? existing.level + 1 : 1;
  const newTotalLevel = totalLevel(d) + 1;
  const newPB = PROF_BONUS[newTotalLevel - 1] || 2;
  const conMod = mod(d.stats?.con || 10);
  const isMulticlass = !existing;
  const info = gatherLevelUpInfo(chosenClass, newClassLevel, d);
  const sc = SUBCLASSES[chosenClass];

  let hpGain, hpText;
  if (hpMode === 'average') { hpGain = Math.ceil(clData.hd/2)+1+conMod; hpText = `${Math.ceil(clData.hd/2)+1}+${conMod}(CON) = <strong>${hpGain}</strong>`; }
  else if (hpMode === 'max') { hpGain = clData.hd+conMod; hpText = `${clData.hd}+${conMod}(CON) = <strong>${hpGain}</strong>`; }
  else { hpText = `1d${clData.hd}+${conMod}(CON) = <strong>aléatoire</strong>`; hpGain = null; }

  let html = `<div class="lvlup-section"><div class="lvlup-header">\uD83D\uDCCA Résumé</div><div class="lvlup-body">`;
  if (isMulticlass) html += `<div style="color:var(--gold);font-weight:600;margin-bottom:6px">\u2694 Nouveau multiclassage en ${chosenClass}</div>`;
  html += `<div class="lvlup-row"><span>Niveau total</span><strong>${totalLevel(d)} \u2192 ${newTotalLevel}</strong></div>`;
  html += `<div class="lvlup-row"><span>${chosenClass}</span><strong>Niv.${existing?existing.level:0} \u2192 ${newClassLevel}</strong></div>`;
  html += `<div class="lvlup-row"><span>Bonus maîtrise</span><strong>+${profBonus(totalLevel(d))} \u2192 +${newPB}</strong></div>`;
  html += `<div class="lvlup-row"><span>PV gagnés</span>${hpText}</div>`;
  html += `<div class="lvlup-row"><span>Dé de vie</span><strong>+1d${clData.hd}</strong></div></div></div>`;

  // Subclass selection
  if (info.subclassLevel && sc) {
    const already = d.subclasses?.[chosenClass];
    if (!already) {
      html += `<div class="lvlup-section"><div class="lvlup-header">\uD83C\uDFF0 ${sc.label}</div><div class="lvlup-body">`;
      html += `<p style="font-size:0.85rem;color:#666;margin-bottom:8px">Choisissez votre ${sc.label.toLowerCase()} :</p>`;
      html += `<select id="lvlup_subclass" onchange="window._updateSubclassPreview()"><option value="">— Choisir —</option>`;
      Object.keys(sc.options).forEach(o => { html += `<option value="${o}">${o}</option>`; });
      html += `</select><div id="subclass_preview" style="margin-top:8px"></div></div></div>`;
    }
  }
  // Existing subclass features for this level
  if (sc && d.subclasses?.[chosenClass] && !info.subclassLevel) {
    const subName = d.subclasses[chosenClass];
    const subFeats = sc.options[subName]?.features?.filter(f => f.lvl === newClassLevel) || [];
    if (subFeats.length) {
      html += `<div class="lvlup-section"><div class="lvlup-header">\uD83C\uDFF0 ${subName}</div><div class="lvlup-body">`;
      subFeats.forEach(f => { html += `<div class="lvlup-feature"><strong>${f.name}</strong><div class="lvlup-feature-desc">${f.desc}</div></div>`; });
      html += `</div></div>`;
    }
  }

  // Base class features
  if (info.baseFeatures.length) {
    html += `<div class="lvlup-section"><div class="lvlup-header">\u2694 Aptitudes de classe</div><div class="lvlup-body">`;
    info.baseFeatures.forEach(f => { html += `<div class="lvlup-feature"><strong>${f.name}</strong><div class="lvlup-feature-desc">${f.desc}</div></div>`; });
    html += `</div></div>`;
  }

  // ASI / Feat
  if (info.isAsiLevel) {
    html += `<div class="lvlup-section"><div class="lvlup-header">\u2B50 Amélioration / Don</div><div class="lvlup-body">`;
    html += `<select id="lvlup_asi_mode" onchange="window._toggleAsiMode()"><option value="asi">+2 à une carac. ou +1 à deux</option><option value="feat">Choisir un don</option></select>`;
    html += `<div id="asi_details" style="margin-top:10px"><div class="field-row">`;
    html += `<div class="field-group"><label>Caractéristique 1</label><select id="lvlup_asi_stat1"><option value="">—</option>`;
    ['str','dex','con','int','wis','cha'].forEach(s => { html += `<option value="${s}">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]} (${d.stats?.[s]||10})</option>`; });
    html += `</select></div><div class="field-group"><label>Bonus</label><select id="lvlup_asi_val1" onchange="document.getElementById('asi_row2').style.display=this.value==='1'?'grid':'none'"><option value="2" selected>+2</option><option value="1">+1 (et +1 autre)</option></select></div></div>`;
    html += `<div class="field-row" id="asi_row2" style="display:none"><div class="field-group"><label>Caractéristique 2</label><select id="lvlup_asi_stat2"><option value="">—</option>`;
    ['str','dex','con','int','wis','cha'].forEach(s => { html += `<option value="${s}">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]} (${d.stats?.[s]||10})</option>`; });
    html += `</select></div><div class="field-group"><label>&nbsp;</label><span style="padding-top:6px;display:block">+1</span></div></div></div>`;
    html += `<div id="feat_details" style="display:none;margin-top:10px"><div class="field-group"><label>Nom du don</label><input id="lvlup_feat_name" type="text" placeholder="Ex: Sentinelle, Alerte..."></div><div class="field-group"><label>Description</label><textarea id="lvlup_feat_desc" rows="2" placeholder="Effets du don..."></textarea></div></div>`;
    html += `</div></div>`;

  if (!info.baseFeatures.length && !info.subclassFeatures.length && !info.isAsiLevel && !info.subclassLevel) {
    html += `<div class="lvlup-section"><div class="lvlup-header">\uD83D\uDCCB Aptitudes</div><div class="lvlup-body"><em style="color:#888">Pas de nouvelle aptitude à ce niveau (vérifiez les emplacements de sorts).</em></div></div>`;
  }

  document.getElementById('lvlup_details').innerHTML = html;
};

window._updateSubclassPreview = () => {
  const chosen = document.getElementById('lvlup_subclass')?.value;
  const prev = document.getElementById('subclass_preview');
  if (!prev) return;
  const chosenClass = document.getElementById('lvlup_class')?.value;
  const sc = SUBCLASSES[chosenClass];
  if (!chosen || !sc?.options[chosen]) { prev.innerHTML = ''; return; }
  const classes = getClasses(window._lvlupCharData);
  const existing = classes.find(c => c.name === chosenClass);
  const newClassLevel = existing ? existing.level + 1 : 1;
  const feats = sc.options[chosen].features.filter(f => f.lvl === newClassLevel);
  const allFeats = sc.options[chosen].features;
  let html = '';
  if (feats.length) {
    html += feats.map(f => `<div class="lvlup-feature"><strong>${f.name}</strong><div class="lvlup-feature-desc">${f.desc}</div></div>`).join('');
  }
  html += `<details style="margin-top:8px"><summary style="cursor:pointer;font-size:0.78rem;color:var(--gold)">Voir toutes les aptitudes futures</summary>`;
  html += allFeats.filter(f=>f.lvl>newClassLevel).map(f => `<div style="font-size:0.8rem;margin:3px 0;color:#888"><strong>Niv.${f.lvl} — ${f.name}:</strong> ${f.desc}</div>`).join('');
  html += `</details>`;
  prev.innerHTML = html;
};

window._confirmLevelUp = async (charId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const classes = getClasses(d);
  const chosenClass = document.getElementById('lvlup_class').value;
  const hpMode = document.getElementById('lvlup_hp_mode').value;
  const clData = CLASSES[chosenClass]; if (!clData) return;

  const newClasses = classes.map(c => ({...c}));
  const existing = newClasses.find(c => c.name === chosenClass);
  let newClassLevel;
  if (existing) { existing.level += 1; newClassLevel = existing.level; }
  else { newClasses.push({ name: chosenClass, level: 1 }); newClassLevel = 1; }
  const newTotalLevel = newClasses.reduce((s, c) => s + c.level, 0);
  const newPB = PROF_BONUS[newTotalLevel - 1] || 2;

  const conMod = mod(d.stats?.con || 10);
  let hpGain;
  if (hpMode === 'average') hpGain = Math.ceil(clData.hd/2)+1+conMod;
  else if (hpMode === 'max') hpGain = clData.hd+conMod;
  else hpGain = Math.floor(Math.random()*clData.hd)+1+conMod;
  hpGain = Math.max(1, hpGain);

  const info = gatherLevelUpInfo(chosenClass, newClassLevel, d);
  let newFeatures = info.baseFeatures.map(f => ({name:f.name, desc:f.desc, src:chosenClass, lvl:newClassLevel}));

  const newSubclasses = {...(d.subclasses || {})};
  const sc = SUBCLASSES[chosenClass];
  const subSel = document.getElementById('lvlup_subclass');
  if (subSel && subSel.value) {
    newSubclasses[chosenClass] = subSel.value;
    const subFeats = sc.options[subSel.value]?.features?.filter(f=>f.lvl===newClassLevel) || [];
    newFeatures.push(...subFeats.map(f=>({name:`${f.name} (${subSel.value})`,desc:f.desc,src:chosenClass,lvl:newClassLevel})));
  } else if (d.subclasses?.[chosenClass] && sc) {
    const subName = d.subclasses[chosenClass];
    const subFeats = sc.options[subName]?.features?.filter(f=>f.lvl===newClassLevel) || [];
    newFeatures.push(...subFeats.map(f=>({name:`${f.name} (${subName})`,desc:f.desc,src:chosenClass,lvl:newClassLevel})));
  }

  const newStats = {...(d.stats || {})};
  if (info.isAsiLevel) {
    const asiMode = document.getElementById('lvlup_asi_mode')?.value;
    if (asiMode === 'feat') {
      const fn = document.getElementById('lvlup_feat_name')?.value||'Don';
      const fd = document.getElementById('lvlup_feat_desc')?.value||'';
      newFeatures.push({name:`Don: ${fn}`,desc:fd,src:chosenClass,lvl:newClassLevel});
    } else {
      const s1 = document.getElementById('lvlup_asi_stat1')?.value;
      const v1 = parseInt(document.getElementById('lvlup_asi_val1')?.value)||2;
      if (s1) { newStats[s1] = Math.min(20,(newStats[s1]||10)+v1);
        if (v1===1) { const s2=document.getElementById('lvlup_asi_stat2')?.value; if(s2) newStats[s2]=Math.min(20,(newStats[s2]||10)+1); }
      }
      const desc = s1 ? `${s1.toUpperCase()} +${v1}${v1===1&&document.getElementById('lvlup_asi_stat2')?.value?', '+document.getElementById('lvlup_asi_stat2').value.toUpperCase()+' +1':''}` : 'Amélioration';
      newFeatures.push({name:'Amélioration de caractéristique',desc,src:chosenClass,lvl:newClassLevel});
    }
  }

  const hitDiceStr = newClasses.map(c=>`${c.level}d${(CLASSES[c.name]||{hd:8}).hd}`).join(' + ');
  const classDisplayStr = newClasses.length===1 ? newClasses[0].name : newClasses.map(c=>`${c.name} ${c.level}`).join(' / ');
  let spellUpdate = {};
  const casterClasses = newClasses.filter(c=>CLASSES[c.name]?.spellcaster);
  if (casterClasses.length>0) { const pc=casterClasses[0]; const pcD=CLASSES[pc.name];
    spellUpdate={spellcaster:true,spellAbility:pcD.spellAbility,spellAttackBonus:newPB+mod(newStats[pcD.spellAbility]||10),spellSaveDC:8+newPB+mod(newStats[pcD.spellAbility]||10)};
  }

  const update = {classes:newClasses,class:classDisplayStr,level:newTotalLevel,stats:newStats,
    hpMax:(d.hpMax||0)+hpGain,hp:(d.hp||0)+hpGain,profBonus:newPB,hitDice:hitDiceStr,
    features:[...(d.features||[]),...newFeatures],subclasses:newSubclasses,...spellUpdate};
  await updateDoc(doc(db,"characters",charId),update);

  const content = document.getElementById('forgeContent');
  content.innerHTML = `<h3 class="step-title">\u2713 Niveau augmenté !</h3><div class="info-box">
    <strong>${d.name}</strong> \u2192 <strong>${classDisplayStr}</strong> — Niv.${newTotalLevel}<br>
    PV: <strong>+${hpGain}</strong> (max: ${(d.hpMax||0)+hpGain})
    ${newFeatures.length?`<br><br><strong>Nouvelles aptitudes :</strong>${newFeatures.map(f=>`<div class="lvlup-feature" style="margin:4px 0"><strong>${f.name}:</strong> ${f.desc}</div>`).join('')}`:''}
  </div><button class="btn-gold" style="margin-top:16px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">FERMER</button>`;
  window._lvlupCharData = null;
};

  card.innerHTML = `

window._gmHeal = async (id) => {
  const val = parseInt(document.getElementById(`gmhp_${id}`)?.value)||0;
  const snap = await getDoc(doc(db, "characters", id));
  if(!snap.exists()) return;
  const d = snap.data();
  const newHp = Math.min(d.hpMax, (d.hp||0) + Math.abs(val));
  await updateDoc(doc(db, "characters", id), {hp: newHp});
};
window._gmDamage = async (id) => {
  const val = parseInt(document.getElementById(`gmhp_${id}`)?.value)||0;
  const snap = await getDoc(doc(db, "characters", id));
  if(!snap.exists()) return;
  const d = snap.data();
  const newHp = Math.max(0, (d.hp||0) - Math.abs(val));
  await updateDoc(doc(db, "characters", id), {hp: newHp});
};
window._saveGMNotes = async (id) => {
  const notes = document.getElementById(`gmnotes_${id}`)?.value||'';
  await updateDoc(doc(db, "characters", id), {gmNotes: notes});
};

let compendiumUnsubscribe = null;
let compendiumCustomResources = [];

function loadCompendium() {
  if (compendiumUnsubscribe) compendiumUnsubscribe();
  const q = query(collection(db, "resources"), where("owner", "in", [currentUid, "system"]));
  compendiumUnsubscribe = onSnapshot(q, (snapshot) => {
    compendiumCustomResources = [];
    snapshot.forEach(docSnap => {
      compendiumCustomResources.push({ id: docSnap.id, ...docSnap.data() });
    });
    // Re-render if compendium tab is active
    if (document.getElementById('tab-compendium')?.classList.contains('active')) {
      renderCompendiumList(window._currentCompCategory || 'armor');
    }
  });
}

async function addCustomResource(category, data) {
  const resource = { type: category, owner: currentUid, ...data, createdAt: new Date().toISOString() };
  await addDoc(collection(db, "resources"), resource);
}

async function deleteCustomResource(docId) {
  if (!confirm("Supprimer cette ressource personnalisée ?")) return;
  await deleteDoc(doc(db, "resources", docId));
}

window._currentCompCategory = 'armor';
window._compSearchQuery = '';

window._showCompendium = (catId) => {
  window._currentCompCategory = catId || 'armor';
  window._compSearchQuery = '';
  const searchEl = document.getElementById('compSearch');
  if (searchEl) searchEl.value = '';
  renderCompendiumList(window._currentCompCategory);
  // Update active category button
  document.querySelectorAll('.comp-cat-btn').forEach(b => b.classList.remove('comp-cat-active'));
  const activeBtn = document.querySelector(`.comp-cat-btn[data-cat="${catId}"]`);
  if (activeBtn) activeBtn.classList.add('comp-cat-active');
};

window._compFilter = () => {
  window._compSearchQuery = (document.getElementById('compSearch')?.value || '').toLowerCase();
  renderCompendiumList(window._currentCompCategory);
};

function getAllResourcesForCategory(catId) {
  const builtIn = (COMPENDIUM_DATA[catId] || []).map(r => ({ ...r, _source: 'builtin' }));
  const custom = compendiumCustomResources.filter(r => r.type === catId).map(r => ({ ...r, _source: 'custom', _docId: r.id }));
  return [...builtIn, ...custom];
}

function renderCompendiumList(catId) {
  const listEl = document.getElementById('compList');
  if (!listEl) return;
  const allRes = getAllResourcesForCategory(catId);
  const q = window._compSearchQuery;
  const filtered = q ? allRes.filter(r => r.name.toLowerCase().includes(q)) : allRes;

  if (filtered.length === 0) {
    listEl.innerHTML = `<p style="color:#888;text-align:center;margin-top:30px;font-style:italic">Aucune ressource trouvée${q ? ' pour "' + q + '"' : ''}.</p>`;
    return;
  }

  listEl.innerHTML = filtered.map((r, i) => {
    const isCustom = r._source === 'custom';
    return `<div class="comp-card" onclick="window._showResourceDetail('${catId}',${i},${isCustom?`'${r._docId}'`:'null'})">
      <div class="comp-card-main">
        <div class="comp-card-name">${r.name} ${isCustom ? '<span class="comp-homebrew">Homebrew</span>' : ''}</div>
        <div class="comp-card-sub">${getResourceSubtitle(catId, r)}</div>
      </div>
      ${isCustom ? `<button class="btn-remove" onclick="event.stopPropagation();deleteCustomResource('${r._docId}')">✕</button>` : ''}
    </div>`;
  }).join('');
}

function getResourceSubtitle(catId, r) {
  switch (catId) {
    case 'armor': return `${r.type||''} · CA ${r.ac||'—'} · ${r.cost||''}`;
    case 'weapon': return `${r.type||''} · ${r.damage||''} · ${r.cost||''}`;
    case 'item': return `${r.type||''} · ${r.rarity||'—'} · ${r.cost||''}`;
    case 'feat': return `${r.prereq ? 'Prérequis: '+r.prereq : 'Aucun prérequis'}`;
    case 'monster': return `RC ${r.cr||'?'} · ${r.type||''} · ${r.size||''}`;
    case 'background': return `Compétences: ${r.skills||'—'}`;
    default: return r.source || '';
  }
}

window._showResourceDetail = (catId, index, customDocId) => {
  const allRes = getAllResourcesForCategory(catId);
  const r = customDocId ? allRes.find(x => x._docId === customDocId) : allRes[index];
  if (!r) return;

  const content = document.getElementById('forgeContent');
  const progressEl = document.getElementById('forgeProgress');
  progressEl.innerHTML = `<div class="progress-step active">${COMPENDIUM_CATEGORIES.find(c=>c.id===catId)?.icon||'📋'}</div>`;
  document.getElementById('forgePrev').style.visibility = 'hidden';
  document.getElementById('forgeNext').style.display = 'none';

  let html = `<h3 class="step-title">${r.name}</h3>`;
  html += `<div class="comp-detail">`;
  html += renderResourceDetail(catId, r);
  html += `</div>`;

  // Add to character button
  if (activeCharId) {
    html += `<div style="margin-top:14px"><button class="btn-gold" onclick="window._addResourceToChar('${catId}',\`${encodeURIComponent(JSON.stringify({name:r.name,type:r.type||'',detail:getResourceSubtitle(catId,r)}))}\`)">+ Ajouter à la fiche active</button></div>`;
  }

  html += `<button class="btn-prev" style="margin-top:10px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">Fermer</button>`;
  content.innerHTML = html;
  document.getElementById('forgeOverlay').style.display = 'flex';
};

function renderResourceDetail(catId, r) {
  let html = '<div class="comp-detail-grid">';
  const skip = ['_source','_docId','id','owner','createdAt','type'];
  const labelMap = {name:'Nom',ac:'Classe d\'armure',type:'Type',strength:'Force requise',stealth:'Discrétion',cost:'Coût',weight:'Poids',source:'Source',damage:'Dégâts',properties:'Propriétés',desc:'Description',prereq:'Prérequis',rarity:'Rareté',cr:'Rang de dangerosité',size:'Taille',hp:'Points de vie',speed:'Vitesse',attacks:'Attaques',traits:'Traits',abilities:'Caractéristiques',skills:'Compétences',languages:'Langues',tools:'Outils',equipment:'Équipement',feature:'Aptitude'};

  for (const [key, val] of Object.entries(r)) {
    if (skip.includes(key) || val === '' || val === '—' || val === 0 || val === null || val === undefined) continue;
    const label = labelMap[key] || key;
    let display = val;
    if (typeof val === 'object' && !Array.isArray(val)) {
      display = Object.entries(val).map(([k,v])=>`${k.toUpperCase()}: ${v}`).join(', ');
    }
    html += `<div class="comp-detail-row"><span class="comp-detail-label">${label}</span><span class="comp-detail-val">${display}</span></div>`;
  }
  html += '</div>';
  return html;
}

window._addResourceToChar = async (catId, encodedData) => {
  if (!activeCharId) { alert("Sélectionnez d'abord un personnage."); return; }
  // Redirect to the picker which handles structured adding
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
  window._pickFromCompendium(activeCharId, catId);
};

// ============================================================
// FICHE ↔ COMPENDIUM — PICKER & INVENTAIRE
// ============================================================

// Open a compendium picker scoped to a category, from within the character sheet
window._pickFromCompendium = (charId, catId) => {
  const content = document.getElementById('forgeContent');
  document.getElementById('forgeProgress').innerHTML = `<div class="progress-step active">${COMPENDIUM_CATEGORIES.find(c=>c.id===catId)?.icon||'📋'}</div>`;
  document.getElementById('forgePrev').style.visibility = 'hidden';
  document.getElementById('forgeNext').style.display = 'none';

  const allRes = getAllResourcesForCategory(catId);

  let html = `<h3 class="step-title">Choisir: ${COMPENDIUM_CATEGORIES.find(c=>c.id===catId)?.name||catId}</h3>`;
  html += `<div class="field-group"><input id="picker_search" type="text" placeholder="Rechercher..." oninput="window._filterPicker('${charId}','${catId}')"></div>`;
  html += `<div id="picker_list" class="comp-list" style="max-height:50vh;overflow-y:auto">`;
  html += allRes.map((r,i) => `
    <div class="comp-card" onclick="window._pickResource('${charId}','${catId}',${i})">
      <div class="comp-card-main">
        <div class="comp-card-name">${r.name} ${r._source==='custom'?'<span class="comp-homebrew">HB</span>':''}</div>
        <div class="comp-card-sub">${getResourceSubtitle(catId, r)}</div>
      </div>
    </div>`).join('');
  html += `</div>`;
  html += `<button class="btn-prev" style="margin-top:12px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">Annuler</button>`;

  content.innerHTML = html;
  document.getElementById('forgeOverlay').style.display = 'flex';
};

window._filterPicker = (charId, catId) => {
  const q = (document.getElementById('picker_search')?.value||'').toLowerCase();
  const allRes = getAllResourcesForCategory(catId);
  const filtered = q ? allRes.filter(r => r.name.toLowerCase().includes(q)) : allRes;
  const list = document.getElementById('picker_list');
  list.innerHTML = filtered.map((r,i) => {
    const origIdx = allRes.indexOf(r);
    return `<div class="comp-card" onclick="window._pickResource('${charId}','${catId}',${origIdx})">
      <div class="comp-card-main">
        <div class="comp-card-name">${r.name}</div>
        <div class="comp-card-sub">${getResourceSubtitle(catId, r)}</div>
      </div>
    </div>`;
  }).join('') || '<p style="color:#888;text-align:center;margin:20px;font-style:italic">Aucun résultat</p>';
};

window._pickResource = async (charId, catId, index) => {
  const allRes = getAllResourcesForCategory(catId);
  const r = allRes[index];
  if (!r) return;

  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const stats = d.stats||{str:10,dex:10,con:10,int:10,wis:10,cha:10};
  const pb = profBonus(totalLevel(d));
  let update = {};

  if (catId === 'weapon') {
    // Compute attack bonus and damage
    const isFinesse = (r.properties||'').toLowerCase().includes('finesse');
    const isRanged = (r.type||'').toLowerCase().includes('distance');
    const statMod = isRanged ? mod(stats.dex) : (isFinesse ? Math.max(mod(stats.str), mod(stats.dex)) : mod(stats.str));
    const atkBonus = statMod + pb;
    const dmgBonus = statMod;
    const atk = `+${atkBonus}`;
    const dmg = `${r.damage||'?'}${dmgBonus>=0?'+':''}${dmgBonus}`;
    const weapons = [...(d.inventory_weapons||[])];
    weapons.push({ name: r.name, atk, dmg, properties: r.properties||'', type: r.type||'' });
    update.inventory_weapons = weapons;
  }
  else if (catId === 'armor') {
    update.equipped_armor = { name: r.name, ac: r.ac||'?', type: r.type||'', stealth: r.stealth||'' };
    // Recalculate AC
    const acStr = r.ac||'10';
    let newAc = 10;
    const dexMod = mod(stats.dex);
    if (r.type === 'Bouclier') {
      newAc = (d.ac||10) + 2;
    } else if (acStr.includes('mod DEX')) {
      const baseAc = parseInt(acStr)||10;
      if (acStr.includes('max 2')) newAc = baseAc + Math.min(dexMod, 2);
      else newAc = baseAc + dexMod;
    } else {
      newAc = parseInt(acStr)||10;
    }
    update.ac = newAc;
  }
  else if (catId === 'item') {
    const items = [...(d.inventory_items||[])];
    // Check if item already exists, increment qty
    const existing = items.find(it => it.name === r.name);
    if (existing) { existing.qty = (existing.qty||1) + 1; }
    else { items.push({ name: r.name, detail: r.desc||r.type||'', qty: 1, rarity: r.rarity||'' }); }
    update.inventory_items = items;
  }
  else if (catId === 'feat') {
    const feats = [...(d.features||[])];
    feats.push({ name: `Don: ${r.name}`, desc: r.desc||r.prereq||'', src: 'Compendium' });
    update.features = feats;
  }
  else if (catId === 'background') {
    update.background = r.name;
  }

  if (Object.keys(update).length) {
    await updateDoc(doc(db, "characters", charId), update);
  }
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
};

// Remove an item from an inventory array field
window._removeInventoryItem = async (charId, field, index) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const arr = [...(d[field]||[])];
  arr.splice(index, 1);
  await updateDoc(doc(db, "characters", charId), { [field]: arr });
};

// Unequip armor
window._unequipArmor = async (charId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const dexMod = mod((d.stats?.dex)||10);
  await updateDoc(doc(db, "characters", charId), { equipped_armor: null, ac: 10 + dexMod });
};

// Remove a feature by index
window._removeFeature = async (charId, index) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const feats = [...(d.features||[])];
  feats.splice(index, 1);
  await updateDoc(doc(db, "characters", charId), { features: feats });
};

// ── Ajout de ressource personnalisée ──
window._openAddResource = () => {
  const catId = window._currentCompCategory;

  let fields = '';
  if (catId === 'armor') {
    fields = `
      <div class="field-group"><label>Nom *</label><input id="nr_name" type="text" placeholder="Ex: Armure magique"></div>
      <div class="field-row"><div class="field-group"><label>Type</label><select id="nr_type"><option>Légère</option><option>Moyenne</option><option>Lourde</option><option>Bouclier</option></select></div>
      <div class="field-group"><label>CA</label><input id="nr_ac" type="text" placeholder="Ex: 15 + mod DEX (max 2)"></div></div>

      <div class="field-group"><label>Discrétion</label><input id="nr_stealth" type="text" placeholder="Ex: Désavantage"></div>`;
  } else if (catId === 'weapon') {
    fields = `
      <div class="field-group"><label>Nom *</label><input id="nr_name" type="text" placeholder="Ex: Épée de feu"></div>
      <div class="field-row"><div class="field-group"><label>Type</label><select id="nr_type"><option>Simple mêlée</option><option>Simple distance</option><option>Martiale mêlée</option><option>Martiale distance</option></select></div>
      <div class="field-group"><label>Dégâts</label><input id="nr_damage" type="text" placeholder="Ex: 1d8+2 feu"></div></div>
      <div class="field-group"><label>Propriétés</label><input id="nr_properties" type="text" placeholder="Ex: Finesse, légère"></div>
      <div class="field-row"><div class="field-group"><label>Coût</label><input id="nr_cost" type="text"></div>
      <div class="field-group"><label>Poids</label><input id="nr_weight" type="text"></div></div>`;
  } else if (catId === 'item') {
    fields = `
      <div class="field-group"><label>Nom *</label><input id="nr_name" type="text"></div>
      <div class="field-row"><div class="field-group"><label>Type</label><select id="nr_type"><option>Aventurier</option><option>Outils</option><option>Potion</option><option>Objet magique</option></select></div>
      <div class="field-group"><label>Rareté</label><select id="nr_rarity"><option>Courant</option><option>Peu courant</option><option>Rare</option><option>Très rare</option><option>Légendaire</option></select></div></div>
      <div class="field-group"><label>Description</label><textarea id="nr_desc" rows="2"></textarea></div>
      <div class="field-group"><label>Coût</label><input id="nr_cost" type="text"></div>`;
  } else if (catId === 'feat') {
    fields = `
      <div class="field-group"><label>Nom *</label><input id="nr_name" type="text"></div>
      <div class="field-group"><label>Description</label><textarea id="nr_desc" rows="3"></textarea></div>
      <div class="field-group"><label>Prérequis</label><input id="nr_prereq" type="text" placeholder="Ex: Lanceur de sorts, FOR 13..."></div>`;
  } else if (catId === 'monster') {
    fields = `
      <div class="field-group"><label>Nom *</label><input id="nr_name" type="text"></div>
      <div class="field-row"><div class="field-group"><label>RC</label><input id="nr_cr" type="text" placeholder="Ex: 3"></div>
      <div class="field-group"><label>Type</label><input id="nr_type" type="text" placeholder="Ex: Mort-vivant"></div></div>
      <div class="field-row"><div class="field-group"><label>Taille</label><select id="nr_size"><option>TP</option><option>P</option><option>M</option><option>G</option><option>TG</option><option>Gig</option></select></div>
      <div class="field-group"><label>CA</label><input id="nr_ac" type="text" placeholder="Ex: 15 (naturelle)"></div></div>
      <div class="field-row"><div class="field-group"><label>PV</label><input id="nr_hp" type="text" placeholder="Ex: 52 (7d10+14)"></div>
      <div class="field-group"><label>Vitesse</label><input id="nr_speed" type="text" placeholder="Ex: 9m, vol 18m"></div></div>

      <div class="field-group"><label>Traits</label><textarea id="nr_traits" rows="2"></textarea></div>`;
  } else if (catId === 'background') {
    fields = `
      <div class="field-group"><label>Nom *</label><input id="nr_name" type="text"></div>
      <div class="field-group"><label>Compétences</label><input id="nr_skills" type="text" placeholder="Ex: Perception, Survie"></div>
      <div class="field-row"><div class="field-group"><label>Langues</label><input id="nr_languages" type="number" value="0"></div>
      <div class="field-group"><label>Outils</label><input id="nr_tools" type="text"></div></div>
      <div class="field-group"><label>Équipement</label><textarea id="nr_equipment" rows="2"></textarea></div>
      <div class="field-group"><label>Aptitude</label><textarea id="nr_feature" rows="2"></textarea></div>`;
  }

  content.innerHTML = `<h3 class="step-title">+ Nouvelle ${cat?.name?.slice(0,-1) || 'ressource'}</h3>
    ${fields}
    <div class="field-group"><label>Source</label><input id="nr_source" type="text" value="Homebrew"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-gold" onclick="window._saveNewResource('${catId}')">CRÉER</button>
      <button class="btn-prev" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">Annuler</button>
    </div>`;
  document.getElementById('forgeOverlay').style.display = 'flex';
};

window._saveNewResource = async (catId) => {
  const name = document.getElementById('nr_name')?.value?.trim();
  if (!name) { alert("Le nom est obligatoire."); return; }
  const data = { name, source: document.getElementById('nr_source')?.value || 'Homebrew' };

  // Collect all nr_ fields
  document.querySelectorAll('[id^="nr_"]').forEach(el => {
    const key = el.id.replace('nr_', '');
    if (key === 'name' || key === 'source') return;
    const val = el.tagName === 'SELECT' ? el.value : (el.type === 'number' ? parseInt(el.value)||0 : el.value.trim());
    if (val !== '' && val !== 0) data[key] = val;
  });

  await addCustomResource(catId, data);
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
};

/* ── CHARACTER SHEET ── */

/* Inline edit */

.gm-stat-label { display:block; font-family:'Cinzel'; font-size:0.58rem; color:var(--gold); }

.gm-action-label { font-size:0.78rem; font-family:'Cinzel'; color:#666; }
.gm-input { width:60px!important; padding:5px 8px!important; margin:0!important; text-align:center; }
.btn-gm-action { padding:6px 12px; border:none; cursor:pointer; font-family:'Cinzel'; font-size:0.68rem; border-radius:3px; }

/* ── COMPENDIUM ── */
#tab-compendium { background:var(--parch); min-height:100vh; }

/* Inventory items on character sheet */
.section-add-btn { float:right; background:transparent; border:1px solid rgba(184,134,11,0.5); color:var(--gold);
  padding:1px 8px; font-family:'Cinzel'; font-size:0.55rem; letter-spacing:1px; cursor:pointer; border-radius:2px; transition:all 0.2s; }

</head>
<body>
 
<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-title">GRIMOIRE</div>
    <div class="auth-sub">Compagnon de Campagne D&D 5e</div>
    <div id="authError"></div>
    <input id="authEmail" type="email" placeholder="Email">
    <input id="authPass" type="password" placeholder="Mot de passe">
    <button class="btn-gold" style="width:100%;margin-top:8px" onclick="window._doLogin()">SE CONNECTER</button>
    <button style="background:none;border:none;width:100%;color:#888;font-size:0.78rem;margin-top:10px;cursor:pointer;font-family:'Crimson Pro'" onclick="window._doSignup()">Pas encore de compte ? Créer un accès</button>
  </div>
</div>
 
<!-- APP -->
<div id="appScreen" style="display:none">
  <nav>
    <button id="navList" class="nav-active" onclick="_showTab('tab-list')">MES HÉROS</button>
    <button id="navSheet" onclick="_showTab('tab-sheet')">FICHE</button>
    <button id="navCompendium" onclick="_showTab('tab-compendium')">COMPENDIUM</button>
    <button id="navGM" onclick="_showTab('tab-gm')">MAÎTRE DU JEU</button>
    <button onclick="_doLogout()">QUITTER</button>
  </nav>
 
  <!-- Liste -->
  <div id="tab-list" class="tab-content active">
    <h2>Vos Chroniques</h2>
    <div id="charList"></div>
    <button class="btn-gold" style="margin-top:24px;width:100%;max-width:700px;display:block;margin-left:auto;margin-right:auto" onclick="window._openForge()">+ FORGER UN NOUVEAU HÉROS</button>
  </div>
 
  <!-- Fiche -->
  <div id="tab-sheet" class="tab-content">
    <div style="padding:40px;text-align:center;color:#888;font-style:italic">
      Sélectionne un personnage pour voir sa fiche
    </div>
  </div>
 
  <!-- Compendium -->
  <div id="tab-compendium" class="tab-content">
    <div class="comp-container">
      <h2>Compendium</h2>
      <div class="comp-cats" id="compCats"></div>
      <div class="comp-toolbar">
        <input id="compSearch" type="text" placeholder="Rechercher..." oninput="window._compFilter()">
        <button class="btn-gold" onclick="window._openAddResource()">+ AJOUTER</button>
      </div>
      <div id="compList" class="comp-list"></div>
    </div>
  </div>
 
  <!-- GM -->
  <div id="tab-gm" class="tab-content">
    <h2>Écran du Maître</h2>
    <div class="gm-search">
      <input id="gmSearchId" type="text" placeholder="Coller l'ID du personnage à surveiller">
      <button class="btn-gold" onclick="window._watchChar()">AJOUTER</button>
    </div>
    <div id="gmMonitor">
      <p style="color:#666;font-style:italic">Collez l'ID d'une fiche pour la surveiller en temps réel. Plusieurs personnages peuvent être affichés simultanément.</p>
    </div>
  </div>
</div>
 
<!-- WIZARD FORGE -->
<div id="forgeOverlay">
  <div class="forge-window">
    <div class="forge-top">
      <h2>⚔ La Forge du Héros</h2>
      <div id="forgeProgress" class="forge-progress"></div>
    </div>
    <div id="forgeContent"></div>
    <div class="forge-footer">
      <button id="forgePrev" class="btn-prev" onclick="window._wizardPrev()">← Précédent</button>
      <span id="forgeStepLabel" style="font-family:'Cinzel';font-size:0.7rem;color:#888;letter-spacing:1px"></span>
      <button id="forgeNext" class="btn-gold" onclick="window._wizardNext()">SUIVANT →</button>
    </div>
  </div>
</div>
 
</body>
</html>
