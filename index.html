<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimoire — D&D 5e</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, onSnapshot, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVhG8iH0KiKyvGDPH2sh37u9DLgkPUgLQ",
    authDomain: "kubbndonjons.firebaseapp.com",
    projectId: "kubbndonjons",
    storageBucket: "kubbndonjons.firebasestorage.app",
    messagingSenderId: "875521195069",
    appId: "1:875521195069:web:550930281db865a35c7e54"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Exposition des fonctions pour le script classique
  window._doSignup = async () => {
    const email = document.getElementById('authEmail').value;
    const pass = document.getElementById('authPass').value;
    try { await createUserWithEmailAndPassword(auth, email, pass); } catch(e) { alert(e.message); }
  };

  window._doLogin = async () => {
    const email = document.getElementById('authEmail').value;
    const pass = document.getElementById('authPass').value;
    try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert(e.message); }
  };

  window._doLogout = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    document.getElementById('authScreen').style.display = user ? 'none' : 'flex';
    document.getElementById('sheetScreen').style.display = user ? 'block' : 'none';
    if(user) document.getElementById('userEmail').textContent = user.email;
  });
</script>

<style>
  /* Le style que tu as déjà (extrait simplifié pour l'exemple) */
  body { background: #1a0f05; color: #f2e8d5; font-family: 'Crimson Pro', serif; display: flex; justify-content: center; padding: 20px; }
  #authScreen { display: flex; flex-direction: column; background: #f2e8d5; color: #2c1a0e; padding: 40px; border-radius: 4px; gap: 10px; margin-top: 50px; }
  #sheetScreen { display: none; width: 100%; max-width: 800px; }
  input { padding: 10px; margin-bottom: 10px; }
  button { padding: 10px; cursor: pointer; background: #2c1a0e; color: #b8860b; border: none; }
</style>
</head>
<body>

<div id="authScreen">
  <h2>⚔ Grimoire</h2>
  <input id="authEmail" type="email" placeholder="Email">
  <input id="authPass" type="password" placeholder="Mot de passe">
  <button onclick="window._doLogin()">Se connecter</button>
  <button onclick="window._doSignup()">Créer un compte</button>
</div>

<div id="sheetScreen">
  <header style="display:flex; justify-content: space-between; align-items: center;">
    <h3>Grimoire D&D 5e</h3>
    <div>
      <span id="userEmail"></span>
      <button onclick="window._doLogout()">Déconnexion</button>
    </div>
  </header>
  <div style="background: #f2e8d5; color: #2c1a0e; padding: 40px; margin-top: 20px; border-radius: 4px;">
    <h1>Fiche de Personnage</h1>
    <p>Bienvenue dans ton grimoire !</p>
  </div>
</div>

</body>
</html>
