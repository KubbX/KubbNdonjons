    {name:"Cercle magique",level:3,school:"Abjuration",time:"1 minute",range:"3m",duration:"1 heure",components:"V, S, M (sel/poudre d'argent 100 po)",classes:["Clerc","Magicien","Occultiste","Paladin"],desc:"Vous créez un cylindre d'énergie magique haut de 6 mètres et d'un rayon de 3 mètres, centré sur un point du sol que vous pouvez voir et à portée. Des runes rayonnantes apparaissent aux endroits où le cylindre s'intersecte avec le sol, ou toute autre surface. Choisissez un ou plusieurs types de créatures parmi les suivants : céleste, élémentaire, fée, fiélon ou mort-vivant. Le cercle affecte une créature d'un type choisi des manières suivantes : • La créature ne peut volontairement pénétrer dans le cylindre par des moyens non magiques. Si la créature tente d'utiliser la téléportation ou le voyage extraplanaire pour y parvenir, elle doit d'abords réussir un jet de sauvegarde de Charisme. • La créature a un désavantage à ses jets d'attaque effectués contre des cibles situées à l'intérieur du cylindre. • Des cibles se trouvant à l'intérieur du cylindre ne peuvent pas être charmées, effrayées, ou possédées par la créature. Lorsque vous lancez ce sort, vous pouvez décider que la magie fonctionne en sens inverse, empêchant alors les créatures du type spécifié de quitter le cylindre et protégeant les cibles se trouvant au dehors. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort niveau 4 ou supérieur, la durée augmente de 1 heure pour chaque niveau d'emplacement au-delà du niveau 3."},
    {name:"Clignotement",level:3,school:"Transmutation",time:"1 action",range:"Soi-même",duration:"1 minute",components:"V, S",classes:["Artificier","Ensorceleur","Magicien"],desc:"Lancez un d20 à la fin de chacun de vos tours pour toute la durée du sort. Si le résultat du jet est 11 ou plus, vous disparaissez du plan d'existence actuel et apparaissez dans le plan éthéré (le sort échoue mais l'emplacement de sort est dépensé si vous vous trouvez déjà dans le plan éthéré). Au début de votre prochain tour, ou lorsque le sort prend fin si vous êtes dans le plan éthéré, vous retournez dans un espace inoccupé de votre choix que vous pouvez voir et situé à 3 mètres maximum de l'endroit où vous avez disparu. S'il n'y a aucun espace inoccupé de disponible à portée, vous apparaissez dans l'espace inoccupé le plus proche (choisi aléatoirement si plus d'un espace inoccupé remplissant les conditions est disponible). Vous pouvez annuler ce sort par une action. Lorsque vous êtes dans le plan éthéré, vous pouvez voir et entendre le plan dont vous êtes originaire, qui apparaît en nuances de gris, mais vous ne pouvez voir à plus de 18 mètres. Vous ne pouvez affecter et être affecté que par d'autres créatures du plan éthéré. Les créatures qui n'y sont pas ne peuvent ni vous percevoir ni interagir avec vous, à moins qu'une capacité le leur permette."},
    {name:"Communication à distance",level:3,school:"Évocation",time:"1 action",range:"Soi-même",duration:"1 round",components:"V, S, M",classes:["Barde","Clerc","Druide","Ensorceleur","Magicien","Occultiste"],desc:"Transmettre un court message (25 mots) à une créature connue sur le même plan.",source:"PHB"},
    {name:"Contresort",level:3,school:"Abjuration",time:"1 réaction",range:"18m",duration:"Instantanée",components:"S",classes:["Ensorceleur","Magicien","Occultiste"],desc:"Vous tentez d'interrompre une créature au moment où elle incante un sort. Si la créature incante un sort de niveau 3 ou inférieur, son sort échoue et il n'a aucun effet. Si elle incante un sort de niveau 4 ou supérieur, effectuez un jet de caractéristique selon celle qui sert à lancer vos sorts. Le DD est de 10 + le niveau du sort. En cas de réussite, le sort de la créature échoue et il n'a aucun effet. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 4 ou supérieur, le sort interrompu n'a aucun effet si son niveau est inférieur ou égal à celui du niveau de l'emplacement de sort utilisé."},
    {name:"Convocation de démons mineurs",level:3,school:"Invocation",time:"1 action",range:"18m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Magicien","Occultiste"],desc:"Vous prononcez des mots vulgaires, invoquant des démons du chaos des Abysses. Jetez un dé sur la table suivante pour déterminer ce qui apparaît. d6Démons invoqués1-2Deux démons de FP 1 ou moins3-4Quatre démons de FP 1/2 ou moins5-6Huit démons de FP 1/4 ou moins Le MD choisit les démons, comme les mânes ou les dretchs, et vous choisissez les espaces inoccupés que vous pouvez voir à portée où ils apparaissent. Un démon invoqué disparaît lorsqu'il tombe à 0 point de vie ou lorsque le sort se termine. Les démons sont hostiles à toutes les créatures, vous y compris. Lancez l'initiative pour le groupe de démons invoqués ; il a ses propres tours de jeu. Les démons poursuivent et attaquent les non-démons les plus proches au mieux de leurs capacités. Dans le cadre de l'action Lancer un sort, vous pouvez tracer un cercle au sol avec le sang utilisé comme composante matérielle. Le cercle doit être suffisamment grand pour englober votre espace. Tant que le sort dure, les démons invoqués ne peuvent pas traverser le cercle, ni le détruire, ni cibler quelqu'un à l'intérieur du cercle. Utiliser la composante matérielle de cette manière la consomme à la fin du sort. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 6 ou 7, vous invoquez deux fois plus de démons. Si vous le lancez en utilisant un emplacement de sort de niveau 8 ou 9, vous invoquez trois fois plus de démons."},
    {name:"Convocation de fée",level:3,school:"Invocation",time:"1 minute",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Barde","Druide","Ensorceleur","Magicien","Occultiste","Rôdeur"],desc:"Vous appelez un esprit de fée. Il apparaît dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit de fée. Lorsque vous lancez le sort, choisissez une humeur : furieuse, joyeuse ou rusée. La créature ressemble à une fée de votre choix correspondant à cette humeur, ce qui détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 4 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Convocation de mort-vivant",level:3,school:"Invocation",time:"1 action",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Magicien","Occultiste"],desc:"Vous appelez un esprit de mort-vivant. Il apparaît dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit de mort-vivant. Lorsque vous lancez le sort, choisissez un type : fantôme, putréfié ou squelette. La créature ressemble à un mort-vivant de votre choix correspondant à ce type, ce qui détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 4 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Convocation de rejeton d'ombre",level:3,school:"Invocation",time:"1 action",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Occultiste"],desc:"Vous appelez un esprit d'ombre. Il apparaît dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit d'ombre. Lorsque vous lancez le sort, choisissez un type : fureur, désespoir ou peur. La créature ressemble à un rejeton d'ombre de votre choix correspondant à ce type, ce qui détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 4 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Croissance végétale",level:3,school:"Transmutation",time:"1 action ou 8 heures",range:"45m",duration:"Instantanée",components:"V, S",classes:["Barde","Druide","Rôdeur"],desc:"Ce sort canalise une force vitale vers les plantes présentes dans une zone spécifique. Il y a deux usages possibles du sort. L'un procure des bénéfices immédiats alors que l'autre s'étale sur un plus long terme. Si vous lancez ce sort en utilisant 1 action, choisissez un point dans la portée du sort. Toutes plantes normales présentes dans un rayon de 30 mètres autour de ce point croissent avec vigueur. Une créature se déplaçant à travers la zone doit consommer 4 mètres de mouvement pour parcourir 1 mètre. Vous pouvez désigner une ou plusieurs zones de dimension variable comme étant exclues de la zone d'effet du sort. Si vous lancez ce sort sur une période de 8 heures, vous enrichissez le sol. Toutes les plantes présentes dans une surface de 400 mètres de rayon centrée sur point dans la portée du sort sont enrichies pour 1 année. Les plantes produisent deux fois plus de nourriture lors de la récolte."},
    {name:"Délivrance des malédictions",level:3,school:"Abjuration",time:"1 action",range:"Contact",duration:"Instantanée",components:"V, S",classes:["Barde","Clerc","Druide","Magicien","Paladin"],desc:"Mettre fin à toutes les malédictions sur une créature ou briser le lien à un objet maudit.",source:"PHB"},

    {name:"Marche sur l'eau",level:3,school:"Transmutation",time:"1 action (rituel)",range:"9m",duration:"1 heure",components:"V, S, M",classes:["Clerc","Druide","Rôdeur"],desc:"Jusqu'à 10 créatures marchent sur liquides (eau, boue, lave lente). +1 cible/niveau.",source:"PHB"},

    {name:"Bouclier de feu",level:4,school:"Évocation",time:"1 action",range:"Soi-même",duration:"10 minutes",components:"V, S, M",classes:["Artificier","Magicien"],desc:"Résistance froid ou feu; 2d8 feu/froid rétorsion à l'attaquant en mêlée.",source:"PHB"},
    {name:"Chien de garde de Mordenkainen",level:4,school:"Invocation",time:"1 action",range:"9m",duration:"8 heures",components:"V, S, M",classes:["Artificier","Magicien"],desc:"Vous invoquez un chien de garde fantomatique dans un espace inoccupé que vous pouvez voir et à portée, où il reste pour la durée du sort, jusqu'à ce que vous le renvoyiez par une action, ou jusqu'à ce que vous vous déplaciez à plus de 30 mètres de lui. Le chien est invisible pour toutes les créatures, vous excepté, et on ne peut pas lui faire du mal. Lorsqu'une créature de taille P ou supérieure s'approche à 9 mètres ou moins de lui sans donner le mot de passe que vous avez spécifié lorsque vous avez lancé le sort, le chien commence à aboyer bruyamment. Le chien voit les créatures invisibles et peut également voir le plan éthéré. Il ignore les illusions. Au début de chacun de vos tours, le chien tente de mordre une créature se trouvant à 1,50 mètre ou moins de lui et qui vous est hostile. Le bonus à l'attaque du chien de garde est égal au modificateur de votre caractéristique d'incantation + votre bonus de maîtrise. Si le coup touche, il inflige 4d8 dégâts perforants."},
    {name:"Coffre secret de Léomund",level:4,school:"Invocation",time:"1 action",range:"Contact",duration:"Instantanée",components:"V, S, M (coffrets identiques 5000+50 po)",classes:["Artificier","Magicien"],desc:"Vous cachez un coffre, et tout son contenu, dans le plan éthéré. Vous devez toucher le coffre et sa réplique miniature qui vous sert de composante matérielle pour le sort. Le coffre peut contenir jusqu'à un tiers de mètre cube de matériel non-vivant (90 cm x 60 cm x 60 cm). Tant que le coffre reste dans le plan éthéré, vous pouvez utiliser une action et toucher la réplique pour rappeler le coffre. Il apparaît sur le sol, dans un espace inoccupé, dans un rayon de 1,50 mètre de vous. Vous pouvez renvoyer le coffre dans le plan éthéré en utilisant une action et en touchant à la fois le coffre et sa réplique. Passé un délai de 60 jours, il y a 5 % de risque par jour (les risques se cumulent de jour en jour) que l'effet du sort prenne fin. L'effet du sort prend fin si vous lancez de nouveau ce sort, si la réplique miniature du coffre est détruite, ou si vous choisissez de mettre un terme au sort par une action. Si le sort prend fin et que la version large du coffre se trouve toujours dans le plan éthéré, il est irrémédiablement perdu."},
    {name:"Confusion",level:4,school:"Enchantement",time:"1 action",range:"27m",duration:"Concentration, 1 minute",components:"V, S, M",classes:["Barde","Druide","Ensorceleur","Magicien"],desc:"Ce sort assaille et tord les esprits des créatures, générant des illusions et provoquant des actions incontrôlées. Chaque créature dans une sphère de 3 mètres de rayon centrée sur un point choisi dans la portée du sort doit réussir un jet de sauvegarde de Sagesse, sans quoi elle sera affectée par le sort. Une cible affectée ne peut réagir et elle doit lancer 1d10 au début de chacun de ses tours pour déterminer son comportement pour ce tour. d10Comportement1La créature emploie tout son mouvement pour se déplacer de façon aléatoire. Pour déterminer la direction, lancez 1d8 et assignez une direction à chaque face. La créature ne prend pas d'action pour ce tour.2-6La créature ne se déplace pas et elle ne prend pas d'action pour ce tour.7-8La créature prend son action pour faire une attaque au corps à corps contre une créature à sa portée, déterminée de façon aléatoire. Si aucune créature n'est à sa portée, la créature ne fait rien pour ce tour.9-10La créature peut agir et se déplacer normalement. À la fin de chacun de ses tours, une créature affectée peut faire un jet de sauvegarde de Sagesse. En cas de réussite, l'effet du sort prend fin pour cette cible. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 5 ou supérieur, le rayon de la sphère augmente de 1,50 mètre pour chaque niveau d'emplacement au-delà du niveau 4."},
    {name:"Contrôle de l'eau",level:4,school:"Transmutation",time:"1 action",range:"90m",duration:"Concentration, 10 minutes",components:"V, S, M",classes:["Clerc","Druide","Magicien"],desc:"Jusqu'à la fin du sort, vous contrôlez toute étendue d'eau libre dans une zone cubique de 30 mètres d'arête de votre choix. Vous pouvez choisir parmi les effets suivants lors de l'incantation du sort. Par une action, durant votre tour, vous pouvez répéter le même effet ou en choisir un nouveau. Crue. Vous provoquez l'augmentation de 6 mètres du niveau de toute l'eau présente dans la zone d'effet. Si la zone d'effet comprend une berge, l'eau se déverse sur le sol sec. Si votre zone d'effet se trouve au sein d'une importante étendue d'eau, vous créez plutôt une vague de 6 mètres de haut qui part d'un côté de la zone d'effet et se déplace jusqu'au côté opposé avant de se briser. Tout véhicule de taille TG ou inférieure frappé par la vague a 25 % de risque de chavirer. Le niveau de l'eau reste élevé jusqu'à la fin du sort ou jusqu'à ce que vous choisissiez un effet différent. Si cet effet produit une vague, la vague se répète au début de votre tour suivant tant que l'effet de Crue est effectif. Scinder l'eau. Vous déplacez l'eau dans la zone de sorte à créer une tranchée. La tranchée s'étend au travers de la zone d'effet du sort, et scinde l'eau en deux, formant un mur de chaque côté. La tranchée reste en place jusqu'à la fin du sort ou jusqu'à ce que vous choisissiez un nouvel effet. L'eau remplit alors lentement la tranchée jusqu'au tour suivant, ramenant l'eau à son niveau normal. Diriger le courant. Vous provoquez un courant dans la zone d'effet qui se dirige dans la direction de votre choix, même si l'eau doit pour cela submerger des obstacles, passer au-dessus des murs, ou prendre d'autres directions improbables. L'eau dans la zone d'effet se déplace dans la direction souhaitée, mais une fois en dehors de la zone d'effet, elle retrouve un courant basé sur les caractéristiques du terrain. L'eau continue à se déplacer dans la direction choisie jusqu'à ce que le sort prenne fin ou que vous choisissiez un nouvel effet. Tourbillon. Cet effet requiert une étendue d'eau large de 15 mètres et profonde de 7,50 mètres minimum. Vous créez un tourbillon qui se forme au centre de la zone d'effet. Le tourbillon produit un vortex large de 1,50 mètre à son pôle inférieur, large de 15 mètres à son pôle supérieur, et profond de 7,50 mètres. Toute créature ou objet dans l'eau à 7,50 mètres du vortex est attiré de 3 mètres vers lui. Une créature peut nager pour s'éloigner du vortex à condition de réussir un jet de Force (Athlétisme) contre le DD de sauvegarde de votre sort. Lorsqu'une créature entre dans le vortex pour la première fois de son tour ou débute son tour dans le vortex, elle doit effectuer un jet de sauvegarde de Force. En cas d'échec, la créature subit 2d8 dégâts contondants et est happée dans le vortex jusqu'à ce que le sort se termine. En cas de réussite, la créature subit la moitié de ces dégâts et n'est pas prisonnière du vortex. Une créature happée par le vortex peut utiliser son action pour essayer de nager hors du vortex comme décrit précédemment, mais elle subira un désavantage à son jet de Force (Athlétisme). La première fois, à chaque tour, qu'un objet entre dans le vortex, l'objet subit 2d8 dégâts contondants ; ces dégâts sont de nouveau infligés à chaque tour que l'objet passe dans le vortex."},
    {name:"Convocation d'aberration",level:4,school:"Invocation",time:"1 action",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Magicien","Occultiste"],desc:"Vous appelez un esprit d'aberration. Il apparaît dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit d'aberration. Lorsque vous lancez le sort, choisissez un type : tyrannoeil, slaad ou rejeton stellaire. La créature ressemble à une aberration de votre choix correspondant à ce type, ce qui détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 5 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Convocation d'artificiel",level:4,school:"Invocation",time:"1 action",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Artificier","Magicien"],desc:"Vous appelez un esprit d'artificiel. Il apparaît dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit d'artificiel. Lorsque vous lancez le sort, choisissez un type : argile, métal ou pierre. La créature ressemble à un golem ou un modron de votre choix correspondant à ce type, ce qui détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 5 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Convocation d'élémentaire",level:4,school:"Invocation",time:"1 action",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Druide","Ensorceleur","Magicien"],desc:"Vous appelez un esprit d'élémentaire. Il apparaît dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit d'élémentaire. Lorsque vous lancez le sort, choisissez un type : eau, air, feu ou terre. La créature ressemble à une forme humanoïde couronnée de l'élément choisi, ce qui détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 5 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Convocation de bête",level:2,school:"Invocation",time:"1 action",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Druide","Rôdeur"],desc:"Vous appelez un esprit de bête. Il se manifeste dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit de bête. Lorsque vous lancez le sort, choisissez un environnement : air, terre ou eau. La créature ressemble à un animal de votre choix qui est natif de cet environnement, ce qui détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 3 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Divination",level:4,school:"Divination",time:"1 action (rituel)",range:"Soi-même",duration:"Instantanée",components:"V, S, M (250 po d'encens/huile)",classes:["Clerc","Druide","Magicien","Occultiste","Rôdeur"],desc:"Vérité brève ou omen sur un événement dans les 7 jours. 25% réponse cryptique si trop loin.",source:"PHB"},

    {name:"Aube",level:5,school:"Évocation",time:"1 action",range:"36m",duration:"Concentration, 1 minute",components:"V, S, M (disque doré 100 po)",classes:["Clerc","Magicien"],desc:"Cylindre de 3m rayon: 4d10 radiant/round (JdS CON moitié). Dissipe les ténèbres. Déplaçable de 9m.",source:"XGTE"},
    {name:"Brume mortelle",level:5,school:"Invocation",time:"1 action",range:"36m",duration:"Concentration, 10 minutes",components:"V, S",classes:["Ensorceleur","Magicien","Occultiste"],desc:"Cylindre de brume (18m rayon, 3m haut): 5d8 acide aux créatures qui commencent dedans (JdS CON moitié).",source:"PHB"},
    {name:"Cercle de pouvoir",level:5,school:"Abjuration",time:"1 action",range:"Soi-même (9m)",duration:"Concentration, 10 minutes",components:"V",classes:["Paladin"],desc:"Vous irradiez de l'énergie divine, distordant et diffusant de l'énergie magique à 9 mètres autour de vous. Jusqu'à la fin du sort, la sphère se déplace en même temps que vous de sorte que vous en restez l'épicentre. Pour la durée du sort, toute créature amicale dans la zone (vous y compris) a un avantage à ses jets de sauvegarde effectués contre des sorts et tout autre effet magique. De plus, lorsque les créatures affectées réussissent un jet de sauvegarde effectué contre un sort ou un effet magique qui leur permet de réduire de moitié les dégâts subis en cas de réussite au jet de sauvegarde, elles ne prennent aucun dégât de la part de ce sort ou effet magique."},
    {name:"Cercle de téléportation",level:5,school:"Invocation",time:"1 minute",range:"3m",duration:"1 round",components:"V, M (craie/argent 50 po)",classes:["Barde","Clerc","Ensorceleur","Magicien","Occultiste"],desc:"Pendant que vous incantez le sort, vous dessinez sur le sol un cercle de 3 mètres de diamètre constitué de symboles qui lient votre position à un cercle de téléportation permanent de votre choix dont vous connaissez la séquence des symboles et qui se trouve sur le même plan d'existence que vous. Un portail scintillant s'ouvre dans le cercle que vous avez dessiné et reste ouvert jusqu'à la fin de votre prochain tour. Toute créature qui entre dans le portail apparaît instantanément à 1,50 mètre du portail de destination ou dans l'espace inoccupé le plus proche si cet espace est déjà pris. Nombre de grands temples, guildes et autres endroits importants ont installé des portails de téléportation permanents quelque part dans leur enceinte. Chacun de ces cercles de téléportation permanent a sa propre et unique séquence de symboles ; une chaîne de runes magiques arrangées d'une manière particulière. Lorsque vous gagnez pour la première fois la possibilité de lancer ce sort, vous apprenez les séquences de symboles pour deux destinations du plan matériel, déterminées par le MD. Vous pouvez apprendre de nouvelles séquences au cours de vos aventures. Vous pouvez mémoriser une nouvelle séquence de symboles après l'avoir étudiée pendant 1 minute. Vous pouvez créer un cercle de téléportation permanent en lançant ce sort au même endroit, tous les jours pendant 1 an. Vous n'êtes pas obligé de traverser le cercle de téléportation lorsque vous lancez ce sort pour créer un cercle de téléportation permanent."},
    {name:"Cône de froid",level:5,school:"Évocation",time:"1 action",range:"Soi-même (cône 18m)",duration:"Instantanée",components:"V, S, M",classes:["Ensorceleur","Magicien"],desc:"Un souffle d'air froid est propulsé de vos mains. Chaque créature se trouvant dans les 18 mètres du cône doit effectuer un jet de sauvegarde de Constitution. Une créature subit 8d8 dégâts de froid en cas d'échec, ou la moitié de ces dégâts en cas de réussite. Une créature tuée par le sort devient une statue de glace jusqu'à son dégel. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 6 ou supérieur, les dégâts augmentent de 1d8 pour chaque niveau d'emplacement au-delà du niveau 5."},
    {name:"Contact avec un autre plan",level:5,school:"Divination",time:"1 minute",range:"Soi-même",duration:"1 minute",components:"V",classes:["Magicien","Occultiste"],desc:"Vous contactez mentalement un demi-dieu, l'esprit d'un sage depuis longtemps disparu, ou quelque autre mystérieuse entité d'un autre plan. Rentrer en contact avec cette intelligence extraplanaire peut épuiser voire briser votre esprit. Lorsque vous lancez ce sort, effectuez un jet de sauvegarde d'Intelligence DD 15. En cas d'échec, vous subissez 6d6 dégâts psychiques et devenez dément jusqu'à ce que vous finissiez un repos long. Tant que vous êtes fou, vous ne pouvez utiliser d'action, vous ne pouvez pas non plus comprendre ce que les autres créatures disent, ni lire, et tout ce que vous dites n'est qu'un charabia incompréhensible. Un sort de restauration supérieure lancé sur vous peut mettre fin à cet effet. Sur un jet de sauvegarde réussi, vous pouvez poser à l'entité jusqu'à cinq questions. Vous devez poser vos questions avant que le sort ne finisse. Le MD répond à chacune de ces questions par un seul mot, comme « oui », « non », « peut-être », « jamais », « insignifiant » ou « flou » (si l'entité ne connaît pas la réponse à la question). Si une réponse en un mot risque d'être source de confusion, le MD peut donner une courte phrase en guise de réponse."},
    {name:"Contagion",level:5,school:"Nécromancie",time:"1 action",range:"Contact",duration:"7 jours",components:"V, S",classes:["Clerc","Druide"],desc:"Votre toucher est vecteur de maladie. Effectuez une attaque au corps à corps avec un sort contre une créature à portée. Si le coup touche, la cible est empoisonnée. À la fin de chacun des tours de la cible empoisonnée, celle-ci doit effectuer un jet de sauvegarde de Constitution. Si elle en réussit trois, la cible n'est plus empoisonnée et le sort prend fin. Si elle en échoue trois, la cible n'est plus empoisonnée mais vous choisissez une des maladies indiquées ci-dessous. La cible est alors sujette à cette maladie jusqu'à la fin de la durée du sort. Étant donné que le sort reproduit une maladie naturelle chez sa cible, tout effet qui peut normalement guérir une maladie, ou au moins en réduire les effets, s'applique. Bouille-crâne. L'esprit de la créature devient fiévreux. La créature a un désavantage aux jets d'Intelligence et aux jets de sauvegarde d'Intelligence. De plus, la créature se comporte comme si elle était sous l'effet d'un sort de confusion lorsqu'elle est en combat. Convulsions. La créature est parcourue de tremblements incontrôlés. La créature a un désavantage aux jets de Dextérité, aux jets de sauvegarde de Dextérité et aux jets d'attaque basés sur la Dextérité. Fièvre répugnante. Une violente fièvre se saisit du corps de la créature. La créature a un désavantage aux jets de Force, aux jets de sauvegarde de Force et aux jets d'attaque basés sur la Force. Mal aveuglant. La créature a du mal à réfléchir et ses yeux deviennent blancs laiteux. La créature a un désavantage aux jets de Sagesse et aux jets de sauvegarde de Sagesse. Elle est de plus aveuglée. Mort poisseuse. La créature perd du sang de manière incontrôlable. La créature a un désavantage aux jets de Constitution et aux jets de sauvegarde de Constitution. De plus, chaque fois que la créature subit des dégâts, elle est étourdie jusqu'à la fin de son tour suivant. Pourriture. La chair de la créature se dégrade. La créature a un désavantage aux jets de Charisme et est vulnérable à tous les types de dégâts."},
    {name:"Convocation de céleste",level:5,school:"Invocation",time:"1 minute",range:"27m",duration:"Concentration, 1 heure",components:"V, S",classes:["Clerc","Paladin"],desc:"Vous appelez un esprit de céleste. Il apparaît dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit de céleste. Lorsque vous lancez le sort, choisissez un type : vengeur ou protecteur. Le type choisi détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 6 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Création d'homoncule",level:5,school:"Transmutation",time:"1 heure",range:"Contact",duration:"Instantanée",components:"V, S, M",classes:["Artificier","Magicien"],desc:"En prononçant l'incantation du sort, vous vous entaillez avec une dague incrustée de pierres précieuses, subissant 2d4 dégât perforant qui ne peuvent être réduit d'aucune manière. Vous faites couler votre sang sur les autres composantes et les touchez, les transformant une petite créature appelée un homoncule. Il devient un compagnon fidèle et meurt si vous mourez. Lorsque vous terminez un repos long, vous pouvez dépenser jusqu'à la moitié de vos Dés de vie si l'homoncule se trouve sur le même plan d'existence que vous. Lancez alors ces dés et ajoutez votre modificateur de Constitution à chacun. Votre maximum de point de vie est réduit du total obtenu, et les points de vie ainsi que le maximum de points de vie de l'homoncule augmentent de ce même total. Ce processus ne peut réduire vos points de vie à moins de 1, et votre maximum de point de vie et celui de l'homoncule retournent à la normale lorsque vous terminez un repos long. La réduction de votre maximum de points de vie ne peut être restituée d'aucun moyen hormis la mort de l'Homoncule. Vous ne pouvez posséder qu'un seul homoncule à la fois. Si vous lancez ce sort alors que votre homoncule vit toujours, le sort échoue."},
    {name:"Création",level:5,school:"Illusion",time:"1 minute",range:"9m",duration:"Variable",components:"V, S, M",classes:["Artificier","Ensorceleur","Magicien"],desc:"Vous extirpez de la Gisombre des brumes ténébreuses qui vous serviront de matériau pour créer, à portée, un objet non vivant en matière végétale : du tissu, de la corde, du bois, ou quelque chose de similaire. Vous pouvez également utiliser ce sort pour créer un objet minéral comme de la pierre, du cristal ou du métal. L'objet créé ne doit pas dépasser un cube de 1,50 mètre d'arête, et vous devez déjà avoir vu la forme et les matériaux que vous souhaitez donner à l'objet. La durée d'effet du sort dépend du matériau de l'objet. Si l'objet comporte plusieurs matériaux, utilisez la durée la plus courte. MatériauDuréeMatière végétale1 jourPierre ou cristal12 heuresMétaux précieux1 heureGemmes10 minutesAdamantium ou mithral1 minute Utiliser un matériau créé à l'aide du sort création en tant que composante matérielle d'un autre sort fait automatiquement échouer cet autre sort. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 6 ou supérieur, les arêtes du cube augmentent de 1,50 mètre pour chaque niveau d'emplacement au-delà du niveau 5."},
    {name:"Danse macabre",level:5,school:"Nécromancie",time:"1 action",range:"18m",duration:"Concentration, 1 heure",components:"V, S",classes:["Magicien","Occultiste"],desc:"Animer 5 corps: squelettes ou zombis avec 1d8+mod INT en bonus d'attaque. +2/niveau.",source:"XGTE"},

    {name:"Barrière de lames",level:6,school:"Évocation",time:"1 action",range:"27m",duration:"Concentration, 10 minutes",components:"V, S",classes:["Clerc"],desc:"Mur de lames tourbillonnantes (30m×3m×0,3m): 6d10 tranchant en traversant (JdS DEX moitié).",source:"PHB"},
    {name:"Bosquet des druides",level:6,school:"Abjuration",time:"10 minutes",range:"18m",duration:"24 heures",components:"V, S, M",classes:["Druide"],desc:"Sanctuaire naturel (36m rayon): pièges, téléportation bloquée, brouillard magique, lumière/ténèbres.",source:"PHB"},
    {name:"Cage des âmes",level:6,school:"Nécromancie",time:"1 action",range:"18m",duration:"8 heures",components:"V, S, M (cage en rubis 300 po)",classes:["Magicien","Occultiste"],desc:"Ce sort arrache l'âme d'un humanoïde lorsqu'il meurt et la piège dans une petite cage que vous utilisez comme composante matérielle. Une âme piégée reste dans la cage jusqu'à la fin du sort ou jusqu'à ce que vous brisiez la cage, ce qui met fin au sort immédiatement. Lorsque vous avez une âme dans la cage, vous pouvez l'exploiter des différentes manières décrites ci-dessous. Une âme peut être utilisée jusqu'à 6 fois. Lorsque vous utilisez une âme pour la sixième fois, elle est libérée et le sort prend fin. Tant qu'une âme est piégée, l'humanoïde mort à qui elle appartient ne peux être ramené à la vie. Vol de vie. Vous pouvez utiliser une action bonus pour drainer l'énergie de l'âme et regagner 2d8 points de vie. Interroger l'âme. Vous posez une question à l'âme (pas d'action nécessaire) et recevez une brève réponse par télépathie que vous pouvez comprendre peu importe le langage utilisé. L'âme ne connaît que ce qu'elle savait de son vivant, mais elle doit vous répondre sincèrement et du mieux de ses capacités. La réponse n'est pas plus longue qu'une ou deux courtes phrases et peut être énigmatique. Partage d'expérience. Par une action bonus, vous pouvez vous imprégner de l'expérience de l'âme, ce qui vous accorde un avantage pour votre prochain jet d'attaque, de caractéristique ou de sauvegarde. Si vous n'utilisez pas cet avantage avant le début de votre prochain tour, il est perdu. Vision des morts. Vous pouvez utiliser une action pour nommer un lieu que l'humanoïde a vu de son vivant, ce qui crée un capteur invisible à cet endroit, à condition qu'il se trouve dans le même plan d'existence que vous. Le capteur persiste tant que vous vous concentrez sur le sort, jusqu'à 10 minutes. Vous pouvez voir et entendre comme si vous étiez à la place du capteur. Toute créature qui peut voir le capteur (comme avec voir l'invisible ou Vision véritable) perçoit une image translucide de l'humanoïde tourmenté dont vous avez piégé l'âme."},
    {name:"Cercle de mort",level:6,school:"Nécromancie",time:"1 action",range:"45m",duration:"Instantanée",components:"V, S, M (poudre de cendres 500 po)",classes:["Ensorceleur","Magicien","Occultiste"],desc:"Une sphère d'énergie négative s'étend dans un rayon de 18 mètres à partir d'un point à portée. Chaque créature présente dans la zone doit effectuer un jet de sauvegarde de Constitution, subissant 8d6 dégâts nécrotiques en cas d'échec, ou la moitié de ces dégâts en cas de réussite. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 7 ou supérieur, les dégâts augmentent de 2d6 pour chaque niveau d'emplacement au-delà du niveau 6."},
    {name:"Chaîne d'éclairs",level:6,school:"Évocation",time:"1 action",range:"45m",duration:"Instantanée",components:"V, S, M",classes:["Ensorceleur","Magicien"],desc:"Vous créez un trait électrifié qui s'arque à partir d'une cible de votre choix que vous pouvez voir et à portée. Trois traits s'élancent de la cible pour se diriger vers trois autres cibles. Chacune d'entre elles doit être à 9 mètres ou moins de la première cible. La cible peut être une créature ou un objet et ne peut être ciblée que par un seul des traits. Toute cible doit effectuer un jet de sauvegarde de Dextérité, subissant 10d8 dégâts de foudre en cas d'échec, ou la moitié de ces dégâts en cas de réussite. Aux niveaux supérieurs. Lorsque vous lancez ce sort avec un emplacement de sort de niveau 7 ou supérieur, un trait additionnel s'élance de la première cible vers une autre cible pour chaque niveau d'emplacement au-delà du niveau 6."},
    {name:"Contamination",level:6,school:"Nécromancie",time:"1 action",range:"9m",duration:"Concentration, 1 minute",components:"V, S",classes:["Ensorceleur","Magicien","Occultiste"],desc:"Vous libérez une infection virulente sur une créature que vous voyez dans la portée du sort. La cible doit effectuer un jet de sauvegarde de Constitution, subissant 14d6 dégâts nécrotiques en cas d'échec, ou la moitié de ces dégâts en cas de réussite. Les dégâts ne peuvent réduire les points de vie de la cible sous 1. Si la cible échoue le jet de sauvegarde, son maximum de points de vie est amputé pour 1 heure de la même quantité de dégâts nécrotiques subis. Tout effet qui enraye la maladie permet au maximum de points de vie de la créature de retrouver sa valeur normale avant la fin de l'effet du sort."},
    {name:"Convocations instantanées de Drawmij",level:6,school:"Invocation",time:"1 minute (rituel)",range:"Contact",duration:"Jusqu'à dissipation",components:"V, S, M (gemme 1000 po par objet)",classes:["Magicien"],desc:"Vous touchez un objet pesant au mieux 5 kg dont chacune des dimensions ne peut dépasser 1,80 mètre. Le sort dépose une marque invisible à sa surface et écrit, toujours de manière invisible, le nom de l'objet sur le saphir que vous avez utilisé comme composante matérielle. Chaque fois que vous lancez ce sort, vous devez utiliser un saphir différent. Par la suite, n'importe quand, vous pouvez utiliser votre action pour prononcer le nom de l'objet et broyer le saphir. L'objet apparaît instantanément dans votre main, quels que soient la distance ou les plans qui vous séparent. Le sort prend alors fin. Si une autre créature porte ou tient l'objet, briser le saphir ne téléporte pas l'objet jusqu'à vous mais vous informe de qui le possède actuellement et où cette créature se trouve en ce moment. Le sort dissipation de la magie, ou un effet similaire, lancé avec succès sur le saphir met fin à l'effet du sort."},
    {name:"Convocation de démon majeur",level:6,school:"Invocation",time:"1 action",range:"18m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Magicien","Occultiste"],desc:"Vous prononcez des mots vulgaires, invoquant un démon du chaos des Abysses. Choisissez le type du démon, qui doit être de FP 5 ou inférieur, comme un démon des ombres ou un barlgura. Le démon apparaît dans un espace inoccupé que vous pouvez voir à portée, et il disparaît lorsqu'il tombe à 0 point de vie ou lorsque le sort se termine. Lancer l'initiative pour le démon, qui a ses propres tours. Lorsque vous l'invoquez et à chacun de vos tours par la suite, vous pouvez lui donner un ordre verbal (aucune action n'est requise de votre part) pour lui indiquer ce qu'il doit faire lors de son prochain tour. Si vous ne donnez aucun ordre, il passe son tour à attaquer toute créature à sa portée qui l'a attaquée. À la fin de chacun des tours de démons, il effectue un jet de sauvegarde de Charisme. Le démon a un désavantage sur ce jet de sauvegarde si vous dites son vrai nom. En cas d'échec de sauvegarde, le démon continue de vous obéir. En cas de sauvegarde réussie, votre contrôle du démon prend fin pour le reste de la durée, et le démon passe son tour à poursuivre et à attaquer les non-démons les plus proches au mieux de ses capacités. Si vous arrêtez de vous concentrer sur le sort avant qu'il n'atteigne sa durée totale, un démon incontrôlé disparaît après 1d6 rounds s'il a encore des points de vie. Dans le cadre du lancement du sort, vous pouvez former un cercle au sol avec le sang utilisé comme composant matériel. Le cercle est suffisamment grand pour englober votre espace. Tant que le sort dure, le démon invoqué ne peut pas traverser le cercle ou lui faire du mal, et il ne peut cibler personne à l'intérieur. Utiliser le composant matériel de cette manière le consomme à la fin du sort. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 5 ou supérieur, le FP augmente de 1 pour chaque niveau d'emplacement au-delà du niveau 4."},
    {name:"Convocation de fiélon",level:6,school:"Invocation",time:"1 action",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Magicien","Occultiste"],desc:"Vous appelez un esprit de fiélon. Il apparaît dans un espace inoccupé que vous pouvez voir à portée. Sa forme physique utilise les statistiques d'un esprit de fiélon. Lorsque vous lancez le sort, choisissez un type : démon, diable ou yugoloth. La créature ressemble à un fiélon de votre choix correspondant à ce type, ce qui détermine certains traits de son bloc de statistique. La créature disparaît lorsque ses points de vie tombent à 0 ou lorsque le sort se termine. La créature est votre allié et celui de vos compagnons. En combat, elle partage votre initiative et joue immédiatement après vous. Elle obéit à vos ordres (pas d'action requise). Si vous ne lui donnez aucun ordre, elle prend l'action Esquive et utilise son déplacement pour éviter le danger. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 7 ou supérieur, utilisez ce même niveau de sort lorsqu'il est mentionné dans le bloc de statistique de la créature."},
    {name:"Création de mort-vivant",level:6,school:"Nécromancie",time:"1 minute",range:"3m",duration:"Instantanée",components:"V, S, M (argile 150 po par cadavre)",classes:["Clerc","Magicien","Occultiste"],desc:"Vous ne pouvez lancer ce sort que durant la nuit. Choisissez jusqu'à trois cadavres d'humanoïdes de taille M ou P à portée. Chaque cadavre devient une goule sous votre contrôle. Par une action bonus, à chacun de vos tours, vous pouvez mentalement donner des ordres à toute créature que vous avez animée avec ce sort, si elle se trouve à 36 mètres ou moins de vous (si vous contrôlez de nombreuses créatures, vous pouvez donner vos ordres à plusieurs d'entre elles, voire à toutes, en même temps, à condition qu'elles reçoivent toutes le même ordre). Vous décidez quelle action la créature va effectuer et où elle va se déplacer au cours de son prochain tour, ou bien vous pouvez lui donner un ordre général, comme garder une chambre ou un couloir. Si vous ne donnez aucun ordre, la créature ne fait que se défendre contre les créatures hostiles. Une fois que vous avez donné votre ordre, la créature continue de le suivre jusqu'à ce que sa tâche soit accomplie. La créature est sous votre contrôle pour 24 heures. Passé ce délai, elle cesse d'obéir aux ordres que vous lui avez donnés. Pour conserver votre contrôle sur la créature pour 24 heures supplémentaires, vous devez lancer ce sort sur la créature avant que la première période de 24 heures ne se termine. Cette utilisation de ce sort réaffirme votre contrôle sur trois créatures que vous avez déjà animées, plutôt que d'en animer de nouvelles. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 7, vous pouvez animer ou réaffirmer votre contrôle sur quatre goules. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 8, vous pouvez animer ou réaffirmer votre contrôle sur cinq goules ou deux blêmes ou deux nécrophages. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 9, vous pouvez animer ou réaffirmer votre contrôle sur six goules ou trois blêmes ou trois nécrophages ou deux momies."},
    {name:"Danse irrésistible d'Otto",level:6,school:"Enchantement",time:"1 action",range:"9m",duration:"Concentration, 1 minute",components:"V",classes:["Barde","Magicien"],desc:"Forcer une créature à danser follement (JdS SAG): vitesse 0, désavantage attaques/JdS DEX, avantage contre elle.",source:"PHB"},
    {name:"Discours captivant",level:6,school:"Enchantement",time:"1 action",range:"18m",duration:"Concentration, 1 minute",components:"V",classes:["Barde"],desc:"Toutes créatures dans 18m qui entendent (JdS SAG): charmées et captivées.",source:"PHB"},
    {name:"Festin des héros",level:6,school:"Invocation",time:"10 minutes",range:"9m",duration:"Instantanée",components:"V, S, M (bol de gemmes 1000 po)",classes:["Clerc","Druide"],desc:"Festin pour 12: immunité poison/maladie, immunité terreur/charme, +2d10 PV max, avantage JdS SAG.",source:"PHB"},
    {name:"Globe d'invulnérabilité",level:6,school:"Abjuration",time:"1 action",range:"Soi-même (3m)",duration:"Concentration, 1 minute",components:"V, S, M",classes:["Ensorceleur","Magicien"],desc:"Sphère 3m: annule tous les sorts de niv.5 et moins. +1 niveau annulé/niveau au-delà du 6e.",source:"PHB"},
    {name:"Illusion programmée",level:6,school:"Illusion",time:"1 action",range:"36m",duration:"Jusqu'à dissipation",components:"V, S, M",classes:["Barde","Magicien"],desc:"Créer une illusion (30m cube) déclenchée par conditions. Se rejoue si déclenchée.",source:"PHB"},
    {name:"Interdiction",level:6,school:"Abjuration",time:"10 minutes",range:"Contact",duration:"24 heures",components:"V, S, M (diamants 1000 po)",classes:["Clerc"],desc:"Zone consacrée/profanée (12m×12m×6m): bloquer téléportation et plans, option 5d10 dégâts/tour.",source:"PHB"},
    {name:"Marche sur le vent",level:6,school:"Transmutation",time:"1 minute",range:"9m",duration:"8 heures",components:"V, S, M",classes:["Clerc","Druide"],desc:"Jusqu'à 10 créatures se transforment en nuage (vol 100m). Retour à forme normale: 1 minute.",source:"PHB"},
    {name:"Mauvais oeil",level:6,school:"Enchantement",time:"1 action",range:"Soi-même",duration:"Concentration, 1 minute",components:"V",classes:["Barde","Ensorceleur","Magicien","Occultiste"],desc:"Jusqu'à 3 créatures: JdS SAG ou assommées/effrayées/charmées selon choix. JdS à chaque tour.",source:"XGTE"},
    {name:"Mot de retour",level:6,school:"Invocation",time:"1 action",range:"Soi-même (4,5m)",duration:"Instantanée",components:"V",classes:["Clerc","Druide","Ensorceleur","Occultiste"],desc:"Téléporter soi et jusqu'à 5 créatures dans 4,5m vers un lieu sacré ou familier.",source:"PHB"},
    {name:"Mur d'épines",level:6,school:"Invocation",time:"1 action",range:"36m",duration:"Concentration, 10 minutes",components:"V, S, M",classes:["Druide"],desc:"Mur de ronces (18m×3m×1,5m): terrain difficile, 7d8 perçant en traversant (JdS DEX moitié).",source:"PHB"},
    {name:"Mur de glace",level:6,school:"Évocation",time:"1 action",range:"36m",duration:"Concentration, 10 minutes",components:"V, S, M",classes:["Ensorceleur","Magicien"],desc:"Mur de glace (18m×6m ou dôme): 10 PV/panneau. 10 froid si traversé/brisé (JdS CON moitié). +2d6/niveau.",source:"PHB"},
    {name:"Nuage incendiaire",level:8,school:"Invocation",time:"1 action",range:"45m",duration:"Concentration, 1 minute",components:"V, S",classes:["Druide","Ensorceleur","Magicien"],desc:"Nuage de feu (12m rayon, 6m haut): 10d8 feu/tour (JdS DEX moitié). Se déplace de 3m/tour.",source:"PHB"},
    {name:"Ossements de la terre",level:6,school:"Transmutation",time:"1 action",range:"36m",duration:"Instantanée",components:"V, S",classes:["Druide"],desc:"Jusqu'à 6 piliers de pierre (0,6m diam.) jaillissent du sol. Créature dessus: JdS DEX ou 6d6 contondant. +2 piliers/niveau.",source:"XGTE"},
    {name:"Petrification",level:6,school:"Transmutation",time:"1 action",range:"18m",duration:"Concentration, 1 minute",components:"V, S, M",classes:["Barde","Ensorceleur","Magicien"],desc:"Ralentie (JdS CON), puis pétrifiée après 3 ratés. Restauration supérieure pour annuler.",source:"PHB"},
    {name:"Prison mentale",level:6,school:"Illusion",time:"1 action",range:"18m",duration:"Concentration, 1 heure",components:"S",classes:["Artificier","Barde","Ensorceleur","Magicien","Occultiste"],desc:"Emprisonner l'esprit d'une créature (JdS INT): incapacitée pendant 1h ou jusqu'à contact extérieur.",source:"XGTE"},
    {name:"Prévoyance",level:6,school:"Divination",time:"1 minute",range:"Contact",duration:"8 heures",components:"V, S, M (plumes d'oie)",classes:["Barde","Magicien","Occultiste"],desc:"Vision du futur proche: avantage à toutes ses actions, impossible à surprendre, ennemis désavantage.",source:"PHB"},
    {name:"Protections et sceaux",level:8,school:"Abjuration",time:"10 minutes",range:"Contact",duration:"24 heures",components:"V, S, M",classes:["Barde","Magicien"],desc:"Protéger un bâtiment: alarmes, portes verrouillées, brouillard, interdiction téléportation.",source:"PHB"},
    {name:"Rayon de soleil",level:6,school:"Évocation",time:"1 action",range:"Soi-même (18m ligne)",duration:"Concentration, 1 minute",components:"V, S, M",classes:["Druide","Ensorceleur","Magicien"],desc:"Rayon solaire 18m×0,3m: 6d8 radiant + aveuglé (JdS CON moitié + JdS aveugl.). Recharge action bonus.",source:"PHB"},
    {name:"Suggestion de groupe",level:6,school:"Enchantement",time:"1 action",range:"18m",duration:"24 heures",components:"V, M",classes:["Barde","Ensorceleur","Magicien","Occultiste"],desc:"Suggérer une action raisonnable à jusqu'à 12 créatures (JdS SAG). Durée augmente avec niveau.",source:"PHB"},
    {name:"Terraformage",level:6,school:"Transmutation",time:"1 action",range:"90m",duration:"Jusqu'à dissipation",components:"V, S, M",classes:["Druide","Magicien"],desc:"Transformer un environnement de 9m cube: climat, terrain, végétation, type de sol.",source:"XGTE"},
    {name:"Transformation de Tenser",level:6,school:"Transmutation",time:"1 action",range:"Soi-même",duration:"Concentration, 10 minutes",components:"V, S, M",classes:["Magicien"],desc:"Transformation martiale: 50 PV temp, avantage FOR/DEX, résistance physique, attaque extra, +2d12 force. Épuisement après.",source:"XGTE"},
    {name:"Vision suprême",level:6,school:"Divination",time:"1 action",range:"Soi-même",duration:"1 heure",components:"V, S, M",classes:["Barde","Clerc","Druide","Ensorceleur","Magicien","Rôdeur"],desc:"Voir dans le noir (36m), illusions transparentes, invisibles visibles, plans parallèles.",source:"PHB"},
    {name:"Voie végétale",level:6,school:"Invocation",time:"1 action",range:"3m",duration:"1 round",components:"V, S",classes:["Barde","Druide","Rôdeur"],desc:"Entrer dans une plante (taille G+) et sortir dans une autre dans 90m. Jusqu'à 8 créatures.",source:"PHB"},
    // ── NIVEAU 7 ──
    {name:"Cage de force",level:7,school:"Évocation",time:"1 action",range:"27m",duration:"1 heure",components:"V, S, M (rubis 1500 po)",classes:["Barde","Magicien","Occultiste"],desc:"Une prison en forme de cube immobile et invisible, composée de force magique, apparaît autour d'une zone que vous choisissez et à portée. La prison peut être une cage ou une boîte solide, selon votre choix. Une prison prenant la forme d'une cage peut faire jusqu'à 6 mètres de côté et est constituée de barreaux de 1,25 cm de diamètre et espacés de 1,25 cm également. Une prison prenant la forme d'une boîte peut faire jusqu'à 3 mètres de côté, créant une barrière solide qui empêche la matière de passer au travers et bloque les sorts lancés de l'intérieur vers l'extérieur de la zone, et vice versa. Lorsque vous lancez ce sort, toute créature qui se trouve complètement dans la zone de la cage est piégée. Les créatures qui ne sont que partiellement dans la zone, ou celles qui sont trop larges pour tenir dans la prison, sont repoussées depuis le centre de la zone jusqu'à ce qu'elles en soient complètement sorties. Une créature à l'intérieur de la cage ne peut pas la quitter par des moyens non magiques. Si la créature tente d'utiliser la téléportation ou le voyage planaire pour sortir de la cage, elle doit d'abords effectuer un jet de sauvegarde de Charisme. En cas de réussite, la créature peut utiliser cette magie pour sortir de la cage. En cas d'échec, la créature ne peut sortir de la cage et a dépensé cette utilisation de sort ou d'effet. La cage peut également s'étendre dans le plan éthéré pour bloquer les voyages éthérés. Ce sort ne peut pas être dissipé avec le sort dissipation de la magie."},
    {name:"Changement de forme",level:9,school:"Transmutation",time:"1 action",range:"Soi-même",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Druide","Magicien"],desc:"Vous prenez la forme d'une créature différente pour toute la durée du sort. La nouvelle forme peut être d'un FP inférieur ou égal à votre niveau. La créature ne peut pas être un mort-vivant ou un artificiel, et vous devez déjà avoir vu une créature de cette espèce au moins une fois. Vous vous transformez en un individu basique de cette espèce de créature, n'ayant ni niveau de classe ni de capacité de lanceur de sorts. Vos statistiques de jeu sont remplacées par celles de la créature choisie, vous conservez cependant votre alignement et vos valeurs d'Intelligence, de Sagesse, et de Charisme. Vous conservez également vos maîtrises de compétences et de jets de sauvegarde, et gagnez en plus celles de votre nouvelle forme. Si la créature possède les mêmes maîtrises que vous et que son bonus est supérieur au vôtre, utilisez le bonus de la créature. Vous ne pouvez utiliser ni les actions légendaires ni les actions de repaire de votre nouvelle forme. Votre total de points de vie et de dés de vie est celui de votre nouvelle forme. Lorsque vous revenez à votre forme normale, vous retrouvez les points de vie que vous aviez avant de vous transformez en une autre créature. Si vous revenez à votre forme normale parce que vous êtes tombé à 0 point de vie, les dégâts supplémentaires que vous avez reçus sont infligés à votre forme normale. Tant que les dégâts supplémentaires ne font pas tomber votre forme normale à 0 point de vie, vous ne devenez pas inconscient. Vous conservez le bénéfice de toutes vos capacités de classe, de race, ou de toute autre source, et pouvez les utiliser, à condition que votre nouvelle forme physique vous le permette. Vous ne pouvez pas utiliser les sens spéciaux que vous aviez (comme la vision dans le noir par exemple) à moins que votre nouvelle forme les ait également. Vous ne pouvez parler que si la créature est normalement capable de parler. Lorsque vous vous transformez, vous choisissez si votre équipement tombe sur le sol, fusionne avec votre nouvelle forme ou est porté par votre nouvelle forme. L'équipement porté fonctionne correctement, mais le MD décide pour chaque pièce d'équipement s'il est possible pour votre nouvelle forme de la porter, en fonction de la morphologie et de la taille de la créature. Votre équipement ne change pas de taille ou de forme pour s'adapter à votre nouvelle forme, et tout l'équipement que la nouvelle forme ne peut pas porter tombe sur le sol ou fusionne avec vous. L'équipement qui fusionne avec la nouvelle forme n'a aucun effet tant que vous restez sous cette forme. Pour toute la durée du sort, vous pouvez utiliser votre action pour changer de nouveau de forme avec les mêmes conditions et règles que pour la forme précédente, à une exception près : si votre nouvelle forme possède plus de points de vie que votre forme actuelle, votre nombre de points de vie reste le même."},
    {name:"Changement de plan",level:7,school:"Invocation",time:"1 action",range:"Contact",duration:"Instantanée",components:"V, S, M (diapason 250 po)",classes:["Clerc","Druide","Ensorceleur","Magicien","Occultiste","Paladin"],desc:"Vous et jusqu'à huit créatures consentantes qui vous tenez par les mains en formant un cercle, êtes transportés dans un plan d'existence différent. Vous pouvez spécifier une destination en termes généraux, comme la Cité d'Airain dans le plan élémentaire du feu ou le palace de Dispater au deuxième niveau des Neuf enfers, et vous apparaissez dans, ou à proximité de votre destination. Si vous essayez d'atteindre la Cité d'Airain par exemple, vous pourriez arriver dans la rue du Métal, devant ses Portes de cendres, ou regardant la cité depuis l'autre côté de la Mer de feu, à la discrétion du MD. Sinon, si vous connaissez la séquence des symboles d'un cercle de téléportation sur un autre plan d'existence, ce sort vous transporte jusqu'à ce cercle. Si le cercle de téléportation est trop petit pour contenir toutes les créatures que vous transportez, elles apparaissent dans l'espace inoccupé le plus proche du cercle. Vous pouvez utiliser ce sort pour bannir une créature non-consentante dans un autre plan. Choisissez une créature à portée et effectuez un jet d'attaque au corps à corps avec un sort contre elle. Si vous la touchez, la créature doit effectuer un jet de sauvegarde de Charisme. En cas d'échec, elle est transportée à un endroit aléatoire du plan d'existence que vous avez visé. Une créature transportée de la sorte devra trouver elle-même un moyen de revenir dans votre plan d'existence."},
    {name:"Couronne d'étoiles",level:7,school:"Évocation",time:"1 action",range:"Soi-même",duration:"1 heure",components:"V, S",classes:["Clerc","Druide","Magicien"],desc:"Sept particules étoilées apparaissent et orbitent autour de votre tête jusqu'à ce que le sort prenne fin. Vous pouvez utiliser une action bonus pour envoyer une de ces particules en direction d'une créature ou un objet dans un rayon de 36 mètres. Faites un jet d'attaque à distance. Si vous touchez, la cible subit 4d12 dégâts radiants. Dans tous les cas, la particule se consume. Le sort prend fin plus tôt si vous avez utilisé toutes les particules. Si vous avez 4 particules ou plus autour de votre tête, elles émettent une lumière vive dans un rayon de 9 mètres et une lumière faible sur 9 mètres supplémentaires. S'il vous reste 1 à 3 particules, elles émettent une lumière faible dans un rayon de 9 mètres. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 8 ou supérieur, le nombre de particules créées augmente de 2 pour chaque niveau d'emplacement au-delà du niveau 7."},

    {name:"Champ antimagie",level:8,school:"Abjuration",time:"1 action",range:"Soi-même (3m)",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Clerc","Magicien"],desc:"Une sphère invisible d'antimagie d'un rayon de 3 mètres vous englobe. Cet espace est dissocié de l'énergie magique qui s'étend dans le multivers. Dans la sphère, aucun sort ne peut être incanté, les créatures convoquées disparaissent et même les objets magiques deviennent ordinaires. Jusqu'à la fin du sort, la sphère reste centrée sur vous lors de vos mouvements. Les sorts et les autres effets magiques, sauf ceux générés par un artéfact ou une divinité, sont réprimés à l'intérieur de la sphère et ils ne peuvent plus y pénétrer. Un emplacement utilisé pour incanter un sort réprimé est dépensé. Un effet est nul lorsqu'il est réprimé mais le temps continue de s'écouler pour le décompte de sa durée. Effets ciblés. Les sorts et autres effets magiques, tels que projectile magique ou charme-personne, qui ciblent une créature ou un objet dans la sphère n'ont aucun effet sur la cible. Zones de magie. La zone d'un autre sort ou d'un effet magique, tel que boule de feu, ne peut s'étendre dans la sphère. Si la sphère se superpose à une zone de magie, la partie commune est réprimée. Par exemple, les flammes créées par un mur de feu sont réprimées à l'intérieur de la sphère, créant ainsi une ouverture dans le mur, si la portion commune est suffisamment grande. Sorts. Tout sort ou autre effet magique actif sur une créature ou un objet dans la sphère est réprimé pendant qu'il y est. Objets magiques. Les propriétés et les pouvoirs des objets magiques sont réprimés dans la sphère. Par exemple, une épée longue +1 présente dans la sphère fonctionne comme une épée longue ordinaire. Les propriétés et les pouvoirs d'une arme magique sont réprimés s'ils sont utilisés contre une cible dans la sphère ou si l'arme est maniée par un attaquant dans la sphère. Si une arme magique ou une pièce de munition quitte entièrement la sphère (par exemple, si vous décochez une flèche magique ou si vous lancez une lance vers une cible en dehors de la sphère), la répression de la magie de l'objet cesse aussitôt qu'il la quitte. Déplacement magique. La téléportation et les déplacements planaires ne fonctionnent pas dans la sphère, quelle que soit l'origine ou la destination d'un tel déplacement magique. Un portail vers un autre lieu, un autre monde ou un autre plan d'existence, autant qu'une ouverture vers un espace extradimensionnel comme celui créé par le sort corde enchantée, sont temporairement fermés tant qu'ils sont dans la sphère. Créatures et objets. Une créature ou un objet convoqué ou créé par magie disparait temporairement de la sphère. Une telle créature réapparait instantanément lorsque l'espace occupé par la créature n'est plus dans la sphère. Dissipation de la magie. Les sorts et les effets magiques tel que dissipation de la magie n'ont aucun effet sur la sphère. De même, les sphères créées par des sorts de champ antimagie ne s'annulent pas l'une l'autre."},
    {name:"Clone",level:8,school:"Nécromancie",time:"1 heure",range:"Contact",duration:"Instantanée",components:"V, S, M (diamant 1000 po, cuve scellée)",classes:["Magicien"],desc:"Ce sort crée le double inerte d'une créature vivante, servant de protection contre la mort. Ce clone se forme à l'intérieur du récipient utilisé par le sort et atteint sa taille maximale et sa maturité au bout de 120 jours ; vous pouvez également choisir d'avoir un clone d'une version plus jeune de la même créature. Ce clone reste inerte et persiste indéfiniment, tant que son contenant n'est pas dérangé. À n'importe quel moment, une fois le clone mature, si la créature originale meurt, son âme est transférée dans le clone, à condition que l'âme soit libre et qu'elle soit consentante à son retour à la vie. Le clone est physiquement identique à l'original et a la même personnalité, les mêmes souvenirs, et les mêmes caractéristiques, mais pas l'équipement d'origine. Le corps original de la créature reste où il est, s'il existe encore, il devient inerte et ne peut revenir à la vie tant que son âme est ailleurs."},
    {name:"Contrôle du climat",level:8,school:"Transmutation",time:"10 minutes",range:"Soi-même (7 km)",duration:"Concentration, 8 heures",components:"V, S, M",classes:["Clerc","Druide","Magicien"],desc:"Vous prenez le contrôle du climat sur 7,5 km autour de vous pour la durée du sort. Vous devez être à l'extérieur pour lancer ce sort. Vous déplacer à un endroit d'où vous n'avez pas une vue dégagée sur le ciel met fin au sort prématurément. Lorsque vous lancez ce sort, vous modifiez les conditions climatiques actuelles, qui sont déterminées par le MD en fonction du climat et de la saison. Vous pouvez modifier les précipitations, la température et le vent. Cela prend 1d4 x 10 minutes pour que de nouvelles conditions météorologiques prennent effets. Une fois qu'elles sont en place, vous pouvez les modifier à nouveau. Lorsque le sort prend fin, le climat retourne progressivement à la normale. Lorsque vous modifiez les conditions climatiques, cherchez l'état climatique actuel dans les tables ci-dessous et modifiez cet état d'un rang, inférieur ou supérieur. Lorsque vous modifiez le vent, vous pouvez en modifier la direction. Précipitation ÉtatCondition1Dégagé2Nuages légers3Ciel couvert ou brouillard4Pluie, neige ou grêle5Pluie torrentielle, tempête de grêle ou blizzard Température ÉtatCondition1Fournaise insoutenable2Chaud3Doux4Frais5Froid6Froid arctique Vent ÉtatCondition1Calme2Vent modéré3Vent fort4Vent violent5Ouragan"},

    {name:"Arrêt du temps",level:9,school:"Transmutation",time:"1 action",range:"Soi-même",duration:"Instantanée",components:"V",classes:["Ensorceleur","Magicien"],desc:"Figer le temps pour tous sauf vous: 1d4+1 tours pour agir seul. Tout effet touchant une créature met fin à l'arrêt.",source:"PHB"},
    {name:"Changement de forme",level:9,school:"Transmutation",time:"1 action",range:"Soi-même",duration:"Concentration, 1 heure",components:"V, S, M",classes:["Druide","Magicien"],desc:"Assumer la forme de n'importe quelle créature observée. Capacités et PV complets.",source:"PHB"},
    {name:"Contrat",level:9,school:"Enchantement",time:"1 heure",range:"Contact",duration:"Jusqu'à remplissement",components:"V, S, M (encre d'or 1000 po)",classes:["Occultiste"],desc:"Avec ce sort, vous tentez de vous attacher les services d'un céleste, d'un élémentaire, d'une fée ou d'un fiélon. La créature doit être à portée pendant toute la durée de l'incantation (typiquement, la créature est tout d'abord invoquée à l'intérieur d'un sort de cercle magique inversé, pour qu'elle ne puisse pas s'échapper, tandis que vous lancez ce sort). À la fin de l'incantation, la cible doit effectuer un jet de sauvegarde de Charisme. En cas d'échec, elle est tenue de vous servir pour toute la durée du sort. Si la créature a été invoquée ou a été créée par un autre sort, la durée du sort est étendue pour correspondre à celle du sort contrat. Une créature liée doit suivre vos instructions au mieux de ses capacités. Vous pouvez ordonner à la créature de vous accompagner lors de vos aventures, de garder un lieu, ou de délivrer un message. La créature obéit à la lettre à vos instructions, mais si la créature vous est hostile, elle interprétera vos ordres afin d'accomplir ses propres objectifs. Si la créature exécute complètement les instructions qu'elle a reçues avant que le sort ne prenne fin, elle voyage jusqu'à vous pour vous en informer si vous vous trouvez tous deux dans le même plan d'existence. Si vous êtes dans des plans d'existence différents, elle retourne à l'endroit où vous l'avez asservie et y reste jusqu'à ce que le sort prenne fin. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau supérieur, la durée du sort passe à 10 jours avec un emplacement de niveau 6, à 30 jours pour un niveau 7, à 180 jours pour un niveau 8, et elle passe à 1 an et 1 jour en utilisant un emplacement de niveau 9."},
