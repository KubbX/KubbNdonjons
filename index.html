<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire — RPG Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, where, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCVhG8iH0KiKyvGDPH2sh37u9DLgkPUgLQ",
            authDomain: "kubbndonjons.firebaseapp.com",
            projectId: "kubbndonjons",
            storageBucket: "kubbndonjons.firebasestorage.app",
            messagingSenderId: "875521195069",
            appId: "1:875521195069:web:550930281db865a35c7e54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- EXPORT DES FONCTIONS VERS LE BOUTONS HTML ---
        window._doLogin = () => {
            const e = document.getElementById('authEmail').value;
            const p = document.getElementById('authPass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Erreur : " + err.message));
        };

        window._doSignup = () => {
            const e = document.getElementById('authEmail').value;
            const p = document.getElementById('authPass').value;
            createUserWithEmailAndPassword(auth, e, p).catch(err => alert("Erreur : " + err.message));
        };

        window._doLogout = () => signOut(auth);

        // --- GESTION DE L'AFFICHAGE ---
        onAuthStateChanged(auth, user => {
            const authSc = document.getElementById('authScreen');
            const appSc = document.getElementById('appScreen');
            if (user) {
                authSc.style.display = 'none';
                appSc.style.display = 'block';
                console.log("Connecté en tant que :", user.email);
            } else {
                authSc.style.display = 'flex';
                appSc.style.display = 'none';
            }
        });
    </script>

    <style>
        :root { --p: #f2e8d5; --i: #2c1a0e; --g: #b8860b; --c: #8b1a1a; }
        body { background: #1a0f05; color: var(--i); font-family: 'Crimson Pro', serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #authScreen { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .auth-box { background: var(--p); padding: 40px; border-radius: 4px; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h1 { font-family: 'Cinzel'; font-size: 1.5rem; margin-bottom: 20px; color: var(--i); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--i); color: var(--g); border: none; font-family: 'Cinzel'; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #3d2514; }
        #appScreen { background: var(--p); padding: 40px; border-radius: 4px; width: 90%; max-width: 600px; display: none; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box">
        <h1>⚔ GRIMOIRE</h1>
        <input id="authEmail" type="email" placeholder="Email">
        <input id="authPass" type="password" placeholder="Mot de passe">
        <button onclick="_doLogin()">ENTRER</button>
        <button onclick="_doSignup()" style="background:none; color:var(--i); font-size:0.7rem; border:1px solid var(--i)">CRÉER UN COMPTE</button>
    </div>
</div>

<div id="appScreen">
    <h1 style="text-align: center;">BIENVENUE DANS TON GRIMOIRE</h1>
    <p style="text-align: center;">Ta session est active.</p>
    <button onclick="_doLogout()" style="background:var(--c); color:white;">SE DÉCONNECTER</button>
</div>

</body>
</html>
