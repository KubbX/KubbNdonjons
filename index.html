window._doLogin = () => {
  const e = document.getElementById('authEmail').value;
  const p = document.getElementById('authPass').value;
  signInWithEmailAndPassword(auth, e, p).catch(err => showAuthError(err.message));
};
window._doSignup = () => {
  const e = document.getElementById('authEmail').value;
  const p = document.getElementById('authPass').value;
  createUserWithEmailAndPassword(auth, e, p).catch(err => showAuthError(err.message));
};
window._doLogout = () => signOut(auth);
 
function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}
 
onAuthStateChanged(auth, user => {
  if (user) {
    currentUid = user.uid;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    loadCharacterList();
  } else {
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

window._showTab = (tabId) => {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
  const map = {'tab-list':'navList','tab-sheet':'navSheet','tab-gm':'navGM'};
  if(map[tabId]) document.getElementById(map[tabId]).classList.add('nav-active');
};

let wizardData = {};
let wizardStep = 1;
const WIZARD_STEPS = 5;
 
window._openForge = () => {
  wizardData = { stats:{str:8,dex:8,con:8,int:8,wis:8,cha:8}, skills:{}, pointsLeft:27, hitDice:[], hpMax:0 };
  wizardStep = 1;
  renderWizardStep();
  document.getElementById('forgeOverlay').style.display = 'flex';
};
window._closeForge = () => { document.getElementById('forgeOverlay').style.display = 'none'; };
 
function renderWizardStep() {
  const win = document.getElementById('forgeWindow');
  const progressEl = document.getElementById('forgeProgress');
  const labels = ['Identité','Race','Classe','Caractéristiques','Finalisation'];
  progressEl.innerHTML = labels.map((l,i) => `<div class="progress-step ${i+1===wizardStep?'active':i+1<wizardStep?'done':''}">${i+1<wizardStep?'✓':i+1}</div>`).join('<div class="progress-line"></div>');
 
  const content = document.getElementById('forgeContent');
  content.innerHTML = '';
 
  if (wizardStep === 1) renderStep1(content);
  else if (wizardStep === 2) renderStep2(content);
  else if (wizardStep === 3) renderStep3(content);
  else if (wizardStep === 4) renderStep4(content);
  else if (wizardStep === 5) renderStep5(content);
 
  document.getElementById('forgePrev').style.visibility = wizardStep > 1 ? 'visible' : 'hidden';
  document.getElementById('forgeNext').textContent = wizardStep === WIZARD_STEPS ? '⚔ DONNER VIE' : 'SUIVANT →';
}

    if(!wizardData.standardAssign) wizardData.standardAssign = {str:15,dex:14,con:13,int:12,wis:10,cha:8};

            ${opts.map(v=>`<option value="${v}" ${wizardData.standardAssign[s]==v?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>`).join('')}
      </div>`;
    wizardData.stats = {...wizardData.standardAssign};
  } else {
    cont.innerHTML = `<div class="pb-grid">${['str','dex','con','int','wis','cha'].map(s=>`
      <div class="pb-row">
        <span class="pb-label">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]}</span>
        <input type="number" min="1" max="20" value="${wizardData.stats[s]}" style="width:60px;text-align:center"
          onchange="window._manualStat('${s}',this.value)">

      </div>`).join('')}
    </div>`;
  }
};
 
window._pbAdjust = (stat, delta) => {
  const costs = {8:0,9:1,10:2,11:3,12:4,13:5,14:7,15:9};
  const cur = wizardData.stats[stat];
  const nv = Math.max(8, Math.min(15, cur + delta));
  const diff = (costs[nv]||0) - (costs[cur]||0);
  if(diff > 0 && wizardData.pointsLeft < diff) return;
  wizardData.stats[stat] = nv;
  wizardData.pointsLeft -= diff;
  document.getElementById(`pb_${stat}`).textContent = nv;
  document.getElementById('pbLeft').textContent = wizardData.pointsLeft;
};
window._assignStandard = (stat, val) => {
  wizardData.standardAssign[stat] = parseInt(val);
  wizardData.stats = {...wizardData.standardAssign};
};
window._manualStat = (stat, val) => { wizardData.stats[stat] = parseInt(val)||8; };

  if(wizardStep === 1) {
    wizardData.name = document.getElementById('w_name')?.value || '';

    wizardData.gender = document.getElementById('w_gender')?.value || '';

  } else if(wizardStep === 2) {

    wizardData.subrace = document.getElementById('w_subrace')?.value || '';

async function saveNewCharacter() {
  const rKey = wizardData.race;
  const srKey = wizardData.subrace;
  const cKey = wizardData.class;
  const rData = RACES[rKey] || {};
  const srData = srKey && rData.subraces ? rData.subraces[srKey] : null;
  const clData = CLASSES[cKey] || { hd:8, saves:[], skills:[] };
 
  const raceBonuses = srData?.stats || rData.stats || {};
  const finalStats = {};
  ['str','dex','con','int','wis','cha'].forEach(s => {
    finalStats[s] = (wizardData.stats[s]||8) + (raceBonuses[s]||0);
  });
 
  const conMod = mod(finalStats.con);
  const hpMax = clData.hd + conMod + (srData?.hpBonus||0);
  const profBonus = 2;
 
  // Skills proficiencies
  const allSkillProf = [...(wizardData.classSkills||[])];
  if(wizardData.background && BACKGROUNDS[wizardData.background]) {
    BACKGROUNDS[wizardData.background].skills.forEach(s => { if(!allSkillProf.includes(s)) allSkillProf.push(s); });
  }
  const skillProf = {};
  allSkillProf.forEach(s => skillProf[s] = 'prof');
 
  const saves = {};
  clData.saves.forEach(s => saves[s] = true);
 
  const newChar = {
    owner: currentUid,
    // Identité
    name: wizardData.name,
    age: wizardData.age||'',
    gender: wizardData.gender||'',
    alignment: wizardData.alignment||'',
    background: wizardData.background||'',
    ideals: wizardData.ideals||'',
    bonds: wizardData.bonds||'',
    flaws: wizardData.flaws||'',
    personality: wizardData.personality||'',
    appearance: wizardData.appearance||'',
    backstory: wizardData.backstory||'',
    // Identité de classe/race
    race: rKey,
    subrace: srKey||'',
    class: cKey,
    level: 1,
    xp: 0,
    // Stats
    stats: finalStats,
    // Combat
    hp: hpMax, hpMax,
    tmpHp: 0,
    ac: 10 + mod(finalStats.dex),
    speed: rData.speed||9,
    initiative: mod(finalStats.dex),
    profBonus,
    hitDice: `1d${clData.hd}`,
    deathSaves: { success:0, fail:0 },
    // Sauvegardes
    saveProficiencies: saves,
    // Compétences
    skillProficiencies: skillProf,
    // Inventaire
    cp:0, sp:0, ep:0, gp:10, pp:0,
    equipment: clData.equipment||'',
    weapons: '',
    armor: '',
    // Sorts
    spellcaster: clData.spellcaster||false,
    spellAbility: clData.spellAbility||'',
    spellAttackBonus: clData.spellcaster ? (profBonus + mod(finalStats[clData.spellAbility]||8)) : 0,
    spellSaveDC: clData.spellcaster ? (8 + profBonus + mod(finalStats[clData.spellAbility]||8)) : 0,
    spells: {},
    // Traits
    features: (clData.features||[]).map(f=>({name:f.name,desc:f.desc})),
    traits: [...(rData.traits||[]),...(srData?.traits||[])],
    // Méta
    inspiration: false,
    notes: '',
    createdAt: new Date().toISOString()
  };
 
  await addDoc(collection(db, "characters"), newChar);
  window._closeForge();
}

window._selectChar = (id) => {
  activeCharId = id;
  if(activeCharUnsubscribe) activeCharUnsubscribe();
  activeCharUnsubscribe = onSnapshot(doc(db, "characters", id), (snap) => {
    if(!snap.exists()) return;
    renderCharSheet(snap.id, snap.data());
  });
  window._showTab('tab-sheet');
};

function mod(score) { return Math.floor((score - 10) / 2); }
function fmtMod(score) { const m = mod(score); return (m>=0?'+':'')+m; }
function profBonus(level) { return PROF_BONUS[(level||1)-1] || 2; }
 
function renderCharSheet(id, d) {
  const pb = profBonus(d.level);
  const stats = d.stats || {str:10,dex:10,con:10,int:10,wis:10,cha:10};

  // Skill bonus
  function skillBonus(skill) {
    const s = SKILLS_LIST.find(x=>x.name===skill);
    if(!s) return 0;
    const base = mod(stats[s.stat]||10);
    const prof = d.skillProficiencies?.[skill];
    if(prof==='expert') return base + pb*2;
    if(prof==='prof') return base + pb;
    return base;
  }
  function saveBonus(stat) {
    const base = mod(stats[stat]||10);
    return d.saveProficiencies?.[stat] ? base + pb : base;
  }
  function fmtB(v) { return (v>=0?'+':'')+v; }
 
  sheet.innerHTML = `
  <div class="sheet-header">
    <div class="sheet-name-block">
      <div class="sheet-name editable" data-field="name" data-type="text">${d.name}</div>
      <div class="sheet-subtitle">${d.subrace?d.subrace+' ':''}${d.race||'—'} · ${d.class||'—'} · Niveau <span class="editable inline-edit" data-field="level" data-type="number">${d.level||1}</span></div>
    </div>
    <div class="sheet-combat-row">
      <div class="combat-box">
        <div class="combat-label">PV</div>
        <div class="combat-val editable" data-field="hp" data-type="number">${d.hp}</div>
        <div class="combat-sub">/ <span class="editable inline-edit" data-field="hpMax" data-type="number">${d.hpMax}</span></div>
      </div>
      <div class="combat-box">
        <div class="combat-label">PV Temporaires</div>
        <div class="combat-val editable" data-field="tmpHp" data-type="number">${d.tmpHp||0}</div>
      </div>
      <div class="combat-box">
        <div class="combat-label">CA</div>
        <div class="combat-val editable" data-field="ac" data-type="number">${d.ac}</div>
      </div>

async function startInlineEdit(el, charId, charData) {
  if(el.querySelector('input,textarea')) return;
  const field = el.dataset.field;
  const type = el.dataset.type;
  const currentVal = getNestedVal(charData, field);
 
  let input;
  if(type === 'textarea') {
    input = document.createElement('textarea');
    input.rows = 3;
  } else {
    input = document.createElement('input');
    input.type = type==='number'?'number':'text';
  }
  input.value = type==='bool' ? (currentVal?'true':'false') : (currentVal||'');
  input.className = 'inline-input';
  const orig = el.innerHTML;
  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
 
  const save = async () => {
    let val = input.value;
    if(type==='number') val = parseFloat(val)||0;
    if(type==='bool') val = (val==='true'||val==='★'||val===true);
    const update = buildNestedUpdate(field, val);
    try { await updateDoc(doc(db, "characters", charId), update); } catch(e) { el.innerHTML = orig; }
  };
 
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if(e.key==='Enter' && type!=='textarea') { e.preventDefault(); input.blur(); } if(e.key==='Escape') { el.innerHTML = orig; } });
}
 
function getNestedVal(obj, path) {
  return path.split('.').reduce((o,k) => o?.[k], obj);
}
function buildNestedUpdate(field, val) {
  return { [field]: val };
}
 
// ============================================================
// ÉCRAN DU MAÎTRE
// ============================================================
let gmWatches = {};
 
window._watchChar = () => {
  const id = document.getElementById('gmSearchId').value.trim();
  if(!id) return;
  if(gmWatches[id]) return;
 
  const unsub = onSnapshot(doc(db, "characters", id), (snap) => {
    if(!snap.exists()) { alert("Fiche introuvable"); return; }
    renderGMCard(snap.id, snap.data());
  });
  gmWatches[id] = unsub;
};
 
window._removeGMWatch = (id) => {
  if(gmWatches[id]) { gmWatches[id](); delete gmWatches[id]; }
  const card = document.getElementById(`gm_${id}`);
  if(card) card.remove();
};
 
function renderGMCard(id, d) {
  const monitor = document.getElementById('gmMonitor');
  let card = document.getElementById(`gm_${id}`);
  if(!card) {
    card = document.createElement('div');
    card.id = `gm_${id}`;
    card.className = 'gm-card';
    monitor.appendChild(card);
  }
  const hpPct = Math.max(0, Math.min(100, Math.round((d.hp/d.hpMax)*100)));
  const hpColor = hpPct>60?'#4caf50':hpPct>30?'#ff9800':'#f44336';
  const pb = profBonus(d.level);
  const stats = d.stats||{str:10,dex:10,con:10,int:10,wis:10,cha:10};
 
  card.innerHTML = `
    <div class="gm-card-header">
      <div>
        <div class="gm-card-name">${d.name}</div>
        <div class="gm-card-sub">${d.subrace?d.subrace+' ':''}${d.race||'—'} · ${d.class||'—'} Niv.${d.level||1} · ${d.alignment||'—'}</div>
      </div>
      <button class="btn-remove" onclick="window._removeGMWatch('${id}')">✕</button>
    </div>
    <div class="gm-hp-bar-wrap">
      <div class="gm-hp-bar" style="width:${hpPct}%;background:${hpColor}"></div>
    </div>
    <div class="gm-stats-row">
      <div class="gm-stat"><span class="gm-stat-label">PV</span><span class="gm-stat-val" style="color:${hpColor}">${d.hp}/${d.hpMax}</span></div>
      <div class="gm-stat"><span class="gm-stat-label">PV tmp</span><span class="gm-stat-val">${d.tmpHp||0}</span></div>
      <div class="gm-stat"><span class="gm-stat-label">CA</span><span class="gm-stat-val">${d.ac}</span></div>
      <div class="gm-stat"><span class="gm-stat-label">Vit.</span><span class="gm-stat-val">${d.speed||9}m</span></div>
      <div class="gm-stat"><span class="gm-stat-label">Init.</span><span class="gm-stat-val">${fmtMod(stats.dex)}</span></div>
      <div class="gm-stat"><span class="gm-stat-label">BM</span><span class="gm-stat-val">+${pb}</span></div>
    </div>
    <div class="gm-chars-row">
      ${['str','dex','con','int','wis','cha'].map(s=>`
        <div class="gm-char"><div class="gm-char-lbl">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]}</div>
        <div class="gm-char-val">${stats[s]||10}</div>
        <div class="gm-char-mod">${fmtMod(stats[s]||10)}</div></div>`).join('')}
    </div>
    <div class="gm-ds-row">
      <span>Mort: </span>
      ${[1,2,3].map(i=>`<span class="gm-ds ${(d.deathSaves?.success||0)>=i?'success':''}">✓</span>`).join('')}
      ${[1,2,3].map(i=>`<span class="gm-ds ${(d.deathSaves?.fail||0)>=i?'fail':''}">✗</span>`).join('')}
      <span style="margin-left:10px">Inspiration: ${d.inspiration?'★':'☆'}</span>
    </div>
    <div class="gm-actions">
      <label class="gm-action-label">Modifier PV:</label>
      <input id="gmhp_${id}" type="number" class="gm-input" placeholder="±">
      <button class="btn-gm-action heal" onclick="window._gmHeal('${id}')">Soigner</button>
      <button class="btn-gm-action dmg" onclick="window._gmDamage('${id}')">Blessure</button>
    </div>
    <details class="gm-notes">
      <summary>Notes MJ</summary>
      <textarea class="gm-notes-area" id="gmnotes_${id}" placeholder="Notes sur ce personnage...">${d.gmNotes||''}</textarea>
      <button class="btn-gm-action" onclick="window._saveGMNotes('${id}')">Sauvegarder</button>
    </details>`;
}
 
window._gmHeal = async (id) => {
  const val = parseInt(document.getElementById(`gmhp_${id}`)?.value)||0;
  const snap = await getDoc(doc(db, "characters", id));
  if(!snap.exists()) return;
  const d = snap.data();
  const newHp = Math.min(d.hpMax, (d.hp||0) + Math.abs(val));
  await updateDoc(doc(db, "characters", id), {hp: newHp});
};
window._gmDamage = async (id) => {
  const val = parseInt(document.getElementById(`gmhp_${id}`)?.value)||0;
  const snap = await getDoc(doc(db, "characters", id));
  if(!snap.exists()) return;
  const d = snap.data();
  const newHp = Math.max(0, (d.hp||0) - Math.abs(val));
  await updateDoc(doc(db, "characters", id), {hp: newHp});
};
window._saveGMNotes = async (id) => {
  const notes = document.getElementById(`gmnotes_${id}`)?.value||'';
  await updateDoc(doc(db, "characters", id), {gmNotes: notes});
};
 
// Wizard nav
window._wizardPrev = window._wizardPrev || function(){};

  overflow:hidden; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.7); border:1px solid var(--gold); }
.forge-top { background:linear-gradient(135deg, var(--ink), #3d1f06); padding:18px 24px; }

.forge-progress { display:flex; align-items:center; margin-top:14px; }
.progress-step { width:28px; height:28px; border-radius:50%; border:2px solid #666; color:#666; display:flex;
  align-items:center; justify-content:center; font-size:0.75rem; font-family:'Cinzel'; transition:all 0.3s; flex-shrink:0; }
.progress-step.active { border-color:var(--gold); color:var(--gold); box-shadow:0 0 10px rgba(184,134,11,0.5); }
.progress-step.done { border-color:var(--gold); background:var(--gold); color:#fff; }
.progress-line { flex:1; height:2px; background:#444; }
.progress-line.done { background:var(--gold); }
#forgeContent { flex:1; overflow-y:auto; padding:20px 24px; }
.step-title { font-family:'Cinzel'; color:var(--gold); font-size:1rem; margin-bottom:16px; letter-spacing:2px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.field-group { margin:12px 0; }
.field-group label { display:block; font-size:0.78rem; font-family:'Cinzel'; letter-spacing:1px; color:#666; margin-bottom:4px; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.info-box { background:#fff8ee; border:1px solid #e0c880; padding:10px 14px; border-radius:3px; font-size:0.82rem;
  line-height:1.6; color:#555; }
.pb-header { margin:8px 0; color:var(--gold); font-family:'Cinzel'; font-size:0.82rem; }
.pb-grid { display:flex; flex-direction:column; gap:6px; }
.pb-row { display:flex; align-items:center; gap:10px; }
.pb-label { font-family:'Cinzel'; font-size:0.75rem; width:36px; color:var(--gold); }
.pb-btn { width:26px; height:26px; border:1px solid var(--gold); background:transparent; color:var(--gold);
  cursor:pointer; border-radius:3px; font-size:1rem; line-height:1; transition:all 0.15s; }
.pb-btn:hover { background:var(--gold); color:#fff; }
.pb-val { min-width:28px; text-align:center; font-size:1.05rem; font-weight:600; }
.pb-mod { color:#888; font-size:0.82rem; }
.skill-check-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:4px; }
.skill-check { display:flex; align-items:center; gap:6px; font-size:0.85rem; cursor:pointer; padding:3px; border-radius:2px; }
.skill-check:hover { background:#f0e8d8; }
.skill-check input { width:auto; }
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.summary-section { background:#fff8ee; border:1px solid #e0c880; padding:12px; border-radius:3px; }
.summary-section h4 { font-family:'Cinzel'; font-size:0.78rem; color:var(--gold); margin-bottom:8px; }
.summary-section p { font-size:0.85rem; margin:3px 0; }
.stat-mini-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.stat-mini { background:white; border:1px solid #d4c4a0; border-radius:3px; padding:4px; text-align:center; }
.stat-mini-name { font-family:'Cinzel'; font-size:0.65rem; color:var(--gold); display:block; }
.stat-mini-val { font-size:1rem; font-weight:600; display:block; }
.stat-mini-mod { font-size:0.78rem; color:#666; display:block; }
.forge-footer { padding:14px 24px; background:#f0e8d8; border-top:1px solid #d4c4a0; display:flex; justify-content:space-between; align-items:center; }
.btn-prev { background:transparent; border:1px solid #aaa; color:#666; padding:10px 20px; cursor:pointer; font-family:'Cinzel'; font-size:0.75rem; border-radius:3px; }
.btn-prev:hover { border-color:var(--ink); color:var(--ink); }
 
/* ── CHARACTER SHEET ── */
#tab-sheet { background:var(--parch); min-height:100vh; }
.sheet-header { background:linear-gradient(135deg, var(--ink) 0%, #3d2010 100%); padding:18px 24px; border-bottom:3px solid var(--gold); }
.sheet-name { font-family:'Cinzel'; font-size:1.6rem; color:var(--gold); margin-bottom:4px; }
.sheet-subtitle { color:#c9a860; font-size:0.9rem; }
.sheet-combat-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.combat-box { background:rgba(255,255,255,0.08); border:1px solid rgba(184,134,11,0.4); border-radius:4px;
  padding:6px 12px; text-align:center; min-width:70px; }
.combat-box.inspired { background:rgba(184,134,11,0.2); }
.combat-label { font-size:0.6rem; font-family:'Cinzel'; color:#a89060; letter-spacing:1px; display:block; }
.combat-val { font-size:1.3rem; color:#fff; font-weight:600; cursor:pointer; }
.combat-sub { font-size:0.78rem; color:#a89060; }
 
.sheet-body { display:grid; grid-template-columns:200px 1fr 260px; gap:0; }
.sheet-col-left, .sheet-col-center, .sheet-col-right { padding:16px; border-right:1px solid #d4c4a0; }
.sheet-col-right { border-right:none; }
.sheet-section { margin-bottom:14px; background:#fff; border:1px solid #ddd; border-radius:3px; overflow:hidden; }
.section-title { background:linear-gradient(90deg, var(--ink), #3d2010); color:var(--gold); font-family:'Cinzel';
  font-size:0.65rem; letter-spacing:2px; padding:5px 10px; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#eee; padding:1px; }
.stat-box { background:#fff; padding:8px 4px; text-align:center; }
.stat-label { font-family:'Cinzel'; font-size:0.55rem; color:var(--gold); letter-spacing:1px; display:block; }
.stat-mod { font-size:1.1rem; font-weight:700; color:var(--ink); }
.stat-val { font-size:0.9rem; color:#666; cursor:pointer; border-bottom:1px dashed #ccc; }
.save-list, .skill-list { padding:6px 10px; }
.save-row, .skill-row { display:flex; align-items:center; gap:6px; padding:2px 0; font-size:0.82rem; }
.prof-dot { width:9px; height:9px; border-radius:50%; border:1px solid #aaa; flex-shrink:0; }
.prof-dot.filled { background:var(--gold); border-color:var(--gold); }
.save-val, .skill-val { min-width:28px; font-weight:600; font-size:0.82rem; text-align:right; }
.save-name, .skill-name { color:#444; }
.skill-name small { color:#999; }
.passive-row { display:flex; justify-content:space-between; padding:5px 10px; font-size:0.85rem; }
.passive-row:not(:last-child) { border-bottom:1px solid #f0e8d8; }
 
.hd-row { display:flex; gap:16px; padding:10px; }
.death-saves { font-size:0.82rem; }
.ds-row { margin:3px 0; display:flex; align-items:center; gap:4px; }
.ds-dot { width:12px; height:12px; border-radius:50%; border:2px solid #ccc; display:inline-block; }
.ds-dot.success { background:#4caf50; border-color:#4caf50; }
.ds-dot.fail { background:#f44336; border-color:#f44336; }
 
.weapon-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
.weapon-table th { background:var(--ink); color:var(--gold); font-family:'Cinzel'; font-size:0.6rem; letter-spacing:1px; padding:5px 8px; }
.weapon-table td { padding:6px 8px; border-bottom:1px solid #f0e8d8; cursor:pointer; }
.weapon-table td:hover { background:#fffbf0; }
 
.coin-row { display:flex; gap:4px; padding:8px; }
.coin-box { flex:1; background:#fff8ee; border:1px solid #e0c880; border-radius:3px; text-align:center; padding:6px 2px; }
.coin-label { font-family:'Cinzel'; font-size:0.55rem; color:var(--gold); display:block; }
.coin-val { font-size:0.95rem; font-weight:600; cursor:pointer; }
 
.spell-stats { display:flex; gap:8px; padding:8px; }
.spell-stat-box { flex:1; text-align:center; }
.spell-slots { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; padding:0 8px 8px; font-size:0.8rem; }
.spell-level { background:#f9f4ea; border:1px solid #e0d0b0; border-radius:2px; padding:3px 5px; }
.spell-lvl-num { font-family:'Cinzel'; font-size:0.6rem; color:var(--gold); display:block; }
 
.rp-block { padding:6px 10px; }
.rp-block label { font-size:0.65rem; font-family:'Cinzel'; color:var(--gold); display:block; margin-bottom:2px; letter-spacing:1px; }
.features-list { padding:6px 10px; max-height:160px; overflow-y:auto; }
.feature-item { font-size:0.82rem; margin:4px 0; color:#444; line-height:1.4; }
.info-grid { padding:6px 10px; }
.info-row { display:flex; justify-content:space-between; font-size:0.82rem; padding:3px 0; border-bottom:1px solid #f0e8d8; }
 
/* Inline edit */
.editable { cursor:pointer; border-radius:2px; transition:background 0.15s; }
.editable:hover { background:rgba(184,134,11,0.1); }
.inline-input { border:1px solid var(--gold)!important; margin:0!important; padding:2px 6px!important; font-size:inherit; width:100%; }
.block-edit { padding:4px 10px; font-size:0.85rem; min-height:24px; white-space:pre-wrap; word-break:break-word; line-height:1.5; }
 
/* ── GM TAB ── */
#tab-gm { background:var(--bg); min-height:100vh; padding:20px; }
#tab-gm h2 { font-family:'Cinzel'; color:var(--gold); font-size:1.3rem; margin-bottom:16px; letter-spacing:3px; }
.gm-search { display:flex; gap:8px; margin-bottom:20px; }
.gm-search input { background:#2a1a0a; border-color:#555; color:#ddd; max-width:420px; }
#gmMonitor { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
.gm-card { background:var(--parch); border:1px solid var(--gold); border-radius:4px; overflow:hidden; }
.gm-card-header { padding:12px 14px; background:linear-gradient(135deg, var(--ink), #3d2010);
  display:flex; justify-content:space-between; align-items:flex-start; }
.gm-card-name { font-family:'Cinzel'; color:var(--gold); font-size:1rem; }
.gm-card-sub { color:#a89060; font-size:0.78rem; margin-top:2px; }
.btn-remove { background:transparent; border:1px solid #884444; color:#cc4444; padding:3px 8px;
  cursor:pointer; border-radius:2px; font-size:0.75rem; }
.gm-hp-bar-wrap { height:8px; background:#eee; }
.gm-hp-bar { height:100%; transition:width 0.5s ease, background 0.5s; }
.gm-stats-row { display:flex; gap:8px; padding:10px 14px; background:#f9f4ea; }
.gm-stat { flex:1; text-align:center; }
.gm-stat-label { display:block; font-family:'Cinzel'; font-size:0.58rem; color:var(--gold); }
.gm-stat-val { font-size:1rem; font-weight:700; }
.gm-chars-row { display:flex; padding:8px 14px; gap:4px; }
.gm-char { flex:1; text-align:center; background:#fff; border:1px solid #e0d0b0; border-radius:3px; padding:4px 2px; }
.gm-char-lbl { font-family:'Cinzel'; font-size:0.55rem; color:var(--gold); display:block; }
.gm-char-val { font-size:0.95rem; font-weight:600; }
.gm-char-mod { font-size:0.72rem; color:#888; }
.gm-ds-row { padding:6px 14px; font-size:0.82rem; display:flex; align-items:center; gap:4px; background:#f0e8d8; }
.gm-ds { display:inline-flex; width:18px; height:18px; border-radius:50%; border:1px solid #ccc; align-items:center; justify-content:center; font-size:0.7rem; }
.gm-ds.success { background:#4caf50; color:#fff; border-color:#4caf50; }
.gm-ds.fail { background:#f44336; color:#fff; border-color:#f44336; }
.gm-actions { padding:10px 14px; display:flex; align-items:center; gap:6px; }
.gm-action-label { font-size:0.78rem; font-family:'Cinzel'; color:#666; }
.gm-input { width:60px!important; padding:5px 8px!important; margin:0!important; text-align:center; }
.btn-gm-action { padding:6px 12px; border:none; cursor:pointer; font-family:'Cinzel'; font-size:0.68rem; border-radius:3px; }
.btn-gm-action.heal { background:#3a7a3a; color:#fff; }
.btn-gm-action.dmg { background:var(--red); color:#fff; }
.btn-gm-action:not(.heal):not(.dmg) { background:var(--gold); color:#fff; }
.gm-notes { padding:8px 14px; }
.gm-notes summary { cursor:pointer; font-family:'Cinzel'; font-size:0.72rem; color:var(--gold); letter-spacing:1px; }
.gm-notes-area { width:100%; margin-top:6px; }
 
/* Responsive */
@media(max-width:900px) {
  .sheet-body { grid-template-columns:1fr; }
  .sheet-col-left, .sheet-col-center { border-right:none; border-bottom:1px solid #d4c4a0; }
  .summary-grid { grid-template-columns:1fr; }
}
@media(max-width:600px) {
  .sheet-combat-row { gap:5px; }
  .combat-box { min-width:55px; padding:5px 8px; }
}
</style>
</head>
<body>
 
<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-title">GRIMOIRE</div>
    <div class="auth-sub">Compagnon de Campagne D&D 5e</div>
    <div id="authError"></div>
    <input id="authEmail" type="email" placeholder="Email">
    <input id="authPass" type="password" placeholder="Mot de passe">
    <button class="btn-gold" style="width:100%;margin-top:8px" onclick="window._doLogin()">SE CONNECTER</button>
    <button style="background:none;border:none;width:100%;color:#888;font-size:0.78rem;margin-top:10px;cursor:pointer;font-family:'Crimson Pro'" onclick="window._doSignup()">Pas encore de compte ? Créer un accès</button>
  </div>
</div>
 
<!-- APP -->
<div id="appScreen" style="display:none">
  <nav>
    <button id="navList" class="nav-active" onclick="_showTab('tab-list')">MES HÉROS</button>
    <button id="navSheet" onclick="_showTab('tab-sheet')">FICHE</button>
    <button id="navGM" onclick="_showTab('tab-gm')">MAÎTRE DU JEU</button>
    <button onclick="_doLogout()">QUITTER</button>
  </nav>
 
  <!-- Liste -->
  <div id="tab-list" class="tab-content active">
    <h2>Vos Chroniques</h2>
    <div id="charList"></div>
    <button class="btn-gold" style="margin-top:24px;width:100%;max-width:700px;display:block;margin-left:auto;margin-right:auto" onclick="window._openForge()">+ FORGER UN NOUVEAU HÉROS</button>
  </div>
 
  <!-- Fiche -->
  <div id="tab-sheet" class="tab-content">
    <div style="padding:40px;text-align:center;color:#888;font-style:italic">
      Sélectionne un personnage pour voir sa fiche
    </div>
  </div>
 
  <!-- GM -->
  <div id="tab-gm" class="tab-content">
    <h2>Écran du Maître</h2>
    <div class="gm-search">
      <input id="gmSearchId" type="text" placeholder="Coller l'ID du personnage à surveiller">
      <button class="btn-gold" onclick="window._watchChar()">AJOUTER</button>
    </div>
    <div id="gmMonitor">
      <p style="color:#666;font-style:italic">Collez l'ID d'une fiche pour la surveiller en temps réel. Plusieurs personnages peuvent être affichés simultanément.</p>
    </div>
  </div>
</div>
 
<!-- WIZARD FORGE -->
<div id="forgeOverlay">
  <div class="forge-window">
    <div class="forge-top">
      <h2>⚔ La Forge du Héros</h2>
      <div id="forgeProgress" class="forge-progress"></div>
    </div>
    <div id="forgeContent"></div>
    <div class="forge-footer">
      <button id="forgePrev" class="btn-prev" onclick="window._wizardPrev()">← Précédent</button>
      <span id="forgeStepLabel" style="font-family:'Cinzel';font-size:0.7rem;color:#888;letter-spacing:1px"></span>
      <button id="forgeNext" class="btn-gold" onclick="window._wizardNext()">SUIVANT →</button>
    </div>
  </div>
</div>
 
</body>
</html>
