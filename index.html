    {name:"Portail",level:9,school:"Invocation",time:"1 action",range:"36m",duration:"Concentration, 1 minute",components:"V, S, M (diamant 5000 po)",classes:["Clerc","Ensorceleur","Magicien"],desc:"Portail vers n'importe quel plan ou lieu. Peut forcer une créature nommée à traverser (JdS CHA).",source:"PHB"},
    {name:"Prémonition",level:9,school:"Divination",time:"1 minute",range:"Contact",duration:"8 heures",components:"V, S, M",classes:["Barde","Druide","Magicien"],desc:"Impossible à surprendre, avantage à tous les jets. Avertit des dangers imminents.",source:"PHB"},
    {name:"Projection astrale",level:9,school:"Invocation",time:"1 heure",range:"3m",duration:"Spéciale",components:"V, S, M (jacinthes 1100 po + c. argent 25 po/créature)",classes:["Clerc","Magicien","Occultiste"],desc:"Envoyer jusqu'à 8 créatures dans le Plan astral avec corps argenté.",source:"PHB"},
    {name:"Résurrection suprême",level:9,school:"Nécromancie",time:"1 heure",range:"Contact",duration:"Instantanée",components:"V, S, M (matériaux 25000 po)",classes:["Clerc","Druide","Paladin"],desc:"Ramener un mort (n'importe quand, même en poussière). Le corps peut être recréé.",source:"PHB"},
    {name:"Souhait",level:9,school:"Invocation",time:"1 action",range:"Soi-même",duration:"Instantanée",components:"V",classes:["Ensorceleur","Magicien"],desc:"Sort le plus puissant. Dupliquer tout sort niv.≤8 ou modifier la réalité. Risques si usage répété.",source:"PHB"},
    {name:"Tempête vengeresse",level:9,school:"Invocation",time:"1 action",range:"Soi-même (1,5m rayon)",duration:"Concentration, 1 minute",components:"V, S",classes:["Druide"],desc:"Tempête (36m rayon): vents, pluie (désavantage PER), éclairs par action bonus (3d10 foudre, JdS DEX).",source:"PHB"},

    // ── SORTS ADDITIONNELS (aidedd.org) ──
    {name:"Lumières dansantes",level:0,school:"Évocation",time:"1 action",range:"36m",duration:"Concentration, 1 minute",components:"V, S, M (phosphore, bioluminescence ou verre de lampe)",classes:["Artificier","Barde","Ensorceleur","Magicien"],desc:"Crée jusqu'à 4 lumières de la taille d'une torche (déplaçables de 18m/round). Option: forme humanoïde lumineuse.",source:"PHB"},
    {name:"Sens des pièges",level:0,school:"Divination",time:"1 action",range:"Soi-même",duration:"Jusqu'à 6 rounds",components:"V",classes:["Rôdeur"],desc:"Sort mineur de rôdeur: perception accrue des pièges mécaniques et magiques dans un rayon de 9m.",source:"PHB"},
    {name:"Trait ensorcelé",level:0,school:"Enchantement",time:"1 action",range:"36m",duration:"Concentration, 1 round",components:"V, S",classes:["Occultiste"],desc:"Attaque à distance: 1d6 psychique. La cible subit désavantage au prochain JS avant la fin de votre prochain tour. +1d6 aux niveaux 5, 11, 17.",source:"PHB"},
    {name:"Aura de pureté",level:4,school:"Abjuration",time:"1 action",range:"Soi-même (9m)",duration:"Concentration, 10 minutes",components:"V",classes:["Paladin"],desc:"Créatures amies dans 9m (dont vous): immunité aux maladies, résistance aux dégâts de poison, avantage aux JS CON/DEX/SAG contre magie.",source:"PHB"},
    {name:"Boule de feu à retardement",level:7,school:"Évocation",time:"1 action",range:"45m",duration:"Concentration, 1 minute",components:"V, S, M (une bille de fer et un peu de soufre)",classes:["Ensorceleur","Magicien"],desc:"Bille lumineuse qui explose (6m rayon) au contact ou après 1 minute: 12d6 feu +1d6/round passé (max +6d6). JdS DEX moitié. +1d6/niveau au-delà du 7e.",source:"PHB"},
    {name:"Charme-monstre",level:5,school:"Enchantement",time:"1 action",range:"9m",duration:"1 heure",components:"V, S",classes:["Barde","Ensorceleur","Magicien","Occultiste","Druide"],desc:"Vous essayez de charmer une créature que vous pouvez voir à portée. Celle-ci doit effectuer un jet de sauvegarde de Sagesse, avec un avantage si vous ou vos compagnons la combattez. En cas d'échec, vous la charmez jusqu'à la fin du sort ou jusqu'à ce que vous ou vos compagnons lui fassiez quelque chose de nuisible. La créature charmée est amicale avec vous. Lorsque le sort prend fin, la créature sait que vous l'avez charmée. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 5 ou supérieur, vous pouvez cibler une créature supplémentaire pour chaque niveau d'emplacement au-delà du niveau 4. Les créatures doivent être à 9 mètres ou moins les unes des autres lorsque vous les ciblez."},
    {name:"Clairvoyance",level:3,school:"Divination",time:"10 minutes",range:"1,5 km",duration:"Concentration, 10 minutes",components:"V, S, M (corne de verre sculptée valant 100 po)",classes:["Barde","Clerc","Ensorceleur","Magicien"],desc:"Vous créez un détecteur invisible, à portée, dans une zone qui vous est familière (un endroit que vous avez visité ou déjà vu) ou dans une zone évidente qui ne vous est pas familière (comme l'autre côté d'une porte, derrière un angle ou dans un bosquet). Le détecteur reste en place pour la durée du sort, il ne peut pas être attaqué ou être en interaction avec quoi que ce soit. Lorsque vous lancez le sort, vous choisissez de voir ou d'entendre. Vous pouvez utiliser le sens choisi au travers du détecteur comme si vous étiez à sa place. En utilisant votre action, vous pouvez alterner entre la vue et l'audition via le détecteur. Une créature qui peut voir le détecteur (comme une créature bénéficiant du sort voir l'invisible ou de vision véritable) voit un orbe lumineux et intangible de la taille de votre poing."},
    {name:"Colonne de flamme",level:5,school:"Évocation",time:"1 action",range:"18m",duration:"Instantanée",components:"V, S, M (une pincée de soufre)",classes:["Clerc","Druide"],desc:"Une colonne verticale de feu divin dévale des cieux vers un endroit que vous spécifiez dans la portée du sort. Chaque créature située dans un cylindre de 3 mètres de rayon et de 12 mètres de haut centré sur le point spécifié doit effectuer un jet de sauvegarde de Dextérité, subissant 4d6 dégâts de feu et 4d6 dégâts radiants en cas d'échec, ou la moitié de ces dégâts en cas de réussite. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 6 ou supérieur, les dégâts de feu ou les dégâts radiants (selon votre choix) sont augmentés de 1d6 pour chaque niveau d'emplacement au-delà du niveau 5."},
    {name:"Communication avec les morts",level:3,school:"Nécromancie",time:"1 action",range:"3m",duration:"10 minutes",components:"V, S, M (encens brûlant)",classes:["Barde","Clerc"],desc:"Vous accordez un semblant de vie et d'intelligence à un cadavre de votre choix dans la portée du sort, ce qui lui permet de répondre aux questions que vous lui posez. Le cadavre doit encore avoir une bouche et ne peut pas être un mort-vivant. Le sort échoue si le cadavre a été la cible de ce sort durant les 10 derniers jours. Jusqu'à ce que le sort se termine, vous pouvez poser cinq questions au cadavre. Le cadavre ne connaît que ce qu'il savait durant son vivant, y compris les langues. Les réponses sont généralement brèves, énigmatiques ou répétitives, et le cadavre n'est pas obligé de donner une réponse honnête si vous lui êtes hostile ou s'il vous reconnaît comme étant un ennemi. Ce sort ne permet pas le retour de l'âme de la créature à son corps ; il ne fait qu'animer son esprit. Ainsi, le défunt ne peut pas apprendre de nouvelles informations, ne comprend pas tout ce qui s'est passé depuis son trépas et ne peut pas spéculer sur les événements futurs."},
    {name:"Communication avec les plantes",level:3,school:"Transmutation",time:"1 action",range:"Soi-même (9m)",duration:"10 minutes",components:"V, S",classes:["Barde","Druide","Rôdeur"],desc:"Vous procurez aux plantes dans un rayon de 9 mètres autour de vous une sensibilité et une animation limitée, leur donnant la capacité de communiquer avec vous et suivre vos ordres simples. Vous pouvez interroger les plantes sur des événements récents qui se sont déroulés dans la zone du sort et récupérer ainsi des informations concernant les créatures qui sont passées par là, les conditions météorologiques ou d'autres situations. Vous pouvez également transformer un terrain difficile, causé par la croissance des plantes (comme des taillis ou des sous-bois), en un terrain ordinaire pour la durée du sort. Ou vous pouvez transformer un terrain ordinaire où des plantes sont présentes, en terrain difficile pour la durée du sort, créant des plantes rampantes ou des branches afin d'entraver des poursuivants, par exemple. Les plantes devraient pouvoir réaliser d'autres tâches pour vous, à la discrétion du MD. Le sort ne permet pas aux plantes de se déraciner pour se déplacer, mais elles peuvent bouger librement leurs branches, vrilles et tiges. Si une créature végétale se situe dans la zone, vous pouvez communiquer avec elle, comme si vous parliez un langage commun, mais vous ne gagnez aucune capacité magique pour l'influencer. Ce sort peut obliger les plantes créées par le sort enchevêtrement à relâcher une créature entravée."},
    {name:"Communion",level:5,school:"Divination",time:"1 minute (rituel)",range:"Soi-même",duration:"1 minute",components:"V, S, M (encens et fiole d'eau bénite ou maudite)",classes:["Clerc"],desc:"Vous entrez en contact avec votre dieu ou un intermédiaire divin et vous posez jusqu'à trois questions qui peuvent être répondues par oui ou par non. Vous devez poser vos questions avant la fin du sort. Vous recevez une réponse correcte à chaque question. Les entités divines ne sont pas nécessairement omniscientes. Vous pouvez donc recevoir une réponse « incertaine » si la question concerne un sujet qui est hors du domaine de connaissance de la divinité. Dans le cas où une réponse monosyllabique s'avérerait déroutante ou opposée aux intérêts de la divinité, le MD peut faire une courte phrase en guise de réponse. Si vous incantez le sort plus d'une fois avant la fin de votre prochain repos long, il y a une probabilité cumulative de 25 % de ne recevoir aucune réponse et ce, pour chaque incantation après la première. Le MD fait ce jet en secret."},
    {name:"Communion avec la nature",level:5,school:"Divination",time:"1 minute (rituel)",range:"Soi-même",duration:"Instantanée",components:"V, S",classes:["Druide","Rôdeur"],desc:"Vous ne faites brièvement qu'un avec la nature et obtenez des informations sur le territoire alentour. À l'extérieur, le sort vous donne la connaissance du terrain à 4,5 km autour de vous. Dans des grottes ou tout autre milieu souterrain, le rayon de connaissance est réduit à 90 mètres. Le sort ne fonctionne pas là où des constructions ont pris la place de la nature, comme dans des donjons ou des villes. Vous obtenez instantanément la connaissance de trois types d'informations sur la zone, parmi celles proposées ci-dessous : • Terrain et plans d'eau • Plantes, minéraux, animaux ou peuples courants • Puissants célestes, fiélons, fées, élémentaires ou morts-vivants • Influence des autres plans d'existence • Bâtiments Par exemple, vous pourriez déterminer l'emplacement d'un puissant mort-vivant dans la zone, la localisation des principales sources d'eau potables, et situer les villes à proximité."},
    {name:"Compulsion",level:4,school:"Enchantement",time:"1 action",range:"9m",duration:"Concentration, 1 minute",components:"V, S",classes:["Barde"],desc:"Les créatures de votre choix, à portée, que vous pouvez voir et qui peuvent vous entendre, doivent effectuer un jet de sauvegarde de Sagesse. Une cible réussit automatiquement son jet de sauvegarde si elle ne peut pas être charmée. En cas d'échec, une cible est affectée par ce sort. Jusqu'à la fin du sort, vous pouvez utiliser votre action bonus à chacun de vos tours pour désigner une direction horizontale. Chaque cible affectée doit utiliser tout son mouvement possible pour se déplacer dans cette direction lors de son prochain tour. Elle peut effectuer son action avant d'utiliser son mouvement. Après s'être déplacée de la sorte, elle peut effectuer un autre jet de sauvegarde de Sagesse pour tenter de mettre fin à l'effet. Une cible n'est pas contrainte de se déplacer dans une direction si celle-ci est manifestement mortelle, comme un feu ou un gouffre, mais elle provoquera des attaques d'opportunité en se déplaçant dans la direction désignée."},
    {name:"Contrôle des vents",level:5,school:"Transmutation",time:"1 action",range:"Soi-même (27m rayon)",duration:"Concentration, 1 heure",components:"V, S",classes:["Druide","Magicien","Ensorceleur"],desc:"Vous prenez le contrôle de l'air dans un cube de 30 mètres d'arête visible dans la portée du sort. Vous pouvez choisir un des effets suivants lorsque vous lancez le sort. L'effet perdure jusqu'à la fin du sort, à moins que vous n'utilisiez votre action au cour d'un tour ultérieur pour changer d'effet. Vous pouvez aussi utiliser votre action pour momentanément arrêter l'effet ou pour renouveler un effet que vous auriez arrêté. Rafales. Un vent se lève au centre du cube et souffle continuellement dans une direction horizontale que vous choisissez. Vous pouvez décider de l'intensité du vent : calme, modéré ou fort. Si le vent est modéré ou fort, les attaques avec des armes à distance qui entrent dans, sortent de ou traversent ce cube ont un désavantage aux jets d'attaque. Si le vent est fort, toute créature se déplaçant contre le vent doit dépenser un mètre de déplacement supplémentaire pour chaque mètre avancé. Écrasement. Vous créez un fort coup de vent descendant ayant pour source le sommet du cube. Les attaques avec des armes à distance qui traversent cette zone ou visent des cibles situées à l'intérieur ont un désavantage à leurs jets d'attaque. Une créature doit faire un jet de sauvegarde de Force si elle vole dans le cube pour la première fois dans un tour ou si elle commence son tour dans cette zone en volant. En cas d'échec, la créature tombe à terre. Ascension. Vous créez un courant ascendant soutenu à l'intérieur du cube provenant de la face inférieure du cube. Les créatures tombant dans le cube ne subissent que la moitié des dégâts dus à la chute. Lorsqu'une créature dans le cube réalise un saut vertical, elle peut sauter jusqu'à 3 mètres de plus que la normale."},
    {name:"Coquille antivie",level:5,school:"Abjuration",time:"1 action",range:"Soi-même (3m de rayon)",duration:"Concentration, 1 heure",components:"V, S",classes:["Druide"],desc:"Une barrière scintillante émane de vous dans un rayon de 3 mètres et se déplace avec vous, restant centrée autour de vous et bloquant les créatures autres que celles de type mort-vivant ou artificiel. La barrière reste en place pour toute la durée du sort. La barrière empêche les créatures affectées de pénétrer ou de traverser la zone. Une créature affectée peut lancer des sorts ou effectuer des attaques avec des armes à distance ou des armes à allonge au travers de la barrière. Si vous vous déplacez de sorte qu'une créature affectée est obligée de passer au travers de la barrière, le sort prend fin."},
    {name:"Communion avec la nature",level:5,school:"Divination",time:"1 minute (rituel)",range:"Soi-même",duration:"Instantanée",components:"V, S",classes:["Druide","Rôdeur"],desc:"Connaissances sur la zone (3 km en surface, 9m en souterrain): terrain, plantes, animaux, créatures puissantes, bâtiments. Jusqu'à 3 faits.",source:"PHB"},
    {name:"Création de nourriture et d'eau",level:3,school:"Invocation",time:"1 action",range:"9m",duration:"Instantanée",components:"V, S",classes:["Artificier","Clerc","Paladin"],desc:"Vous créez 22,5 kg de nourriture et 120 litres d'eau sur le sol ou dans des contenants, à portée, ce qui est assez pour subvenir aux besoins de quinze humanoïdes ou de cinq montures pour 24 heures. La nourriture est fade mais nourrissante, et se gâte si elle n'est pas mangée au-delà de 24 heures. L'eau est claire et ne croupit pas."},
    {name:"Éclair",level:3,school:"Évocation",time:"1 action",range:"Soi-même (27m ligne)",duration:"Instantanée",components:"V, S, M (bâton de verre, cristal ou fourrure)",classes:["Ensorceleur","Magicien"],desc:"Ligne de foudre de 27m×1,5m: 8d6 foudre (JdS DEX moitié). +1d6/niveau au-delà du 3e.",source:"PHB"},
    {name:"Éclair de chaos",level:4,school:"Évocation",time:"1 action",range:"36m",duration:"Instantanée",components:"V, S",classes:["Ensorceleur"],desc:"Énergie chaotique: 2d8+2d6 (type aléatoire: acide, froid, feu, force, foudre, poison, psychique, tonnerre). Peut rebondir sur une 2e cible. +1d6/niveau au-delà du 4e.",source:"XGTE"},
    {name:"Éclair traçant",level:6,school:"Évocation",time:"1 action",range:"Soi-même (27m ligne)",duration:"Instantanée",components:"V, S, M (bâton de verre, cristal ou fourrure, et phosphore)",classes:["Ensorceleur","Magicien"],desc:"Comme Éclair mais crée d'abord un traceur. Peut retracer sur le même chemin. +10d6 supplémentaires si même ligne. +1d6/niveau au-delà du 6e.",source:"PHB"},
    {name:"Éclat du soleil",level:8,school:"Évocation",time:"1 action",range:"45m (rayon 18m)",duration:"Instantanée",components:"V, S, M (feu et morceau d'héliotrope)",classes:["Druide","Ensorceleur","Magicien"],desc:"Flash aveuglant: 12d6 radiant (JdS CON moitié). Si raté: aveuglé pendant 1 minute (JS CON à chaque tour). Les morts-vivants/vampires ont désavantage.",source:"PHB"},
    {name:"Épine mentale",level:2,school:"Enchantement",time:"1 réaction (créature en JS CON pour maintien de concentration)",range:"18m",duration:"Instantanée",components:"V",classes:["Barde","Ensorceleur","Magicien","Occultiste"],desc:"Interrompre la concentration d'une créature: 3d8 psychique (JdS CON annule; désavantage à son prochain JS de maintien de concentration).",source:"TCE"},
    {name:"Éruption de lames",level:2,school:"Invocation",time:"1 action",range:"Soi-même (1,5m rayon)",duration:"Instantanée",components:"S",classes:["Ensorceleur","Occultiste"],desc:"Lames magiques jaillissent: 3d6 force à toutes les créatures à 1,5m (JdS DEX moitié). +1d6/niveau au-delà du 2e.",source:"XGTE"},
    {name:"Éruption de terre",level:3,school:"Transmutation",time:"1 action",range:"36m",duration:"Concentration, 1 minute",components:"V, S, M (argile)",classes:["Druide","Ensorceleur","Magicien"],desc:"Explosion de terrain dans une ligne de 15m (1,5m large, 3m haut): 3d12 contondant, renversé (JdS DEX moitié). Terrain difficile.",source:"XGTE"},
    {name:"Esprit guérisseur",level:2,school:"Invocation",time:"1 action bonus",range:"18m",duration:"Concentration, 1 minute",components:"V, S",classes:["Druide","Rôdeur"],desc:"Esprit protecteur flottant sur une créature. À votre tour (action bonus): la soigne de 1d6 PV. À votre initiative au niv.3: 2d6, et ainsi de suite.",source:"XGTE"},
    {name:"Esprit impénétrable",level:8,school:"Abjuration",time:"1 action",range:"Contact",duration:"24 heures",components:"V, S",classes:["Barde","Magicien"],desc:"Immunité aux effets de divination et de lecture des pensées, de détection de mensonge et de charme/effrayé magiques.",source:"PHB"},
    {name:"Façonnage de la pierre",level:4,school:"Transmutation",time:"1 action",range:"Contact",duration:"Instantanée",components:"V, S, M (argile malléable)",classes:["Artificier","Clerc","Druide"],desc:"Modeler de la pierre sur un volume équivalent à un cube de 1,5m. Peut former une porte, obturer une ouverture, créer une statue grossière, ou former une arme simple.",source:"PHB"},
    {name:"Fléau",level:1,school:"Enchantement",time:"1 action",range:"9m",duration:"Concentration, 1 minute",components:"V, S, M (quelques gouttes de sang)",classes:["Barde","Clerc"],desc:"Jusqu'à 3 créatures: soustraient 1d4 aux jets d'attaque et de sauvegarde. +1 cible/niveau au-delà du 1er.",source:"PHB"},
    {name:"Flèche de foudre",level:3,school:"Transmutation",time:"1 action bonus",range:"Soi-même",duration:"Concentration, 1 minute",components:"V, S",classes:["Rôdeur"],desc:"Prochaine attaque à distance: se transforme en éclair, 4d8 foudre (plus dégâts d'arme) + 2d8 foudre aux créatures dans 3m. +1d8/niveau au-delà du 3e.",source:"PHB"},
    {name:"Flèches enflammées",level:3,school:"Transmutation",time:"1 action bonus",range:"Contact",duration:"1 heure",components:"V, S",classes:["Druide","Rôdeur"],desc:"Jusqu'à 12 munitions: quand tirées, +1d6 feu supplémentaires.",source:"XGTE"},
    {name:"Flétrissure épouvantable d'Abi-Dalzim",level:7,school:"Nécromancie",time:"1 action",range:"45m (sphère 9m rayon)",duration:"Instantanée",components:"V, S, M (fragment d'éponge)",classes:["Ensorceleur","Magicien"],desc:"Dessèchement: 12d8 nécrotique (JdS CON moitié). Si raté: la cible est épuisée jusqu'au prochain repos long. +2d8/niveau au-delà du 7e.",source:"XGTE"},
    {name:"Guérison",level:6,school:"Évocation",time:"1 action",range:"18m",duration:"Instantanée",components:"V, S",classes:["Barde","Clerc","Druide"],desc:"Soigner une créature de 70 PV, mettre fin aux maladies et aveuglement/surdité. +10 PV/niveau au-delà du 6e.",source:"PHB"},
    {name:"Invocation d'êtres sylvestres",level:4,school:"Invocation",time:"1 action",range:"18m",duration:"Concentration, 1 heure",components:"V, S, M (poignée de glands ou une rose épineuse)",classes:["Druide","Rôdeur"],desc:"Convoquer des fées: 1 fée de CR 2, 2 de CR 1, 4 de CR 1/2 ou 8 de CR 1/4. +1 par catégorie/niveau au-delà du 4e.",source:"PHB"},
    {name:"Invocation de céleste",level:5,school:"Invocation",time:"1 minute",range:"27m",duration:"Concentration, 1 heure",components:"V, S, M (or et argent valant 500 po consumés)",classes:["Paladin","Clerc"],desc:"Convoquer un céleste de CR 4 ou moins. +1 CR/niveau au-delà du 5e.",source:"XGTE"},
    {name:"Libellé aérien",level:2,school:"Transmutation",time:"1 action",range:"27m",duration:"Jusqu'à dissipation",components:"V, S, M (encre, parchemin et plume d'oiseau)",classes:["Artificier","Barde","Magicien"],desc:"Message de 25 mots flottant dans les airs (invisible sauf si on le cherche). Dure jusqu'à dissipation.",source:"XGTE"},
    {name:"Monture fantôme",level:3,school:"Illusion",time:"1 minute (rituel)",range:"9m",duration:"1 heure",components:"V, S",classes:["Magicien"],desc:"Monture spectrale (vitesse 19m/h). Dure 1 heure ou jusqu'à dégâts.",source:"PHB"},
    {name:"Mot de pouvoir étourdissant",level:8,school:"Enchantement",time:"1 action",range:"18m",duration:"Instantanée",components:"V",classes:["Barde","Ensorceleur","Magicien","Occultiste"],desc:"Si la cible a 150 PV ou moins: étourdie jusqu'à ce qu'elle réussisse un JdS CON à la fin de son tour.",source:"PHB"},
    {name:"Mur de feu",level:4,school:"Évocation",time:"1 action",range:"36m",duration:"Concentration, 1 minute",components:"V, S, M (pincée de soufre)",classes:["Druide","Ensorceleur","Magicien"],desc:"Mur (18m×6m×30cm) ou anneau (6m rayon, 6m haut) de feu: 5d8 feu au côté désigné (JdS DEX moitié). +1d8/niveau au-delà du 4e.",source:"PHB"},
    {name:"Mur de vent",level:3,school:"Évocation",time:"1 action",range:"36m",duration:"Concentration, 1 minute",components:"V, S, M (petit ventilateur et plume exotique)",classes:["Druide","Rôdeur"],desc:"Mur de vent fort (18m×4,5m). Aucune munition ne peut traverser. Gaz/vapeurs: poussés de côté. Créatures de petite taille ou moins: JdS FOR ou repoussées de 4,5m + renversées.",source:"PHB"},
    {name:"Orbe chromatique",level:1,school:"Évocation",time:"1 action",range:"27m",duration:"Instantanée",components:"V, S, M (diamant valant au moins 50 po)",classes:["Ensorceleur","Magicien"],desc:"Attaque à distance: 3d8 (type au choix: acide, froid, feu, force, foudre, poison, tonnerre). +1d8/niveau au-delà du 1er.",source:"PHB"},

    {name:"Couronne du dément",level:1,school:"Enchantement",time:"1 action",range:"18m",duration:"Concentration, 1 minute",components:"V, S",classes:["Barde","Ensorceleur","Magicien","Occultiste"],desc:"Un humanoïde de votre choix, que vous pouvez voir et à portée, doit réussir un jet de sauvegarde de Sagesse ou être charmé pour la durée du sort. Tant que vous charmez la cible par ce sort, une couronne entortillée de morceaux de fer déchiquetés apparaît sur sa tête, et la folie envahit son regard. La cible charmée doit utiliser son action avant de se déplacer, à chacun de ses tours, pour effectuer une attaque au corps à corps contre une créature autre qu'elle-même et que vous avez mentalement choisie. La cible peut agir normalement au cours de son tour si vous ne choisissez aucune créature ou s'il n'y en a aucune à portée. Lors de vos tours suivants, vous devez utiliser votre action pour maintenir le contrôle sur votre cible, sans quoi le sort prend fin. La cible peut également effectuer un jet de sauvegarde de Sagesse à la fin de chacun de ses tours. Si elle le réussit, le sort prend fin."},

    {name:"Costume d'Outremonde de Tasha",level:6,school:"Transmutation",time:"1 action bonus",range:"personnelle",duration:"concentration, jusqu'à 1 minute",components:"V, S, M (un objet gravé d'un symbole des plans extérieurs, d'une valeur d'au moins 500 po)",classes:["Barde", "Magicien", "Ensorceleur"],desc:"Vous prononcez une incantation et soutirez de la magie des plans inférieurs ou supérieurs (selon votre choix) pour vous transformer. Vous gagnez les avantages suivants jusqu'à ce que le sort prenne fin : • Vous êtes immunisé aux dégâts de feu et de poison (plans inférieurs) ou aux dégâts radiant et nécrotiques (plans supérieurs). • Vous êtes immunisé à l'état empoisonné (plans inférieurs) ou à l'état charmé (plans supérieurs). • Des ailes spectrales apparaissent sur votre dos, vous accordant une vitesse de vol de 12 mètres. • Vous avez un bonus de CA de +2. • Toutes vos attaques armées sont considérées comme magiques, et lorsque vous faites une attaque avec arme vous pouvez utiliser votre modificateur de caractéristique d'incantation à la place de la Force ou la Dextérité pour les jets d'attaque et de dégât. • Vous pouvez attaquer deux fois au lieu d'une lorsque vous prenez l'action Attaquer lors de votre tour. Vous ignorez cet avantage si vous avez déjà une capacité similaire, comme Attaque supplémentaire, qui vous permet d'attaquer plusieurs fois lorsque vous prenez l'action Attaquer pendant votre tour.",source:"TCE"}

// ============================================================
// COMPENDIUM — FIRESTORE CRUD (une collection par catégorie)
// ============================================================
// Structure Firebase :
//   compendium_armor / "Harnois"          → ressource système
//   compendium_armor / "MonArmure_abc123"  → ressource homebrew (suffixe uid court)
//   compendium_weapon / "Épée longue"
//   compendium_spell / "Boule de feu"
//   etc.
// ============================================================

let compendiumUnsubscribes = [];   // un listener par catégorie
let compendiumResources = [];
let compendiumSeeded = false;

// Nom de collection Firestore pour une catégorie
function colName(catId) {
  return `compendium_${catId}`;
}

// Générer un ID "lisible" pour un document Firestore
// - Ressources système  → nom exact (ex: "Épée longue")
// - Homebrew           → "NomRessource_uidCourt" pour éviter les collisions
function makeDocId(name, isSystem) {
  // Nettoyer les caractères interdits par Firestore dans les IDs
  const safe = name.trim().replace(/[\/\\\.#\[\]]/g, '_');
  if (isSystem) return safe;
  // Pour le homebrew, ajouter les 6 premiers chars de l'UID pour unicité
  const uidPart = currentUid ? currentUid.slice(0, 6) : 'hb';
  return `${safe}_${uidPart}`;
}

// Seed : injecter les données de base dans Firestore si pas déjà fait
async function seedCompendiumIfNeeded() {
  if (compendiumSeeded) return;
  const snap = await getDoc(doc(db, "meta", "compendium_seeded_v3")).catch(() => null);
  if (snap && snap.exists()) { compendiumSeeded = true; return; }

  // Seed toutes les catégories avec des documents nommés
  const promises = [];
  for (const [catId, items] of Object.entries(COMPENDIUM_DATA)) {
    for (const item of items) {
      const docId = makeDocId(item.name, true);
      const ref = doc(db, colName(catId), docId);
      promises.push(setDoc(ref, {
        ...item,
        type: catId,
        owner: "system",
        source: item.source || "PHB",
        createdAt: new Date().toISOString()
      }, { merge: false }));
    }
  }
  await Promise.all(promises);
  await setDoc(doc(db, "meta", "compendium_seeded_v3"), { seeded: true, date: new Date().toISOString() });
  compendiumSeeded = true;
}

function loadCompendium() {
  // Désabonner les anciens listeners
  compendiumUnsubscribes.forEach(u => u());
  compendiumUnsubscribes = [];
  compendiumResources = [];

  seedCompendiumIfNeeded().then(() => {
    // Un onSnapshot par collection/catégorie
    for (const cat of COMPENDIUM_CATEGORIES) {
      const colRef = collection(db, colName(cat.id));
      const unsub = onSnapshot(colRef, (snapshot) => {
        // Retirer les anciennes entrées de cette catégorie
        compendiumResources = compendiumResources.filter(r => r.type !== cat.id);
        snapshot.forEach(docSnap => {
          const d = docSnap.data();
          // Ne garder que les ressources système ou appartenant à l'utilisateur
          if (d.owner === 'system' || d.owner === currentUid) {
            compendiumResources.push({ _docId: docSnap.id, _col: colName(cat.id), ...d });
          }
        });
        if (document.getElementById('tab-compendium')?.classList.contains('active')) {
          renderCompendiumList(window._currentCompCategory || 'armor');
        }
      });
      compendiumUnsubscribes.push(unsub);
    }
  });
}

async function addCustomResource(category, data) {
  const name = data.name || 'Sans nom';
  const docId = makeDocId(name, false);
  const ref = doc(db, colName(category), docId);
  await setDoc(ref, {
    ...data,
    type: category,
    owner: currentUid,
    createdAt: new Date().toISOString()
  });
}

async function deleteResource(docId) {
  if (!confirm("Supprimer cette ressource ?")) return;
  const r = compendiumResources.find(x => x._docId === docId);
  if (!r) return;
  await deleteDoc(doc(db, r._col || colName(r.type), docId));
}

async function updateResource(docId, data) {
  const r = compendiumResources.find(x => x._docId === docId);
  if (!r) return;
  await updateDoc(doc(db, r._col || colName(r.type), docId), data);
}

// Réinitialiser tout le compendium (supprimer + re-seeder)
window._resetCompendium = async () => {
  if (!confirm("Réinitialiser le compendium ? Cela supprimera toutes les modifications et rechargera les données de base. Les ressources personnelles (homebrew) seront conservées.")) return;
  // Supprimer uniquement les ressources système de chaque collection
  const toDelete = compendiumResources.filter(r => r.owner === 'system');
  for (const r of toDelete) {
    await deleteDoc(doc(db, r._col || colName(r.type), r._docId));
  }
  // Supprimer le marqueur de seed
  await deleteDoc(doc(db, "meta", "compendium_seeded_v3")).catch(() => {});
  compendiumSeeded = false;
  // Re-seeder
  await seedCompendiumIfNeeded();
  alert("Compendium réinitialisé !");
};

function _sortResources(items, catId) {
  const sort = window._compSort;
  if (sort === 'alpha') {
    return items.sort((a,b) => (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  if (sort === 'level' && catId === 'spell') {
    return items.sort((a,b) => (a.level||0) - (b.level||0) || (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  if (sort === 'school' && catId === 'spell') {
    return items.sort((a,b) => (a.school||'').localeCompare(b.school||'', 'fr') || (a.level||0) - (b.level||0) || (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  if (sort === 'cr' && catId === 'monster') {
    const crVal = (cr) => { if(!cr) return 999; if(cr.includes('/')) { const p=cr.split('/'); return parseInt(p[0])/parseInt(p[1]); } return parseFloat(cr)||999; };
    return items.sort((a,b) => crVal(a.cr) - crVal(b.cr) || (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  if (sort === 'type') {
    return items.sort((a,b) => (a.type||'').localeCompare(b.type||'', 'fr') || (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  if (sort === 'size' && catId === 'monster') {
    const sizeOrder = {'TP':0,'P':1,'M':2,'G':3,'TG':4,'Gig':5};
    return items.sort((a,b) => (sizeOrder[a.size]??3) - (sizeOrder[b.size]??3) || (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  if (sort === 'ac') {
    const acVal = (ac) => { const m = (ac||'').match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
    return items.sort((a,b) => acVal(b.ac) - acVal(a.ac) || (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  if (sort === 'damage') {
    return items.sort((a,b) => (a.damage||'').localeCompare(b.damage||'', 'fr') || (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  if (sort === 'rarity') {
    const rarityOrder = {'Courant':0,'Peu courant':1,'Rare':2,'Très rare':3,'Légendaire':4,'Artéfact':5};
    return items.sort((a,b) => (rarityOrder[a.rarity]??-1) - (rarityOrder[b.rarity]??-1) || (a.name||'').localeCompare(b.name||'', 'fr'));
  }
  return items.sort((a,b) => (a.name||'').localeCompare(b.name||'', 'fr'));
}

window._updateSpellFilter = () => {
  const f = window._spellFilters;
  const lvlEl = document.getElementById('sfLevel');
  const schoolEl = document.getElementById('sfSchool');
  if (lvlEl) f.level = lvlEl.value;
  if (schoolEl) f.school = schoolEl.value;
  // Toggles
  const toggles = document.querySelectorAll('.spell-filter-toggle input');
  if (toggles.length >= 3) {
    f.ritual = toggles[0].checked;
    f.reaction = toggles[1].checked;
    f.bonusAction = toggles[2].checked;
  }
  _renderSpellFilterBar();
  renderCompendiumList('spell');
};

function _applySpellFiltersWithObj(spells, f) {
  let result = spells;

  // Filter by class
  if (f.classes.length > 0) {
    result = result.filter(r => {
      const rClasses = r.classes || [];
      return f.classes.some(c => rClasses.includes(c));
    });
  }

  // Filter by level
  if (f.level !== 'all') {
    const lvl = parseInt(f.level);
    result = result.filter(r => r.level === lvl);
  }

  // Filter by school
  if (f.school !== 'all') {
    result = result.filter(r => r.school === f.school);
  }

  // Filter by ritual
  if (f.ritual) {
    result = result.filter(r => (r.time||'').toLowerCase().includes('rituel'));
  }

  // Filter by reaction
  if (f.reaction) {
    result = result.filter(r => (r.time||'').toLowerCase().includes('réaction'));
  }

  // Filter by bonus action
  if (f.bonusAction) {
    result = result.filter(r => (r.time||'').toLowerCase().includes('action bonus'));
  }

  return result;
}

function _applySpellFilters(spells) {
  return _applySpellFiltersWithObj(spells, window._spellFilters);
}

function getAllResourcesForCategory(catId) {
  return compendiumResources.filter(r => r.type === catId);

function renderCompendiumList(catId) {
  const listEl = document.getElementById('compList');
  if (!listEl) return;
  let allRes = getAllResourcesForCategory(catId);
  const q = window._compSearchQuery;
  let filtered = q ? allRes.filter(r => (r.name||'').toLowerCase().includes(q)) : [...allRes];

  // Apply spell-specific filters
  if (catId === 'spell') {
    filtered = _applySpellFilters(filtered);
    // Update counter
    const countEl = document.getElementById('spellFilterCount');
    if (countEl) countEl.textContent = `${filtered.length} sort${filtered.length>1?'s':''} trouvé${filtered.length>1?'s':''}`;
  }

  // Apply sorting
  filtered = _sortResources(filtered, catId);

  if (filtered.length === 0) {
    listEl.innerHTML = `<p style="color:#888;text-align:center;margin-top:30px;font-style:italic">${
      compendiumResources.length === 0 ? 'Chargement du compendium...' : 
      'Aucune ressource trouvée' + (q ? ' pour "' + q + '"' : '') + '.'
    }</p>`;
    return;
  }

  listEl.innerHTML = filtered.map((r) => {
    const isHomebrew = r.owner !== 'system';
    const isSystem = r.owner === 'system';
    return `<div class="comp-card" onclick="window._showResourceDetail('${catId}','${r._docId}')">
      <div class="comp-card-main">
        <div class="comp-card-name">${r.name||'?'} ${isHomebrew ? '<span class="comp-homebrew">Homebrew</span>' : ''}${isSystem && r._modified ? '<span class="comp-modified">Modifié</span>' : ''}</div>

      </div>

    case 'weapon': return `${r.type||''} · ${r.damage||''} · ${r.cost||''}`;
    case 'item': return `${r.type||''} · ${r.rarity||'—'} · ${r.cost||''}`;
    case 'spell': return `Niv.${r.level===0?'mineur':r.level} · ${r.school||''} · ${(r.classes||[]).join(', ')}`;
    case 'feat': return `${r.prereq ? 'Prérequis: '+r.prereq : 'Aucun prérequis'}`;

window._editResource = (catId, docId) => {
  const r = compendiumResources.find(x => x._docId === docId);
  if (!r) return;

  const content = document.getElementById('forgeContent');
  document.getElementById('forgeProgress').innerHTML = '<div class="progress-step active">✏</div>';
  document.getElementById('forgePrev').style.visibility = 'hidden';
  document.getElementById('forgeNext').style.display = 'none';

  // Build editable fields from current data
  const skip = ['_docId','owner','createdAt','type','_modified','_source','id'];
  const fieldTypes = {desc:'textarea',attacks:'textarea',traits:'textarea',equipment:'textarea',feature:'textarea'};
  
  let fieldsHtml = '';
  for (const [key, val] of Object.entries(r)) {
    if (skip.includes(key)) continue;
    const isTextarea = fieldTypes[key];
    const label = key.charAt(0).toUpperCase() + key.slice(1);
    let displayVal = val;
    if (Array.isArray(val)) displayVal = val.join(', ');
    else if (typeof val === 'object' && val !== null) displayVal = JSON.stringify(val);
    else displayVal = val ?? '';
    
    if (isTextarea) {
      fieldsHtml += `<div class="field-group"><label>${label}</label><textarea id="edit_${key}" rows="2">${displayVal}</textarea></div>`;
    } else {
      fieldsHtml += `<div class="field-group"><label>${label}</label><input id="edit_${key}" type="text" value="${String(displayVal).replace(/"/g,'&quot;')}"></div>`;
    }
  }

  content.innerHTML = `
    <h3 class="step-title">✏ Modifier: ${r.name||'?'}</h3>
    ${fieldsHtml}
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-gold" onclick="window._saveEditResource('${catId}','${docId}')">SAUVEGARDER</button>
      <button class="btn-prev" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">Annuler</button>
    </div>`;
  document.getElementById('forgeOverlay').style.display = 'flex';
};

window._saveEditResource = async (catId, docId) => {
  const r = compendiumResources.find(x => x._docId === docId);
  if (!r) return;
  const skip = ['_docId','owner','createdAt','type','_modified','_source','id'];
  const data = { _modified: true };
  
  for (const key of Object.keys(r)) {
    if (skip.includes(key)) continue;
    const el = document.getElementById('edit_' + key);
    if (!el) continue;
    let val = el.value;
    // Try to preserve original type
    const orig = r[key];
    if (Array.isArray(orig)) {
      val = val.split(',').map(s => s.trim()).filter(s => s);
    } else if (typeof orig === 'number') {
      val = parseFloat(val) || 0;
    } else if (typeof orig === 'object' && orig !== null) {
      try { val = JSON.parse(val); } catch(e) { /* keep string */ }
    }
    data[key] = val;
  }
  
  await updateResource(docId, data);
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
};

  window._closeForge();

};

window._pickResource = async (charId, catId, index) => {
  const allRes = getAllResourcesForCategory(catId);
  const r = allRes[index];
  if (!r) return;

  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const stats = d.stats||{str:10,dex:10,con:10,int:10,wis:10,cha:10};
  const pb = profBonus(totalLevel(d));
  let update = {};

  if (catId === 'weapon') {
    // Compute attack bonus and damage
    const isFinesse = (r.properties||'').toLowerCase().includes('finesse');
    const isRanged = (r.type||'').toLowerCase().includes('distance');
    const statMod = isRanged ? mod(stats.dex) : (isFinesse ? Math.max(mod(stats.str), mod(stats.dex)) : mod(stats.str));
    const atkBonus = statMod + pb;
    const dmgBonus = statMod;
    const atk = `+${atkBonus}`;
    const dmg = `${r.damage||'?'}${dmgBonus>=0?'+':''}${dmgBonus}`;
    const weapons = [...(d.inventory_weapons||[])];
    weapons.push({ name: r.name, atk, dmg, properties: r.properties||'', type: r.type||'' });
    update.inventory_weapons = weapons;
  }
  else if (catId === 'armor') {
    const armors = [...(d.inventory_armors||[])];
    armors.push({ name: r.name, ac: r.ac||'?', type: r.type||'', stealth: r.stealth||'', equipped: false });
    update.inventory_armors = armors;
  }
  else if (catId === 'item') {
    const items = [...(d.inventory_items||[])];
    // Check if item already exists, increment qty
    const existing = items.find(it => it.name === r.name);
    if (existing) { existing.qty = (existing.qty||1) + 1; }
    else { items.push({ name: r.name, detail: r.desc||r.type||'', qty: 1, rarity: r.rarity||'' }); }
    update.inventory_items = items;
  }
  else if (catId === 'feat') {
    const feats = [...(d.features||[])];
    feats.push({ name: `Don: ${r.name}`, desc: r.desc||r.prereq||'', src: 'Compendium' });
    update.features = feats;
  }
  else if (catId === 'spell') {
    const spells = [...(d.known_spells||[])];
    if (!spells.find(s => s.name === r.name)) {
      spells.push({ name:r.name, level:r.level, school:r.school||'', time:r.time||'', range:r.range||'', duration:r.duration||'', desc:r.desc||'', components:r.components||'', classes:r.classes||[] });
    }
    update.known_spells = spells;
  }
  else if (catId === 'background') {
    update.background = r.name;
  }
  else if (catId === 'familiar') {
    // Stocker le familier directement depuis le compendium monster
    update.familiar = {
      name: r.name, cr: r.cr||'?', type: r.type||'', size: r.size||'M',
      hp: r.hp||'?', ac: r.ac||'?', speed: r.speed||'?',
      attacks: r.attacks||'—', traits: r.traits||'—', desc: r.desc||'', source: r.source||'MM'
    };
  }

  if (Object.keys(update).length) {
    await updateDoc(doc(db, "characters", charId), update);
  }
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
};

  const list = document.getElementById('familiar_list');

  window._familiarPickerData = filtered;

function _buildFormTypeFilters(charId) {

window._toggleFormCR = (charId, cr, btn) => {

window._toggleFormType = (charId, type, btn) => {

    btn.classList.add('active');

window._filterFormPicker = (charId) => _updateFormPickerList(charId);

function _updateFormPickerList(charId) {
  const q = (document.getElementById('form_search')?.value || '').toLowerCase();
  const allMonsters = getAllResourcesForCategory('monster');

  const crVal = cr => {
    if (!cr || cr === '?') return 999;
    if (String(cr).includes('/')) { const p = String(cr).split('/'); return parseInt(p[0])/parseInt(p[1]); }
    return parseFloat(cr) || 0;
  };

  let filtered = [...allMonsters];
  if (q) filtered = filtered.filter(m => (m.name||'').toLowerCase().includes(q) || (m.type||'').toLowerCase().includes(q));
  if (window._formPickerCRFilter) filtered = filtered.filter(m => String(m.cr||'') === window._formPickerCRFilter);
  if (window._formPickerTypeFilter) filtered = filtered.filter(m => m.type === window._formPickerTypeFilter);
  filtered.sort((a,b) => crVal(a.cr) - crVal(b.cr) || (a.name||'').localeCompare(b.name||'','fr'));

  window._formPickerData = filtered;
  const list = document.getElementById('form_picker_list');
  if (!list) return;

  const maxCr = window._formWsMaxCr;

  const shown = filtered.slice(0, 60);
  list.innerHTML = shown.map((m, idx) => {
    const over = maxCr !== null && crVal(m.cr) > maxCr;
    return `<div class="comp-card form-pick-card ${over ? 'form-pick-over-cr' : ''}" data-idx="${idx}" style="cursor:pointer">
      <div class="comp-card-main" style="pointer-events:none">
        <div class="comp-card-name">${m.name||'?'} ${over ? '<span style="color:#e67e22;font-size:0.7rem;font-weight:600">▲ RC trop élevé</span>' : ''}</div>
        <div class="comp-card-sub">RC ${m.cr||'?'} · ${m.type||''} · Taille ${m.size||'?'} · CA ${m.ac||'?'} · PV ${m.hp||'?'}</div>
      </div>
    </div>`;
  }).join('') || '<p style="color:#888;text-align:center;margin:20px;font-style:italic">Aucune créature trouvée</p>';

  if (filtered.length > 60) list.innerHTML += `<p style="color:#888;text-align:center;font-size:0.78rem">+${filtered.length-60} créatures — affinez la recherche</p>`;

  list.onclick = async (e) => {
    const card = e.target.closest('.form-pick-card');
    if (!card) return;
    const idx = parseInt(card.dataset.idx);
    const m = window._formPickerData?.[idx];
    if (!m) return;

    const snap = await getDoc(doc(db, 'characters', charId));
    if (!snap.exists()) return;
    const d = snap.data();
    const forms = [...(d.prepared_forms || [])];
    // Éviter les doublons
    if (!forms.find(f => f.name === m.name)) {
      forms.push({
        name: m.name, cr: m.cr||'?', type: m.type||'', size: m.size||'M',
        hp: m.hp||'?', ac: m.ac||'?', speed: m.speed||'?',
        attacks: m.attacks||'—', traits: m.traits||'—', desc: m.desc||'', source: m.source||'MM'
      });
      await updateDoc(doc(db, 'characters', charId), { prepared_forms: forms });
    }
    window._closeForge();
    document.getElementById('forgeNext').style.display = '';
  };
}

window._cycleSkillProf = async (charId, skillName) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const profs = { ...(d.skillProficiencies || {}) };

};

  const ds = { success: d.deathSaves?.success || 0, fail: d.deathSaves?.fail || 0 };

// ── Toggle equip/unequip armor in inventory ──
window._toggleEquipArmor = async (charId, index) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const armors = [...(d.inventory_armors || [])];
  const target = armors[index];
  if (!target) return;
  const wasEquipped = target.equipped;
  
  // Unequip all others first (only one non-shield can be equipped at a time)
  const isShield = (target.type || '').toLowerCase().includes('bouclier');
  if (!wasEquipped) {
    armors.forEach((a, i) => {
      if (i !== index) {
        const aIsShield = (a.type || '').toLowerCase().includes('bouclier');
        // If equipping a non-shield, unequip other non-shields; if equipping a shield, unequip other shields
        if (isShield === aIsShield) a.equipped = false;
      }
    });
  }
  target.equipped = !wasEquipped;

  // Recalculate AC
  const stats = d.stats || { dex: 10 };
  const dexMod = mod(stats.dex || 10);
  let baseAc = 10 + dexMod; // default unarmored
  let shieldBonus = 0;
  armors.forEach(a => {
    if (!a.equipped) return;
    const aIsShield = (a.type || '').toLowerCase().includes('bouclier');
    if (aIsShield) { shieldBonus = 2; return; }
    const acStr = a.ac || '10';
    if (acStr.includes('mod DEX')) {
      const base = parseInt(acStr) || 10;
      baseAc = acStr.includes('max 2') ? base + Math.min(dexMod, 2) : base + dexMod;
    } else {
      const parsed = parseInt(acStr);
      if (!isNaN(parsed) && parsed > 0) baseAc = parsed;
    }
  });

  await updateDoc(doc(db, "characters", charId), { inventory_armors: armors, ac: baseAc + shieldBonus });
};

// ── Inline HP edit: absorb damage from tmpHp first ──
// Override the default inline edit for hp field to handle tmpHp absorption
const _origStartInlineEdit = startInlineEdit;
startInlineEdit = async function(el, charId, charData) {
  if (el.dataset.field === 'hp') {
    // Custom HP editor with +/- buttons
    if (el.querySelector('input')) return;
    const currentHp = charData.hp || 0;
    const orig = el.innerHTML;
    el.innerHTML = `<div style="display:flex;align-items:center;gap:4px">
      <button class="pb-btn" style="width:22px;height:22px;font-size:0.8rem;color:#f44336;border-color:#f44336" onclick="window._adjustHp('${charId}',-1,event)">−</button>
      <input type="number" value="${currentHp}" class="inline-input" style="width:50px;text-align:center">
      <button class="pb-btn" style="width:22px;height:22px;font-size:0.8rem;color:#4caf50;border-color:#4caf50" onclick="window._adjustHp('${charId}',1,event)">+</button>
    </div>`;
    const input = el.querySelector('input');
    input.focus();
    const save = async () => {
      const newVal = parseInt(input.value) || 0;
      const diff = newVal - currentHp;
      if (diff < 0) {
        // Damage: absorb with tmpHp first
        const snap = await getDoc(doc(db, "characters", charId));
        if (!snap.exists()) return;
        const d = snap.data();
        let remaining = Math.abs(diff);
        let tmpHp = d.tmpHp || 0;
        let hp = d.hp || 0;
        if (tmpHp > 0) { const ab = Math.min(tmpHp, remaining); tmpHp -= ab; remaining -= ab; }
        hp = Math.max(0, hp - remaining);
        await updateDoc(doc(db, "characters", charId), { hp, tmpHp });
        // Concentration check if needed
        if (remaining > 0 && (d.conditions||[]).includes('concentrating') && d.concentratingOn) {
          setTimeout(() => window._triggerConcentrationCheck(charId, Math.abs(diff), d), 300);
        }
      } else {
        const newHp = Math.min(charData.hpMax || 999, currentHp + diff);
        await updateDoc(doc(db, "characters", charId), { hp: newHp });
      }
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } if (e.key === 'Escape') el.innerHTML = orig; });
    return;
  }
  return _origStartInlineEdit.call(this, el, charId, charData);
};

window._adjustHp = async (charId, delta, event) => {
  event.stopPropagation();
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  if (delta < 0) {
    let tmpHp = d.tmpHp || 0;
    let hp = d.hp || 0;
    let realDmg = 0;
    if (tmpHp > 0) { tmpHp -= 1; }
    else { hp = Math.max(0, hp - 1); realDmg = 1; }
    await updateDoc(doc(db, "characters", charId), { hp, tmpHp });
    if (realDmg > 0 && (d.conditions||[]).includes('concentrating')) {
      window._triggerConcentrationCheck(charId, realDmg, d);
    }
  } else {
    const newHp = Math.min(d.hpMax || 999, (d.hp || 0) + 1);
    await updateDoc(doc(db, "characters", charId), { hp: newHp });
  }
};

window._toggleCondition = async (charId, conditionId) => {
  // Exhaustion is special: cycle 0-6
  if (conditionId === 'exhaustion') {
    const snap = await getDoc(doc(db, "characters", charId));
    if (!snap.exists()) return;
    const d = snap.data();
    const current = d.exhaustionLevel || 0;
    const next = (current + 1) % 7; // 0,1,2,3,4,5,6,0
    const conditions = [...(d.conditions||[])];
    if (next > 0 && !conditions.includes('exhaustion')) conditions.push('exhaustion');
    if (next === 0) { const idx = conditions.indexOf('exhaustion'); if(idx>=0) conditions.splice(idx,1); }
    await updateDoc(doc(db, "characters", charId), { conditions, exhaustionLevel: next });
    return;
  }

  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const conditions = [...(d.conditions||[])];
  const idx = conditions.indexOf(conditionId);
  const update = {};

  if (idx >= 0) {
    conditions.splice(idx, 1);
    if (conditionId === 'concentrating') {
      update.concentratingOn = null;
    }
  } else {
    conditions.push(conditionId);
  }
  update.conditions = conditions;
  await updateDoc(doc(db, "characters", charId), update);
};

window._breakConcentration = async (charId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const conditions = (d.conditions||[]).filter(c => c !== 'concentrating');
  await updateDoc(doc(db, "characters", charId), { conditions, concentratingOn: null });
};

// Concentration save check — simple maintain/lose dialog
window._triggerConcentrationCheck = (charId, damage, charData) => {
  const dc = Math.max(10, Math.floor(damage / 2));
  const conMod = mod(charData.stats?.con || 10);
  const pb = profBonus(totalLevel(charData));
  const hasCONprof = charData.saveProficiencies?.con;
  const totalBonus = conMod + (hasCONprof ? pb : 0);

  const content = document.getElementById('forgeContent');
  document.getElementById('forgeProgress').innerHTML = '<div class="progress-step active">🧠</div>';
  document.getElementById('forgePrev').style.visibility = 'hidden';
  document.getElementById('forgeNext').style.display = 'none';

  content.innerHTML = `
    <h3 class="step-title">🧠 Sauvegarde de Concentration</h3>
    <div class="info-box" style="margin-bottom:14px">
      <strong>${charData.name}</strong> subit <strong>${damage} dégâts</strong> en étant concentré sur <strong>${charData.concentratingOn||'un sort'}</strong>.<br><br>
      <strong>DD du jet de sauvegarde CON :</strong> ${dc}<br>
      <small style="color:#888">(= max(10, ${damage} ÷ 2))</small><br><br>
      <strong>Bonus de sauvegarde CON :</strong> +${totalBonus}<br>
      <small style="color:#888">(${conMod} CON${hasCONprof ? ' + '+pb+' maîtrise' : ''})</small>
    </div>
    <p style="font-size:0.88rem;color:#555;margin-bottom:14px;text-align:center">Lancez 1d20 + ${totalBonus} ≥ ${dc} pour maintenir la concentration.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-gold" style="flex:1;background:linear-gradient(135deg,#3a7a3a,#1a4e1a)" onclick="window._resolveConcentration('${charId}',true)">✓ Réussi — Maintenir</button>
      <button class="btn-gold" style="flex:1;background:linear-gradient(135deg,var(--red),#5a0000)" onclick="window._resolveConcentration('${charId}',false)">✗ Raté — Perdue</button>
    </div>`;

  document.getElementById('forgeOverlay').style.display = 'flex';
};

window._resolveConcentration = async (charId, maintained) => {
  if (!maintained) {
    await window._breakConcentration(charId);
  }
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
};

      <button class="btn-prev" style="margin-top:16px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">Fermer</button>`;
  });
  document.getElementById('forgeOverlay').style.display = 'flex';
};

window._openChargeManager = async (charId, chargeId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const charges = getCharacterCharges(d);
  const ch = charges.find(c => c.id === chargeId);
  if (!ch) return;

  const content = document.getElementById('forgeContent');
  document.getElementById('forgeProgress').innerHTML = `<div class="progress-step active">${ch.icon}</div>`;
  document.getElementById('forgePrev').style.visibility = 'hidden';
  document.getElementById('forgeNext').style.display = 'none';

  const infinite = ch.maxVal >= 999;

  let html = `<h3 class="step-title">${ch.icon} ${ch.name}</h3>`;
  html += `<div class="info-box" style="margin-bottom:14px">
    <strong>Classe :</strong> ${ch.className} (Niv.${ch.classLevel})<br>
    <strong>Charges :</strong> ${infinite?'Illimité':ch.remaining + ' / ' + ch.maxVal}<br>
    <strong>Récupération :</strong> ${ch.recharge==='short'?'Repos court':'Repos long'}
    ${ch.shortAtLvl?` (repos court à partir du niv.${ch.shortAtLvl})`:''}
    ${ch.condition?`<br><strong>État associé :</strong> ${CLASS_CONDITIONS.find(cc=>cc.id===ch.condition)?.name||ch.condition}`:''} 
  </div>`;

  if (!infinite) {
    html += `<div style="display:flex;gap:8px;margin-bottom:12px">`;
    // Use charge button (also activates condition if applicable)
    if (ch.remaining > 0) {
      html += `<button class="btn-gold" style="flex:1" onclick="window._useCharge('${charId}','${ch.id}','${ch.condition||''}')">Utiliser (${ch.remaining} restant${ch.remaining>1?'s':''})</button>`;
    } else {
      html += `<button class="btn-gold" style="flex:1;opacity:0.4" disabled>Aucune charge restante</button>`;
    }
    html += `<button class="btn-gold" style="flex:1;background:linear-gradient(135deg,#3a7a3a,#1a4e1a)" onclick="window._restoreCharge('${charId}','${ch.id}')">+1 Charge</button>`;
    html += `</div>`;
    html += `<button class="section-add-btn" onclick="window._resetCharge('${charId}','${ch.id}')">Restaurer toutes les charges</button>`;
  }

  // If there's an active condition, show deactivate button
  if (ch.condition && (d.conditions||[]).includes(ch.condition)) {
    const condName = CLASS_CONDITIONS.find(cc=>cc.id===ch.condition)?.name || ch.condition;
    html += `<div style="margin-top:12px;padding:10px;background:rgba(184,134,11,0.1);border-radius:4px;border-left:3px solid var(--gold)">
      <strong>${condName}</strong> est actif.
      <button class="section-add-btn" style="margin-left:8px" onclick="window._toggleCondition('${charId}','${ch.condition}');window._closeForge();document.getElementById('forgeNext').style.display=''">Désactiver</button>
    </div>`;
  }

  html += `<button class="btn-prev" style="margin-top:16px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">Fermer</button>`;
  content.innerHTML = html;
  document.getElementById('forgeOverlay').style.display = 'flex';
};

window._useCharge = async (charId, chargeId, conditionId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const usedCharges = { ...(d.usedCharges || {}) };
  usedCharges[chargeId] = (usedCharges[chargeId] || 0) + 1;
  const update = { usedCharges };

  // Activate class condition if applicable
  if (conditionId) {
    const conditions = [...(d.conditions || [])];
    if (!conditions.includes(conditionId)) conditions.push(conditionId);
    update.conditions = conditions;
  }

  await updateDoc(doc(db, "characters", charId), update);
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
};

window._restoreCharge = async (charId, chargeId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const usedCharges = { ...(d.usedCharges || {}) };
  usedCharges[chargeId] = Math.max(0, (usedCharges[chargeId] || 0) - 1);
  await updateDoc(doc(db, "characters", charId), { usedCharges });
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
};

window._resetCharge = async (charId, chargeId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const usedCharges = { ...(d.usedCharges || {}) };
  usedCharges[chargeId] = 0;
  await updateDoc(doc(db, "characters", charId), { usedCharges });
};

window._saveNewResource = async (catId) => {
  const name = document.getElementById('nr_name')?.value?.trim();
  if (!name) { alert("Le nom est obligatoire."); return; }
  const data = { name, source: document.getElementById('nr_source')?.value || 'Homebrew' };

  // Collect all nr_ fields
  document.querySelectorAll('[id^="nr_"]').forEach(el => {
    const key = el.id.replace('nr_', '');
    if (key === 'name' || key === 'source') return;
    const val = el.tagName === 'SELECT' ? el.value : (el.type === 'number' ? parseInt(el.value)||0 : el.value.trim());
    if (val !== '' && val !== 0) data[key] = val;
  });

  await addCustomResource(catId, data);
  window._closeForge();
  document.getElementById('forgeNext').style.display = '';
};

.spell-filter-label { font-family:'Cinzel'; font-size:0.6rem; color:var(--gold); letter-spacing:1px; margin-bottom:4px; }
.spell-filter-chips { display:flex; flex-wrap:wrap; gap:4px; }
.spell-filter-chip { padding:3px 10px; border:1px solid #d4c4a0; border-radius:14px; background:#fff; color:#666;
  font-family:'Crimson Pro'; font-size:0.78rem; cursor:pointer; transition:all 0.15s; }
.spell-filter-chip:hover { border-color:var(--gold); color:var(--ink); }
.spell-filter-chip.active { background:var(--gold); color:#fff; border-color:var(--gold); }
.spell-filter-chip.spell-filter-clear { background:transparent; border-style:dashed; color:#999; font-size:0.72rem; }
.spell-filter-chip.spell-filter-clear:hover { color:var(--red); border-color:var(--red); }
.spell-filter-row { display:flex; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
.spell-filter-select { width:100%; padding:4px 8px; border:1px solid #d4c4a0; border-radius:3px; font-family:'Crimson Pro';
  font-size:0.82rem; background:#fff; color:var(--ink); }
.spell-filter-toggles { display:flex; gap:6px; flex-wrap:wrap; }
.spell-filter-toggle { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border:1px solid #d4c4a0;
  border-radius:14px; background:#fff; font-family:'Crimson Pro'; font-size:0.78rem; color:#666; cursor:pointer; transition:all 0.15s; }
.spell-filter-toggle:hover { border-color:var(--gold); }
.spell-filter-toggle.active { background:var(--ink); color:var(--gold); border-color:var(--ink); }
.spell-filter-toggle input { display:none; }
.spell-filter-count { font-family:'Cinzel'; font-size:0.65rem; color:#888; text-align:right; margin-top:6px; letter-spacing:1px; }
.comp-card { background:#fff; border:1px solid #d4c4a0; border-left:4px solid var(--gold); border-radius:3px;
  display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:box-shadow 0.2s; }
.comp-card:hover { box-shadow:0 2px 12px rgba(0,0,0,0.12); }
.comp-card-main { padding:12px 16px; flex:1; }
.comp-card-name { font-family:'Cinzel'; font-size:0.92rem; color:var(--ink); }
.comp-card-sub { color:#888; font-size:0.78rem; margin-top:2px; }
.comp-homebrew { background:var(--gold); color:#fff; font-size:0.6rem; padding:1px 6px; border-radius:8px;
  font-family:'Cinzel'; letter-spacing:1px; vertical-align:middle; margin-left:6px; }
.comp-modified { background:#555; color:#fff; font-size:0.6rem; padding:1px 6px; border-radius:8px;
  font-family:'Cinzel'; letter-spacing:1px; vertical-align:middle; margin-left:6px; }
.comp-detail { margin:12px 0; }
.comp-detail-grid { display:flex; flex-direction:column; gap:1px; }
.comp-detail-row { display:flex; justify-content:space-between; padding:7px 10px; background:#fff8ee;
  border-bottom:1px solid #f0e8d8; font-size:0.88rem; }
.comp-detail-label { font-family:'Cinzel'; font-size:0.72rem; color:var(--gold); letter-spacing:1px; min-width:120px; }
.comp-detail-val { color:var(--ink); text-align:right; flex:1; }

/* ── Resource detail sheet (D&D style) ── */
.rd-sheet { background:#fff; border:1px solid #d4c4a0; border-top:4px solid var(--red); border-radius:0 0 4px 4px; padding:20px 22px; margin-bottom:8px; }
.rd-title { font-family:'Cinzel'; font-size:1.5rem; font-weight:700; color:var(--red); line-height:1.2; margin-bottom:2px; }
.rd-subtitle { font-family:'Crimson Pro'; font-style:italic; font-size:0.92rem; color:#666; margin-bottom:6px; }
.rd-separator { height:2px; background:linear-gradient(90deg, var(--red), transparent); margin:10px 0; border:none; opacity:0.5; }
.rd-props { margin:4px 0; }
.rd-prop { font-family:'Crimson Pro'; font-size:0.92rem; color:var(--ink); line-height:1.6; }
.rd-prop-label { font-weight:700; }
.rd-desc { font-family:'Crimson Pro'; font-size:0.92rem; color:#333; line-height:1.6; margin:8px 0; white-space:pre-line; }
.rd-block { margin:8px 0; }
.rd-block-title { font-family:'Cinzel'; font-size:0.8rem; color:var(--red); font-weight:600; margin-bottom:2px; letter-spacing:0.5px; }
.rd-block-text { font-family:'Crimson Pro'; font-size:0.88rem; color:#444; line-height:1.5; }
.rd-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; align-items:center; }
.rd-tag { background:var(--red); color:#fff; font-family:'Crimson Pro'; font-size:0.78rem; padding:3px 12px; border-radius:3px; }
.rd-source-tag { background:#f0e8d8; color:#888; font-family:'Crimson Pro'; font-size:0.75rem; font-style:italic; padding:3px 10px; border-radius:3px; border:1px solid #d4c4a0; }

/* Familier */
.familiar-card { background:#fdf8f0; border:1px solid #d4c4a0; border-radius:6px; padding:10px 12px; margin-top:4px; }
.familiar-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.familiar-name { font-family:'Cinzel'; font-size:0.95rem; font-weight:700; color:var(--red); }
.familiar-sub { font-family:'Crimson Pro'; font-size:0.8rem; color:#888; margin-top:1px; }
.familiar-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:8px; }
.familiar-stat { background:#fff; border:1px solid #e0d0b0; border-radius:4px; padding:4px 6px; text-align:center; font-size:0.82rem; }
.familiar-stat-label { display:block; font-family:'Cinzel'; font-size:0.62rem; color:#a89060; letter-spacing:0.5px; margin-bottom:2px; }
.familiar-detail { font-family:'Crimson Pro'; font-size:0.82rem; color:#444; margin-bottom:3px; }
.familiar-detail-label { font-weight:700; color:var(--red); }
.familiar-desc { font-family:'Crimson Pro'; font-size:0.82rem; color:#555; font-style:italic; margin-top:5px; line-height:1.5; }


/* Formes préparées */
.ws-info-bar { background:#fdf3e3; border:1px solid #f0c070; border-radius:4px; padding:6px 10px; font-family:'Crimson Pro'; font-size:0.82rem; color:#7a5500; margin-bottom:6px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.ws-info-sep { color:#c8a060; }
.ws-warn { background:#fff3e0; border-color:#e67e22; color:#c0392b; }
.form-known-list { }
.form-known-item { }
.form-cr-badge { font-family:'Cinzel'; font-size:0.62rem; color:#fff; background:var(--ink); border-radius:3px; padding:2px 6px; margin-right:8px; white-space:nowrap; min-width:36px; text-align:center; }
.form-over-cr .form-cr-badge { background:#e67e22; }
.form-over-cr { background:#fff8f0; }
.form-over-cr:hover { background:#fff0e0 !important; }
.form-pick-over-cr { border-left:3px solid #e67e22 !important; }

/* Responsive */
@media(max-width:1100px) {
  .sheet-body { grid-template-columns:240px 1fr 300px; }
}
@media(max-width:900px) {
  .sheet-body { grid-template-columns:1fr; }
  .sheet-col-left, .sheet-col-center { border-right:none; border-bottom:1px solid #d4c4a0; }
  .summary-grid { grid-template-columns:1fr; }
  .stats-grid { grid-template-columns:repeat(6,1fr); }
}
@media(max-width:600px) {
  .sheet-combat-row { gap:5px; }
  .combat-box { min-width:55px; padding:5px 8px; }
  .sheet-header-top { gap:10px; }
  .sheet-avatar, .sheet-avatar-placeholder { width:56px; height:56px; }
  .stats-grid { grid-template-columns:repeat(3,1fr); }
}
</style>
</head>
<body>
 
<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-title">GRIMOIRE</div>
    <div class="auth-sub">Compagnon de Campagne D&D 5e</div>
    <div id="authError"></div>
    <input id="authEmail" type="email" placeholder="Email">
    <input id="authPass" type="password" placeholder="Mot de passe">
    <button class="btn-gold" style="width:100%;margin-top:8px" onclick="window._doLogin()">SE CONNECTER</button>
    <button style="background:none;border:none;width:100%;color:#888;font-size:0.78rem;margin-top:10px;cursor:pointer;font-family:'Crimson Pro'" onclick="window._doSignup()">Pas encore de compte ? Créer un accès</button>
  </div>
</div>
 
<!-- APP -->
<div id="appScreen" style="display:none">
  <nav>
    <button id="navList" class="nav-active" onclick="_showTab('tab-list')">MES HÉROS</button>
    <button id="navSheet" onclick="_showTab('tab-sheet')">FICHE</button>
    <button id="navCompendium" onclick="_showTab('tab-compendium')">COMPENDIUM</button>
    <button id="navGM" onclick="_showTab('tab-gm')">MAÎTRE DU JEU</button>
    <button onclick="_doLogout()">QUITTER</button>
  </nav>
 
  <!-- Liste -->
  <div id="tab-list" class="tab-content active">
    <h2>Vos Chroniques</h2>
    <div id="charList"></div>
    <button class="btn-gold" style="margin-top:24px;width:100%;max-width:700px;display:block;margin-left:auto;margin-right:auto" onclick="window._openForge()">+ FORGER UN NOUVEAU HÉROS</button>
  </div>
 
  <!-- Fiche -->
  <div id="tab-sheet" class="tab-content">
    <div style="padding:40px;text-align:center;color:#888;font-style:italic">
      Sélectionne un personnage pour voir sa fiche
    </div>
  </div>
 
  <!-- Compendium -->
  <div id="tab-compendium" class="tab-content">
    <div class="comp-container">
      <h2>Compendium</h2>
      <div class="comp-cats" id="compCats"></div>
      <div class="comp-toolbar">
        <input id="compSearch" type="text" placeholder="Rechercher..." oninput="window._compFilter()">
        <div id="compSortControl" class="comp-sort-wrap" style="display:none"></div>
        <button class="btn-gold" onclick="window._openAddResource()">+ AJOUTER</button>
        <button class="section-add-btn" style="padding:8px 12px;font-size:0.65rem" onclick="window._resetCompendium()" title="Réinitialiser les données de base">↻ Reset</button>
      </div>
      <div id="compSpellFilters" style="display:none">
        <div id="compSpellFiltersInner" class="spell-filters-bar"></div>
      </div>
      <div id="compList" class="comp-list"></div>
    </div>
  </div>
 
  <!-- GM -->
  <div id="tab-gm" class="tab-content">
    <h2>Écran du Maître</h2>
    <div class="gm-search">
      <input id="gmSearchId" type="text" placeholder="Coller l'ID du personnage à surveiller">
      <button class="btn-gold" onclick="window._watchChar()">AJOUTER</button>
    </div>
    <div id="gmMonitor">
      <p style="color:#666;font-style:italic">Collez l'ID d'une fiche pour la surveiller en temps réel. Plusieurs personnages peuvent être affichés simultanément.</p>
    </div>
  </div>
</div>
 
<!-- WIZARD FORGE -->
<div id="forgeOverlay">
  <div class="forge-window">
    <div class="forge-top">
      <h2>⚔ La Forge du Héros</h2>
      <div id="forgeProgress" class="forge-progress"></div>
    </div>
    <div id="forgeContent"></div>
    <div class="forge-footer">
      <button id="forgePrev" class="btn-prev" onclick="window._wizardPrev()">← Précédent</button>
      <span id="forgeStepLabel" style="font-family:'Cinzel';font-size:0.7rem;color:#888;letter-spacing:1px"></span>
      <button id="forgeNext" class="btn-gold" onclick="window._wizardNext()">SUIVANT →</button>
    </div>
  </div>
</div>
 
</body>
</html>
