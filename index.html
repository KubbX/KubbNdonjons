// Type de lanceur par classe: full=1, half=0.5, third=0.334, pact=special, none=0
const CASTER_TYPE = {
  "Barde":"full","Clerc":"full","Druide":"full","Ensorceleur":"full","Magicien":"full",
  "Paladin":"half","Rôdeur":"half","Artificier":"half",
  "Occultiste":"pact",
  "Guerrier":"third","Roublard":"third",
  "Barbare":"none","Moine":"none"
};
// NB: Guerrier et Roublard ne sont "third" que s'ils ont la sous-classe Chevalier occulte / Escroc arcanique
function getCasterType(className, subclassName) {
  if (className === 'Guerrier' && subclassName === 'Chevalier occulte') return 'third';
  if (className === 'Roublard' && subclassName === 'Escroc arcanique') return 'third';
  if (className === 'Guerrier' || className === 'Roublard') return 'none';
  return CASTER_TYPE[className] || 'none';
}

// Calcul du niveau de lanceur multiclasse (PHB p.164)
function computeMulticlassCasterLevel(classes, subclasses) {
  let casterLevel = 0;
  let hasWarlock = false;
  let warlockLevel = 0;
  classes.forEach(c => {
    const ct = getCasterType(c.name, subclasses?.[c.name]);
    if (ct === 'full') casterLevel += c.level;
    else if (ct === 'half') casterLevel += Math.floor(c.level / 2);
    else if (ct === 'third') casterLevel += Math.floor(c.level / 3);
    else if (ct === 'pact') { hasWarlock = true; warlockLevel = c.level; }
  });
  return { casterLevel: Math.max(casterLevel, 0), hasWarlock, warlockLevel };
}

// Retourne les emplacements de sorts pour un personnage
function getSpellSlots(d) {
  const classes = getClasses(d);
  const subclasses = d.subclasses || {};
  if (classes.length === 0) return { slots: [], pactSlots: null };

  // Monoclass
  if (classes.length === 1) {
    const c = classes[0];
    const ct = getCasterType(c.name, subclasses[c.name]);
    if (ct === 'none') return { slots: [], pactSlots: null };
    if (ct === 'pact') {
      const ws = SPELL_SLOTS_WARLOCK[c.level] || [0,0];
      return { slots: [], pactSlots: { count: ws[0], level: ws[1] } };
    }
    if (ct === 'full') return { slots: SPELL_SLOTS_FULL[c.level] || [], pactSlots: null };
    if (ct === 'half') {
      const s = SPELL_SLOTS_HALF[c.level] || [];
      // Pad to 9 levels
      return { slots: [...s, ...Array(9 - s.length).fill(0)], pactSlots: null };
    }
    if (ct === 'third') {
      const effLvl = Math.max(1, Math.floor(c.level / 3));
      return { slots: SPELL_SLOTS_FULL[effLvl] || [], pactSlots: null };
    }
  }

  // Multiclass
  const { casterLevel, hasWarlock, warlockLevel } = computeMulticlassCasterLevel(classes, subclasses);
  let slots = casterLevel > 0 ? (SPELL_SLOTS_FULL[casterLevel] || []) : [];
  let pactSlots = null;
  if (hasWarlock) {
    const ws = SPELL_SLOTS_WARLOCK[warlockLevel] || [0,0];
    pactSlots = { count: ws[0], level: ws[1] };
  }
  return { slots, pactSlots };
}

// Compute charges for a character
function getCharacterCharges(d) {
  const classes = getClasses(d);
  const stats = d.stats || {};
  const charges = [];
  classes.forEach(c => {
    const defs = CLASS_CHARGES[c.name] || [];
    defs.forEach(ch => {
      const maxVal = typeof ch.max === 'function' ? ch.max(c.level, stats) : ch.max;
      if (maxVal <= 0) return;
      const used = d.usedCharges?.[ch.id] || 0;
      charges.push({ ...ch, maxVal, used, remaining: Math.max(0, maxVal - used), className: c.name, classLevel: c.level });
    });
  });
  return charges;
}

// ============================================================
// HELPERS MULTICLASSE
// ============================================================
function getClasses(d) {
  if (d.classes && d.classes.length) return d.classes;
  if (d.class) return [{ name: d.class, level: d.level || 1 }];
  return [];
}
function totalLevel(d) {
  return getClasses(d).reduce((sum, c) => sum + c.level, 0) || d.level || 1;
}
function classesDisplay(d) {
  const cls = getClasses(d);
  if (cls.length === 0) return d.class || '—';
  if (cls.length === 1) return cls[0].name;
  return cls.map(c => `${c.name} ${c.level}`).join(' / ');
}
function classesDisplayFull(d) {
  const cls = getClasses(d);
  if (cls.length === 0) return (d.class || '—') + ' Niv.' + (d.level || 1);
  return cls.map(c => `${c.name} ${c.level}`).join(' / ');
}
function buildHitDiceStr(d) {
  const cls = getClasses(d);
  if (cls.length === 0) return d.hitDice || '1d8';
  return cls.map(c => {
    const clData = CLASSES[c.name];
    return `${c.level}d${clData ? clData.hd : 8}`;
  }).join(' + ');
}

function renderWizardStep() {
  const win = document.getElementById('forgeWindow');
  const progressEl = document.getElementById('forgeProgress');
  const labels = ['Identité','Race','Classe','Caractéristiques','Finalisation'];
  progressEl.innerHTML = labels.map((l,i) => `<div class="progress-step ${i+1===wizardStep?'active':i+1<wizardStep?'done':''}">${i+1<wizardStep?'✓':i+1}</div>`).join('<div class="progress-line"></div>');
 
  const content = document.getElementById('forgeContent');
  content.innerHTML = '';
 
  if (wizardStep === 1) renderStep1(content);
  else if (wizardStep === 2) renderStep2(content);
  else if (wizardStep === 3) renderStep3(content);
  else if (wizardStep === 4) renderStep4(content);
  else if (wizardStep === 5) renderStep5(content);
 
  document.getElementById('forgePrev').style.visibility = wizardStep > 1 ? 'visible' : 'hidden';
  document.getElementById('forgeNext').textContent = wizardStep === WIZARD_STEPS ? '⚔ DONNER VIE' : 'SUIVANT →';
}

          <span class="pb-val" id="pb_${s}">${wizardData.stats[s]}</span>
          <button class="pb-btn" onclick="window._pbAdjust('${s}',1)">+</button>
          <span class="pb-mod">(mod: ${mod(wizardData.stats[s])>=0?'+':''}${mod(wizardData.stats[s])})</span>
        </div>`).join('')}
      </div>`;
  } else if(m === 'standard') {
    if(!wizardData.standardAssign) wizardData.standardAssign = {str:15,dex:14,con:13,int:12,wis:10,cha:8};
    const opts = [15,14,13,12,10,8];
    cont.innerHTML = `<p style="font-size:0.82em;color:#666">Assigner les valeurs standard à chaque caractéristique:</p>
      <div class="pb-grid">${['str','dex','con','int','wis','cha'].map(s=>`
        <div class="pb-row">
          <span class="pb-label">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]}</span>
          <select onchange="window._assignStandard('${s}',this.value)">
            ${opts.map(v=>`<option value="${v}" ${wizardData.standardAssign[s]==v?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>`).join('')}
      </div>`;
    wizardData.stats = {...wizardData.standardAssign};
  } else {
    cont.innerHTML = `<div class="pb-grid">${['str','dex','con','int','wis','cha'].map(s=>`
      <div class="pb-row">
        <span class="pb-label">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]}</span>
        <input type="number" min="1" max="20" value="${wizardData.stats[s]}" style="width:60px;text-align:center"
          onchange="window._manualStat('${s}',this.value)">
        <span class="pb-mod">(mod: ${mod(wizardData.stats[s])>=0?'+':''}${mod(wizardData.stats[s])})</span>
      </div>`).join('')}
    </div>`;
  }
};
 
window._pbAdjust = (stat, delta) => {
  const costs = {8:0,9:1,10:2,11:3,12:4,13:5,14:7,15:9};
  const cur = wizardData.stats[stat];
  const nv = Math.max(8, Math.min(15, cur + delta));
  const diff = (costs[nv]||0) - (costs[cur]||0);
  if(diff > 0 && wizardData.pointsLeft < diff) return;
  wizardData.stats[stat] = nv;
  wizardData.pointsLeft -= diff;
  document.getElementById(`pb_${stat}`).textContent = nv;
  document.getElementById('pbLeft').textContent = wizardData.pointsLeft;
};
window._assignStandard = (stat, val) => {
  wizardData.standardAssign[stat] = parseInt(val);
  wizardData.stats = {...wizardData.standardAssign};
};
window._manualStat = (stat, val) => { wizardData.stats[stat] = parseInt(val)||8; };

}
 
window._wizardPrev = () => {
  collectCurrentStep();
  wizardStep--;
  renderWizardStep();
};
 
window._wizardNext = async () => {
  collectCurrentStep();
  if(wizardStep === 1 && !wizardData.name) { alert("Donne un nom à ton héros !"); return; }
  if(wizardStep === 2 && !wizardData.race) { alert("Choisis une race !"); return; }
  if(wizardStep === 3 && !wizardData.class) { alert("Choisis une classe !"); return; }
 
  if(wizardStep < WIZARD_STEPS) {
    wizardStep++;
    renderWizardStep();
  } else {
    await saveNewCharacter();
  }
};
 
function collectCurrentStep() {
  if(wizardStep === 1) {
    wizardData.name = document.getElementById('w_name')?.value || '';
    wizardData.age = document.getElementById('w_age')?.value || '';
    wizardData.gender = document.getElementById('w_gender')?.value || '';
    wizardData.alignment = document.getElementById('w_alignment')?.value || '';
    wizardData.background = document.getElementById('w_background')?.value || '';
    wizardData.ideals = document.getElementById('w_ideals')?.value || '';
    wizardData.bonds = document.getElementById('w_bonds')?.value || '';
    wizardData.flaws = document.getElementById('w_flaws')?.value || '';
    wizardData.personality = document.getElementById('w_personality')?.value || '';
  } else if(wizardStep === 2) {
    wizardData.race = document.getElementById('w_race')?.value || '';
    wizardData.subrace = document.getElementById('w_subrace')?.value || '';
  } else if(wizardStep === 3) {
    wizardData.class = document.getElementById('w_class')?.value || '';
  } else if(wizardStep === 4) {
    wizardData.statMethod = document.getElementById('w_statMethod')?.value || 'pointbuy';
  } else if(wizardStep === 5) {
    wizardData.appearance = document.getElementById('w_appearance')?.value || '';
    wizardData.backstory = document.getElementById('w_backstory')?.value || '';
  }
}
 
async function saveNewCharacter() {
  const rKey = wizardData.race;
  const srKey = wizardData.subrace;
  const cKey = wizardData.class;
  const rData = RACES[rKey] || {};
  const srData = srKey && rData.subraces ? rData.subraces[srKey] : null;
  const clData = CLASSES[cKey] || { hd:8, saves:[], skills:[] };
 
  const raceBonuses = srData?.stats || rData.stats || {};
  const finalStats = {};
  ['str','dex','con','int','wis','cha'].forEach(s => {
    finalStats[s] = (wizardData.stats[s]||8) + (raceBonuses[s]||0);
  });
 
  const conMod = mod(finalStats.con);
  const hpMax = clData.hd + conMod + (srData?.hpBonus||0);
  const profBonusVal = 2;
 
  // Skills proficiencies
  const allSkillProf = [...(wizardData.classSkills||[])];
  if(wizardData.background && BACKGROUNDS[wizardData.background]) {
    BACKGROUNDS[wizardData.background].skills.forEach(s => { if(!allSkillProf.includes(s)) allSkillProf.push(s); });
  }
  const skillProf = {};
  allSkillProf.forEach(s => skillProf[s] = 'prof');
 
  const saves = {};
  clData.saves.forEach(s => saves[s] = true);
 
  const newChar = {
    owner: currentUid,
    // Identité
    name: wizardData.name,
    age: wizardData.age||'',
    gender: wizardData.gender||'',
    alignment: wizardData.alignment||'',
    background: wizardData.background||'',
    ideals: wizardData.ideals||'',
    bonds: wizardData.bonds||'',
    flaws: wizardData.flaws||'',
    personality: wizardData.personality||'',
    appearance: wizardData.appearance||'',
    backstory: wizardData.backstory||'',
    // Identité de classe/race
    race: rKey,
    subrace: srKey||'',
    class: cKey,
    classes: [{ name: cKey, level: 1 }],
    level: 1,
    xp: 0,
    // Stats
    stats: finalStats,
    // Combat
    hp: hpMax, hpMax,
    tmpHp: 0,
    ac: 10 + mod(finalStats.dex),
    speed: rData.speed||9,
    initiative: mod(finalStats.dex),
    profBonus: profBonusVal,
    hitDice: `1d${clData.hd}`,
    deathSaves: { success:0, fail:0 },
    // Sauvegardes
    saveProficiencies: saves,
    // Compétences
    skillProficiencies: skillProf,
    // Inventaire
    cp:0, sp:0, ep:0, gp:10, pp:0,
    equipment: clData.equipment||'',
    weapons: '',
    armor: '',
    // Sorts
    spellcaster: clData.spellcaster||false,
    spellAbility: clData.spellAbility||'',
    spellAttackBonus: clData.spellcaster ? (profBonusVal + mod(finalStats[clData.spellAbility]||8)) : 0,
    spellSaveDC: clData.spellcaster ? (8 + profBonusVal + mod(finalStats[clData.spellAbility]||8)) : 0,
    spells: {},
    // Traits
    features: (clData.features||[]).filter(f=>f.lvl<=1).map(f=>({name:f.name,desc:f.desc})),
    traits: [...(rData.traits||[]),...(srData?.traits||[])],
    // Méta
    inspiration: false,
    notes: '',
    createdAt: new Date().toISOString()
  };
 
  await addDoc(collection(db, "characters"), newChar);
  window._closeForge();
}

async function loadCharacterList() {
  const q = query(collection(db, "characters"), where("owner", "==", currentUid));
  onSnapshot(q, (snapshot) => {
    const list = document.getElementById('charList');
    list.innerHTML = '';
    if(snapshot.empty) {
      list.innerHTML = '<p style="color:#888;text-align:center;margin-top:30px">Aucun personnage. Crée ton premier héros !</p>';
      return;
    }
    snapshot.forEach(docSnap => {
      const d = docSnap.data();
      const tLvl = totalLevel(d);
      const card = document.createElement('div');
      card.className = 'char-card';
      card.innerHTML = `
        <div class="char-card-main" onclick="window._selectChar('${docSnap.id}')">
          <div style="display:flex;align-items:center;gap:12px">
            ${d.avatarUrl ? `<img src="${d.avatarUrl}" style="width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;flex-shrink:0">` : ''}
            <div>
              <div class="char-card-name">${d.name}</div>

            </div>
          </div>
        </div>
        <div class="char-card-id">

          <button class="btn-copy" onclick="navigator.clipboard.writeText('${docSnap.id}');this.textContent='✓ Copié'">Copier ID</button>

window._selectChar = (id) => {
  activeCharId = id;
  if(activeCharUnsubscribe) activeCharUnsubscribe();
  activeCharUnsubscribe = onSnapshot(doc(db, "characters", id), (snap) => {
    if(!snap.exists()) return;
    renderCharSheet(snap.id, snap.data());
  });
  window._showTab('tab-sheet');
};

function mod(score) { return Math.floor((score - 10) / 2); }
function fmtMod(score) { const m = mod(score); return (m>=0?'+':'')+m; }
function profBonus(level) { return PROF_BONUS[(level||1)-1] || 2; }

async function startInlineEdit(el, charId, charData) {
  if(el.querySelector('input,textarea')) return;
  const field = el.dataset.field;
  const type = el.dataset.type;
  const currentVal = getNestedVal(charData, field);
 
  let input;
  if(type === 'textarea') {
    input = document.createElement('textarea');
    input.rows = 3;
  } else {
    input = document.createElement('input');
    input.type = type==='number'?'number':'text';
  }
  input.value = type==='bool' ? (currentVal?'true':'false') : (currentVal||'');
  input.className = 'inline-input';
  const orig = el.innerHTML;
  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
 
  const save = async () => {
    let val = input.value;
    if(type==='number') val = parseFloat(val)||0;
    if(type==='bool') val = (val==='true'||val==='★'||val===true);
    const update = buildNestedUpdate(field, val);
    try { await updateDoc(doc(db, "characters", charId), update); } catch(e) { el.innerHTML = orig; }
  };
 
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if(e.key==='Enter' && type!=='textarea') { e.preventDefault(); input.blur(); } if(e.key==='Escape') { el.innerHTML = orig; } });
}
 
function getNestedVal(obj, path) {
  return path.split('.').reduce((o,k) => o?.[k], obj);
}
function buildNestedUpdate(field, val) {
  return { [field]: val };
}

function gatherLevelUpInfo(className, newClassLevel, charData) {
  const clData = CLASSES[className];
  if (!clData) return { baseFeatures:[], subclassFeatures:[], isAsiLevel:false, subclassLevel:false, subclassData:null };
  const baseFeatures = (clData.features||[]).filter(f => f.lvl === newClassLevel);
  const asiLevels = getAsiLevels(className);
  const isAsiLevel = asiLevels.includes(newClassLevel);
  const sc = SUBCLASSES[className];
  const subclassLevel = sc && newClassLevel === sc.level;
  const chosenSubclass = charData?.subclasses?.[className];
  let subclassFeatures = [];
  if (sc && chosenSubclass && sc.options[chosenSubclass]) {
    subclassFeatures = sc.options[chosenSubclass].features.filter(f => f.lvl === newClassLevel);
  }
  return { baseFeatures, subclassFeatures, isAsiLevel, subclassLevel, subclassData: sc };
}

window._openLevelUp = async (charId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const classes = getClasses(d);
  const tLvl = totalLevel(d);
  const content = document.getElementById('forgeContent');
  document.getElementById('forgeProgress').innerHTML = '<div class="progress-step active">\u2B06</div>';
  document.getElementById('forgePrev').style.visibility = 'hidden';
  document.getElementById('forgeNext').style.display = 'none';
  window._lvlupCharData = d;
  window._lvlupCharId = charId;

  let html = `<h3 class="step-title">\u2B06 Montée de niveau</h3>`;
  html += `<div class="info-box" style="margin-bottom:14px"><strong>${d.name}</strong> — Niveau total : <strong>${tLvl}</strong><br>Classes : <strong>${classesDisplayFull(d)}</strong>${d.xp !== undefined ? `<br>XP : ${d.xp||0} / ${XP_THRESHOLDS[tLvl]||'—'}` : ''}</div>`;
  html += `<div class="field-group"><label>Dans quelle classe monter ?</label><select id="lvlup_class" onchange="window._renderLevelUpDetails()">`;
  classes.forEach(c => { html += `<option value="${c.name}">${c.name} (niv.${c.level} \u2192 ${c.level+1})</option>`; });
  Object.keys(CLASSES).forEach(cl => { if (!classes.find(c => c.name === cl)) html += `<option value="${cl}">\u2694 MULTICLASSAGE : ${cl}</option>`; });
  html += `</select></div>`;
  html += `<div class="field-group"><label>Méthode PV</label><select id="lvlup_hp_mode" onchange="window._renderLevelUpDetails()"><option value="average">Moyenne</option><option value="max">Maximum</option><option value="roll">Lancer de dé</option></select></div>`;
  html += `<div id="lvlup_details"></div>`;
  html += `<div style="display:flex;gap:10px;margin-top:16px"><button class="btn-gold" onclick="window._confirmLevelUp('${charId}')">\u2713 CONFIRMER</button><button class="btn-prev" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">Annuler</button></div>`;
  content.innerHTML = html;
  document.getElementById('forgeOverlay').style.display = 'flex';
  window._renderLevelUpDetails();
};

  const hpMode = document.getElementById('lvlup_hp_mode')?.value || 'average';
  const clData = CLASSES[chosenClass]; if (!clData) return;
  const classes = getClasses(d);
  const existing = classes.find(c => c.name === chosenClass);
  const newClassLevel = existing ? existing.level + 1 : 1;
  const newTotalLevel = totalLevel(d) + 1;
  const newPB = PROF_BONUS[newTotalLevel - 1] || 2;
  const conMod = mod(d.stats?.con || 10);
  const isMulticlass = !existing;
  const info = gatherLevelUpInfo(chosenClass, newClassLevel, d);
  const sc = SUBCLASSES[chosenClass];

  let hpGain, hpText;
  if (hpMode === 'average') { hpGain = Math.ceil(clData.hd/2)+1+conMod; hpText = `${Math.ceil(clData.hd/2)+1}+${conMod}(CON) = <strong>${hpGain}</strong>`; }
  else if (hpMode === 'max') { hpGain = clData.hd+conMod; hpText = `${clData.hd}+${conMod}(CON) = <strong>${hpGain}</strong>`; }
  else { hpText = `1d${clData.hd}+${conMod}(CON) = <strong>aléatoire</strong>`; hpGain = null; }

  let html = `<div class="lvlup-section"><div class="lvlup-header">\uD83D\uDCCA Résumé</div><div class="lvlup-body">`;
  if (isMulticlass) html += `<div style="color:var(--gold);font-weight:600;margin-bottom:6px">\u2694 Nouveau multiclassage en ${chosenClass}</div>`;
  html += `<div class="lvlup-row"><span>Niveau total</span><strong>${totalLevel(d)} \u2192 ${newTotalLevel}</strong></div>`;
  html += `<div class="lvlup-row"><span>${chosenClass}</span><strong>Niv.${existing?existing.level:0} \u2192 ${newClassLevel}</strong></div>`;
  html += `<div class="lvlup-row"><span>Bonus maîtrise</span><strong>+${profBonus(totalLevel(d))} \u2192 +${newPB}</strong></div>`;
  html += `<div class="lvlup-row"><span>PV gagnés</span>${hpText}</div>`;
  html += `<div class="lvlup-row"><span>Dé de vie</span><strong>+1d${clData.hd}</strong></div></div></div>`;

  // Subclass selection
  if (info.subclassLevel && sc) {
    const already = d.subclasses?.[chosenClass];
    if (!already) {
      html += `<div class="lvlup-section"><div class="lvlup-header">\uD83C\uDFF0 ${sc.label}</div><div class="lvlup-body">`;
      html += `<p style="font-size:0.85rem;color:#666;margin-bottom:8px">Choisissez votre ${sc.label.toLowerCase()} :</p>`;
      html += `<select id="lvlup_subclass" onchange="window._updateSubclassPreview()"><option value="">— Choisir —</option>`;
      Object.keys(sc.options).forEach(o => { html += `<option value="${o}">${o}</option>`; });
      html += `</select><div id="subclass_preview" style="margin-top:8px"></div></div></div>`;
    }
  }
  // Existing subclass features for this level
  if (sc && d.subclasses?.[chosenClass] && !info.subclassLevel) {
    const subName = d.subclasses[chosenClass];
    const subFeats = sc.options[subName]?.features?.filter(f => f.lvl === newClassLevel) || [];
    if (subFeats.length) {
      html += `<div class="lvlup-section"><div class="lvlup-header">\uD83C\uDFF0 ${subName}</div><div class="lvlup-body">`;
      subFeats.forEach(f => { html += `<div class="lvlup-feature"><strong>${f.name}</strong><div class="lvlup-feature-desc">${f.desc}</div></div>`; });
      html += `</div></div>`;
    }
  }

  // Base class features
  if (info.baseFeatures.length) {
    html += `<div class="lvlup-section"><div class="lvlup-header">\u2694 Aptitudes de classe</div><div class="lvlup-body">`;
    info.baseFeatures.forEach(f => { html += `<div class="lvlup-feature"><strong>${f.name}</strong><div class="lvlup-feature-desc">${f.desc}</div></div>`; });
    html += `</div></div>`;
  }

  // ASI / Feat
  if (info.isAsiLevel) {
    html += `<div class="lvlup-section"><div class="lvlup-header">\u2B50 Amélioration / Don</div><div class="lvlup-body">`;
    html += `<select id="lvlup_asi_mode" onchange="window._toggleAsiMode()"><option value="asi">+2 à une carac. ou +1 à deux</option><option value="feat">Choisir un don</option></select>`;
    html += `<div id="asi_details" style="margin-top:10px"><div class="field-row">`;
    html += `<div class="field-group"><label>Caractéristique 1</label><select id="lvlup_asi_stat1"><option value="">—</option>`;
    ['str','dex','con','int','wis','cha'].forEach(s => { html += `<option value="${s}">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]} (${d.stats?.[s]||10})</option>`; });
    html += `</select></div><div class="field-group"><label>Bonus</label><select id="lvlup_asi_val1" onchange="document.getElementById('asi_row2').style.display=this.value==='1'?'grid':'none'"><option value="2" selected>+2</option><option value="1">+1 (et +1 autre)</option></select></div></div>`;
    html += `<div class="field-row" id="asi_row2" style="display:none"><div class="field-group"><label>Caractéristique 2</label><select id="lvlup_asi_stat2"><option value="">—</option>`;
    ['str','dex','con','int','wis','cha'].forEach(s => { html += `<option value="${s}">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]} (${d.stats?.[s]||10})</option>`; });
    html += `</select></div><div class="field-group"><label>&nbsp;</label><span style="padding-top:6px;display:block">+1</span></div></div></div>`;
    html += `<div id="feat_details" style="display:none;margin-top:10px">
      <div class="field-group"><label>Rechercher un don</label><input id="lvlup_feat_search" type="text" placeholder="Tapez pour filtrer..." oninput="window._filterFeatPicker()"></div>
      <div id="lvlup_feat_list" class="comp-list" style="max-height:35vh;overflow-y:auto"></div>
      <input type="hidden" id="lvlup_feat_name" value="">
      <input type="hidden" id="lvlup_feat_desc" value="">
      <div id="lvlup_feat_selected" style="margin-top:8px"></div>
    </div>`;
    html += `</div></div>`;
  }

  if (!info.baseFeatures.length && !info.subclassFeatures.length && !info.isAsiLevel && !info.subclassLevel) {
    html += `<div class="lvlup-section"><div class="lvlup-header">\uD83D\uDCCB Aptitudes</div><div class="lvlup-body"><em style="color:#888">Pas de nouvelle aptitude à ce niveau (vérifiez les emplacements de sorts).</em></div></div>`;
  }

  document.getElementById('lvlup_details').innerHTML = html;
};

window._updateSubclassPreview = () => {
  const chosen = document.getElementById('lvlup_subclass')?.value;
  const prev = document.getElementById('subclass_preview');
  if (!prev) return;
  const chosenClass = document.getElementById('lvlup_class')?.value;
  const sc = SUBCLASSES[chosenClass];
  if (!chosen || !sc?.options[chosen]) { prev.innerHTML = ''; return; }
  const classes = getClasses(window._lvlupCharData);
  const existing = classes.find(c => c.name === chosenClass);
  const newClassLevel = existing ? existing.level + 1 : 1;
  const feats = sc.options[chosen].features.filter(f => f.lvl === newClassLevel);
  const allFeats = sc.options[chosen].features;
  let html = '';
  if (feats.length) {
    html += feats.map(f => `<div class="lvlup-feature"><strong>${f.name}</strong><div class="lvlup-feature-desc">${f.desc}</div></div>`).join('');
  }
  html += `<details style="margin-top:8px"><summary style="cursor:pointer;font-size:0.78rem;color:var(--gold)">Voir toutes les aptitudes futures</summary>`;
  html += allFeats.filter(f=>f.lvl>newClassLevel).map(f => `<div style="font-size:0.8rem;margin:3px 0;color:#888"><strong>Niv.${f.lvl} — ${f.name}:</strong> ${f.desc}</div>`).join('');
  html += `</details>`;
  prev.innerHTML = html;
};

window._toggleAsiMode = () => {
  const mode = document.getElementById('lvlup_asi_mode')?.value;
  document.getElementById('asi_details').style.display = mode === 'asi' ? 'block' : 'none';
  document.getElementById('feat_details').style.display = mode === 'feat' ? 'block' : 'none';
  if (mode === 'feat') window._filterFeatPicker();
};

// Stockage des dons filtrés pour accès par index (évite les problèmes d'encodage dans les onclick)
window._featPickerData = [];

window._filterFeatPicker = () => {
  const q = (document.getElementById('lvlup_feat_search')?.value||'').toLowerCase();
  const allFeats = getAllResourcesForCategory('feat');
  const builtInFeats = (COMPENDIUM_DATA.feat || []);
  const feats = allFeats.length > 0 ? allFeats : builtInFeats;
  const filtered = q ? feats.filter(f => (f.name||'').toLowerCase().includes(q) || (f.desc||'').toLowerCase().includes(q)) : feats;
  window._featPickerData = filtered; // stocker la liste filtrée complète
  const list = document.getElementById('lvlup_feat_list');
  if (!list) return;
  const shown = filtered.slice(0, 30);
  list.innerHTML = shown.map((f, idx) => {
    return `<div class="comp-card feat-picker-card" data-feat-idx="${idx}" style="cursor:pointer">
      <div class="comp-card-main" style="pointer-events:none">
        <div class="comp-card-name">${f.name||'?'}</div>
        <div class="comp-card-sub">${f.prereq && f.prereq !== '—' ? 'Prérequis: '+f.prereq : 'Aucun prérequis'}${f.statBonus ? ' · <strong style="color:var(--gold)">+1 stat</strong>' : ''}</div>
      </div>
    </div>`;
  }).join('') || '<p style="color:#888;text-align:center;font-style:italic;margin:16px 0">Aucun don trouvé</p>';
  if (filtered.length > 30) list.innerHTML += `<p style="color:#888;text-align:center;font-size:0.78rem">${filtered.length - 30} dons supplémentaires — affinez votre recherche</p>`;
  // Délégation d'événement sur la liste
  list.onclick = (e) => {
    const card = e.target.closest('.feat-picker-card');
    if (!card) return;
    const idx = parseInt(card.dataset.featIdx);
    const feat = window._featPickerData[idx];
    if (feat) window._selectFeatForLevelUp(feat.name||'', feat.desc||'', feat.statBonus||null);
  };
};

window._selectFeatForLevelUp = (name, desc, statBonus) => {
  document.getElementById('lvlup_feat_name').value = name;
  document.getElementById('lvlup_feat_desc').value = desc;
  let bonus = null;
  if (statBonus && typeof statBonus === "object") bonus = statBonus;
  else if (typeof statBonus === "string" && statBonus !== "null") {
    try { bonus = JSON.parse(statBonus.replace(/&quot;/g,'"')); } catch(e) {}
  }
  const labelMap = {str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'};
  let html = `<div class="lvlup-feature" style="border-left-color:#4caf50"><strong>✓ ${name}</strong><div class="lvlup-feature-desc">${desc}</div></div>`;
  if (bonus) {
    if (bonus.choice) {
      html += `<div class="field-group" style="margin-top:8px"><label>Caractéristique +${bonus.val}</label><select id="lvlup_feat_stat">${bonus.choice.map(s=>`<option value="${s}">${labelMap[s]||s.toUpperCase()}</option>`).join('')}</select></div>`;
    } else if (bonus.stat) {
      html += `<div style="margin-top:4px;font-size:0.82rem;color:var(--gold)">+${bonus.val} ${labelMap[bonus.stat]||bonus.stat.toUpperCase()} (automatique)</div>`;
      html += `<input type="hidden" id="lvlup_feat_stat" value="${bonus.stat}">`;
    }
  }
  document.getElementById('lvlup_feat_selected').innerHTML = html;
  // Scroll to show selection
  document.getElementById('lvlup_feat_selected').scrollIntoView({behavior:'smooth',block:'nearest'});
};

window._confirmLevelUp = async (charId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const classes = getClasses(d);
  const chosenClass = document.getElementById('lvlup_class').value;
  const hpMode = document.getElementById('lvlup_hp_mode').value;
  const clData = CLASSES[chosenClass]; if (!clData) return;

  const newClasses = classes.map(c => ({...c}));
  const existing = newClasses.find(c => c.name === chosenClass);
  let newClassLevel;
  if (existing) { existing.level += 1; newClassLevel = existing.level; }
  else { newClasses.push({ name: chosenClass, level: 1 }); newClassLevel = 1; }
  const newTotalLevel = newClasses.reduce((s, c) => s + c.level, 0);
  const newPB = PROF_BONUS[newTotalLevel - 1] || 2;

  const conMod = mod(d.stats?.con || 10);
  let hpGain;
  if (hpMode === 'average') hpGain = Math.ceil(clData.hd/2)+1+conMod;
  else if (hpMode === 'max') hpGain = clData.hd+conMod;
  else hpGain = Math.floor(Math.random()*clData.hd)+1+conMod;
  hpGain = Math.max(1, hpGain);

  const info = gatherLevelUpInfo(chosenClass, newClassLevel, d);
  let newFeatures = info.baseFeatures.map(f => ({name:f.name, desc:f.desc, src:chosenClass, lvl:newClassLevel}));

  const newSubclasses = {...(d.subclasses || {})};
  const sc = SUBCLASSES[chosenClass];
  const subSel = document.getElementById('lvlup_subclass');
  if (subSel && subSel.value) {
    newSubclasses[chosenClass] = subSel.value;
    const subFeats = sc.options[subSel.value]?.features?.filter(f=>f.lvl===newClassLevel) || [];
    newFeatures.push(...subFeats.map(f=>({name:`${f.name} (${subSel.value})`,desc:f.desc,src:chosenClass,lvl:newClassLevel})));
  } else if (d.subclasses?.[chosenClass] && sc) {
    const subName = d.subclasses[chosenClass];
    const subFeats = sc.options[subName]?.features?.filter(f=>f.lvl===newClassLevel) || [];
    newFeatures.push(...subFeats.map(f=>({name:`${f.name} (${subName})`,desc:f.desc,src:chosenClass,lvl:newClassLevel})));
  }

  const newStats = {...(d.stats || {})};
  if (info.isAsiLevel) {
    const asiMode = document.getElementById('lvlup_asi_mode')?.value;
    if (asiMode === 'feat') {
      const fn = document.getElementById('lvlup_feat_name')?.value||'Don';
      const fd = document.getElementById('lvlup_feat_desc')?.value||'';
      newFeatures.push({name:`Don: ${fn}`,desc:fd,src:'Don',lvl:newClassLevel});
      // Apply stat bonus from feat if applicable
      const featStatEl = document.getElementById('lvlup_feat_stat');
      if (featStatEl && featStatEl.value) {
        const fStat = featStatEl.value;
        newStats[fStat] = Math.min(20, (newStats[fStat]||10) + 1);
      }
    } else {
      const s1 = document.getElementById('lvlup_asi_stat1')?.value;
      const v1 = parseInt(document.getElementById('lvlup_asi_val1')?.value)||2;
      if (s1) { newStats[s1] = Math.min(20,(newStats[s1]||10)+v1);
        if (v1===1) { const s2=document.getElementById('lvlup_asi_stat2')?.value; if(s2) newStats[s2]=Math.min(20,(newStats[s2]||10)+1); }
      }
      const desc = s1 ? `${s1.toUpperCase()} +${v1}${v1===1&&document.getElementById('lvlup_asi_stat2')?.value?', '+document.getElementById('lvlup_asi_stat2').value.toUpperCase()+' +1':''}` : 'Amélioration';
      newFeatures.push({name:'Amélioration de caractéristique',desc,src:chosenClass,lvl:newClassLevel});
    }
  }

  const hitDiceStr = newClasses.map(c=>`${c.level}d${(CLASSES[c.name]||{hd:8}).hd}`).join(' + ');
  const classDisplayStr = newClasses.length===1 ? newClasses[0].name : newClasses.map(c=>`${c.name} ${c.level}`).join(' / ');
  let spellUpdate = {};
  const casterClasses = newClasses.filter(c=>CLASSES[c.name]?.spellcaster);
  if (casterClasses.length>0) { const pc=casterClasses[0]; const pcD=CLASSES[pc.name];
    spellUpdate={spellcaster:true,spellAbility:pcD.spellAbility,spellAttackBonus:newPB+mod(newStats[pcD.spellAbility]||10),spellSaveDC:8+newPB+mod(newStats[pcD.spellAbility]||10)};
  }

  const update = {classes:newClasses,class:classDisplayStr,level:newTotalLevel,stats:newStats,
    hpMax:(d.hpMax||0)+hpGain,hp:(d.hp||0)+hpGain,profBonus:newPB,hitDice:hitDiceStr,
    features:[...(d.features||[]),...newFeatures],subclasses:newSubclasses,...spellUpdate};
  await updateDoc(doc(db,"characters",charId),update);

  const content = document.getElementById('forgeContent');
  content.innerHTML = `<h3 class="step-title">\u2713 Niveau augmenté !</h3><div class="info-box">
    <strong>${d.name}</strong> \u2192 <strong>${classDisplayStr}</strong> — Niv.${newTotalLevel}<br>
    PV: <strong>+${hpGain}</strong> (max: ${(d.hpMax||0)+hpGain})
    ${newFeatures.length?`<br><br><strong>Nouvelles aptitudes :</strong>${newFeatures.map(f=>`<div class="lvlup-feature" style="margin:4px 0"><strong>${f.name}:</strong> ${f.desc}</div>`).join('')}`:''}
  </div><button class="btn-gold" style="margin-top:16px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">FERMER</button>`;
  window._lvlupCharData = null;
};

let gmWatches = {};
 
window._watchChar = () => {
  const id = document.getElementById('gmSearchId').value.trim();
  if(!id) return;
  if(gmWatches[id]) return;
 
  const unsub = onSnapshot(doc(db, "characters", id), (snap) => {
    if(!snap.exists()) { alert("Fiche introuvable"); return; }
    renderGMCard(snap.id, snap.data());
  });
  gmWatches[id] = unsub;
};
 
window._removeGMWatch = (id) => {
  if(gmWatches[id]) { gmWatches[id](); delete gmWatches[id]; }
  const card = document.getElementById(`gm_${id}`);
  if(card) card.remove();
};
 
function renderGMCard(id, d) {
  const monitor = document.getElementById('gmMonitor');
  let card = document.getElementById(`gm_${id}`);
  const isNew = !card;
  if(isNew) {
    card = document.createElement('div');
    card.id = `gm_${id}`;
    card.className = 'gm-card';
    monitor.appendChild(card);
  }

  // Preserve notes state before re-render
  const existingNotesEl = document.getElementById(`gmnotes_${id}`);
  const preservedNotes = existingNotesEl ? existingNotesEl.value : null;
  const notesWasOpen = card.querySelector('.gm-notes-section')?.classList.contains('gm-notes-open');
  const hasNoteContent = preservedNotes ? preservedNotes.trim().length > 0 : (d.gmNotes||'').trim().length > 0;
  const shouldBeOpen = isNew ? hasNoteContent : (notesWasOpen || hasNoteContent);

  // Preserve HP input value
  const existingHpInput = document.getElementById(`gmhp_${id}`);
  const preservedHpVal = existingHpInput ? existingHpInput.value : '';

  const tLvl = totalLevel(d);
  const hpPct = Math.max(0, Math.min(100, Math.round((d.hp/d.hpMax)*100)));
  const hpColor = hpPct>60?'#4caf50':hpPct>30?'#ff9800':'#f44336';
  const pb = profBonus(tLvl);
  const stats = d.stats||{str:10,dex:10,con:10,int:10,wis:10,cha:10};
  const inspClass = d.inspiration ? 'gm-insp-active' : '';
 
  card.innerHTML = `
    <div class="gm-card-header">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        ${d.avatarUrl ? `<img src="${d.avatarUrl}" style="width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);object-fit:cover">` : ''}
        <div>
          <div class="gm-card-name">${d.name}</div>
          <div class="gm-card-sub">${d.subrace?d.subrace+' ':''}${d.race||'—'} · ${classesDisplayFull(d)} (Niv.${tLvl}) · ${d.alignment||'—'}</div>
        </div>
      </div>
      <button class="btn-remove" onclick="window._removeGMWatch('${id}')">✕</button>
    </div>
    <div class="gm-hp-bar-wrap">
      <div class="gm-hp-bar" style="width:${hpPct}%;background:${hpColor}"></div>
    </div>
    <div class="gm-stats-row">
      <div class="gm-stat"><span class="gm-stat-label">PV</span><span class="gm-stat-val" style="color:${hpColor}">${d.hp}/${d.hpMax}</span></div>
      <div class="gm-stat"><span class="gm-stat-label">PV tmp</span><span class="gm-stat-val">${d.tmpHp||0}</span></div>
      <div class="gm-stat"><span class="gm-stat-label">CA</span><span class="gm-stat-val">${d.ac}</span></div>
      <div class="gm-stat"><span class="gm-stat-label">Vit.</span><span class="gm-stat-val">${d.speed||9}m</span></div>
      <div class="gm-stat"><span class="gm-stat-label">Init.</span><span class="gm-stat-val">${fmtMod(stats.dex)}</span></div>
      <div class="gm-stat"><span class="gm-stat-label">BM</span><span class="gm-stat-val">+${pb}</span></div>
    </div>
    <div class="gm-chars-row">
      ${['str','dex','con','int','wis','cha'].map(s=>`
        <div class="gm-char"><div class="gm-char-lbl">${{str:'FOR',dex:'DEX',con:'CON',int:'INT',wis:'SAG',cha:'CHA'}[s]}</div>
        <div class="gm-char-val">${stats[s]||10}</div>
        <div class="gm-char-mod">${fmtMod(stats[s]||10)}</div></div>`).join('')}
    </div>
    <div class="gm-ds-row">
      <span>Mort: </span>
      ${[1,2,3].map(i=>`<span class="gm-ds ${(d.deathSaves?.success||0)>=i?'success':''}">✓</span>`).join('')}
      ${[1,2,3].map(i=>`<span class="gm-ds ${(d.deathSaves?.fail||0)>=i?'fail':''}">✗</span>`).join('')}
      <span class="gm-insp-btn ${inspClass}" style="margin-left:auto;cursor:pointer" onclick="window._toggleInspiration('${id}')">Inspiration: <strong>${d.inspiration?'★':'☆'}</strong></span>
    </div>
    <!-- Conditions on GM card -->
    <div class="gm-conditions">
      ${CONDITIONS.map(c => {
        const active = (d.conditions||[]).includes(c.id);
        return active ? `<span class="cond-badge cond-active ${c.id==='concentrating'?'cond-conc':''}" onclick="window._toggleCondition('${id}','${c.id}')" title="${c.name}">${c.icon}</span>` : '';
      }).join('')}
      ${(d.conditions||[]).length === 0 ? '<span style="color:#888;font-size:0.75rem;font-style:italic">Aucun état</span>' : ''}
      <button class="section-add-btn" style="margin-left:auto" onclick="window._openGMConditions('${id}')">± États</button>
    </div>
    ${(d.conditions||[]).includes('concentrating') && d.concentratingOn ? `
    <div class="gm-conc-banner">🧠 ${d.concentratingOn}</div>` : ''}
    <!-- Spell slots summary on GM card -->
    ${(()=>{
      const ss = getSpellSlots(d);
      const usedSlots = d.usedSpellSlots || {};
      if (!ss.slots.some(s=>s>0) && !ss.pactSlots) return '';
      let slotsHtml = '<div class="gm-spellslots">';
      ss.slots.forEach((max,i) => { if(max>0) { const used=usedSlots['s'+(i+1)]||0; slotsHtml += `<span class="gm-slot">N${i+1}: ${max-used}/${max}</span>`; }});
      if (ss.pactSlots) { const pu=usedSlots['pact']||0; slotsHtml += `<span class="gm-slot gm-slot-pact">P${ss.pactSlots.level}: ${ss.pactSlots.count-pu}/${ss.pactSlots.count}</span>`; }

window._gmHeal = async (id) => {
  const val = parseInt(document.getElementById(`gmhp_${id}`)?.value)||0;
  const snap = await getDoc(doc(db, "characters", id));
  if(!snap.exists()) return;
  const d = snap.data();
  const newHp = Math.min(d.hpMax, (d.hp||0) + Math.abs(val));
  await updateDoc(doc(db, "characters", id), {hp: newHp});
};
window._gmDamage = async (id) => {
  const val = Math.abs(parseInt(document.getElementById(`gmhp_${id}`)?.value)||0);
  if (val === 0) return;
  const snap = await getDoc(doc(db, "characters", id));
  if(!snap.exists()) return;
  const d = snap.data();
  let remaining = val;
  let tmpHp = d.tmpHp || 0;
  let hp = d.hp || 0;
  if (tmpHp > 0) {
    const absorbed = Math.min(tmpHp, remaining);
    tmpHp -= absorbed;
    remaining -= absorbed;
  }
  hp = Math.max(0, hp - remaining);
  await updateDoc(doc(db, "characters", id), { hp, tmpHp });

  // Concentration check
  if ((d.conditions||[]).includes('concentrating') && d.concentratingOn && val > 0) {
    window._triggerConcentrationCheck(id, val, d);
  }
};
window._saveGMNotes = async (id) => {

window._toggleSpellSlot = async (charId, levelOrPact, dotIndex, max) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const usedSlots = { ...(d.usedSpellSlots || {}) };
  const key = levelOrPact === 'pact' ? 'pact' : 's' + levelOrPact;
  const current = usedSlots[key] || 0;
  if (current > dotIndex) usedSlots[key] = dotIndex;
  else usedSlots[key] = dotIndex + 1;
  usedSlots[key] = Math.max(0, Math.min(max, usedSlots[key]));
  await updateDoc(doc(db, "characters", charId), { usedSpellSlots: usedSlots });
};

window._restoreAllSlots = async (charId) => {
  await updateDoc(doc(db, "characters", charId), { usedSpellSlots: {} });
};

window._removeSpell = async (charId, level, indexInLevel) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const spells = [...(d.known_spells || [])];
  let count = 0;
  for (let i = 0; i < spells.length; i++) {
    if (spells[i].level === level) {
      if (count === indexInLevel) { spells.splice(i, 1); break; }
      count++;
    }
  }
  await updateDoc(doc(db, "characters", charId), { known_spells: spells });
};

window._showSpellDetail = (charId, level, indexInLevel) => {

window._openCastSpell = (charId, level, indexInLevel) => {
  if (!window._currentSheetData) return;
  const d = window._currentSheetData;
  const spells = d.known_spells || [];
  const byLvl = {};
  spells.forEach(sp => { if(!byLvl[sp.level]) byLvl[sp.level]=[]; byLvl[sp.level].push(sp); });
  const sp = byLvl[level]?.[indexInLevel];
  if (!sp) return;

  const content = document.getElementById('forgeContent');
  document.getElementById('forgeProgress').innerHTML = '<div class="progress-step active">✨</div>';
  document.getElementById('forgePrev').style.visibility = 'hidden';
  document.getElementById('forgeNext').style.display = 'none';

  const ss = getSpellSlots(d);
  const usedSlots = d.usedSpellSlots || {};

  // Spell detail in rd-sheet style
  let html = `<div class="rd-sheet">${_renderSpellDetail(sp)}</div>`;

  // Cast section — cantrips don't use slots
  if (sp.level === 0) {
    html += `<div class="cast-section">
      <button class="btn-gold cast-btn" onclick="alert('Sort mineur lancé : ${sp.name.replace(/'/g,"\\'")} !');window._closeForge();document.getElementById('forgeNext').style.display=''">✨ Lancer (sort mineur — illimité)</button>
    </div>`;
  } else {
    html += `<div class="cast-section">
      <div class="cast-header">Lancer à quel niveau ?</div>
      <div class="cast-slots">`;

    for (let lvl = sp.level; lvl <= 9; lvl++) {
      const max = ss.slots[lvl-1] || 0;
      if (max === 0) continue;
      const used = usedSlots['s'+lvl] || 0;
      const remaining = max - used;
      const available = remaining > 0;
      html += `<button class="cast-slot-btn ${available?'':'cast-slot-empty'}" ${available?`onclick="window._castSpell('${charId}',${lvl},'s${lvl}','${sp.name.replace(/'/g,"\\'")}')"`:''}>
        <div class="cast-slot-lvl">Niv.${lvl}</div>
        <div class="cast-slot-remaining">${remaining}/${max}</div>
        ${lvl > sp.level ? '<div class="cast-slot-upcast">▲</div>' : ''}
      </button>`;
    }

    if (ss.pactSlots && ss.pactSlots.level >= sp.level) {
      const pUsed = usedSlots['pact'] || 0;
      const pRemaining = ss.pactSlots.count - pUsed;
      const pAvailable = pRemaining > 0;
      html += `<button class="cast-slot-btn cast-slot-pact ${pAvailable?'':'cast-slot-empty'}" ${pAvailable?`onclick="window._castSpell('${charId}',${ss.pactSlots.level},'pact','${sp.name.replace(/'/g,"\\'")}')"`:''}>
        <div class="cast-slot-lvl">Pacte (niv.${ss.pactSlots.level})</div>
        <div class="cast-slot-remaining">${pRemaining}/${ss.pactSlots.count}</div>
      </button>`;
    }

    html += `</div></div>`;
  }

  html += `<button class="btn-prev" style="margin-top:12px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">Annuler</button>`;
  content.innerHTML = html;
  document.getElementById('forgeOverlay').style.display = 'flex';
};

window._castSpell = async (charId, slotLevel, slotKey, spellName) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const usedSlots = { ...(d.usedSpellSlots || {}) };
  usedSlots[slotKey] = (usedSlots[slotKey] || 0) + 1;
  const update = { usedSpellSlots: usedSlots };

  // Check if spell requires concentration
  const knownSpells = d.known_spells || [];
  const sp = knownSpells.find(s => s.name === spellName);
  const isConcentration = sp && (sp.duration||'').toLowerCase().includes('concentration');
  let concMessage = '';

  if (isConcentration) {
    // If already concentrating, break previous concentration
    const conditions = [...(d.conditions||[])];
    if (!conditions.includes('concentrating')) conditions.push('concentrating');
    update.conditions = conditions;
    update.concentratingOn = spellName;
    concMessage = `<div style="color:#9b59b6;font-size:0.88rem;margin-top:8px">🧠 Concentration active sur ${spellName}</div>`;
    if ((d.conditions||[]).includes('concentrating') && d.concentratingOn) {
      concMessage += `<div style="color:#cc4444;font-size:0.82rem">Concentration sur ${d.concentratingOn} perdue</div>`;
    }
  }

  await updateDoc(doc(db, "characters", charId), update);
  
  const content = document.getElementById('forgeContent');
  content.innerHTML = `
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:2.5rem;margin-bottom:16px">✨</div>
      <h3 class="step-title" style="border:none">${spellName}</h3>
      <div style="font-size:1rem;color:var(--gold);margin:10px 0">Lancé au niveau ${slotLevel} !</div>
      <div style="font-size:0.85rem;color:#888">Emplacement ${slotKey === 'pact' ? 'de pacte' : 'niv.'+slotLevel} consommé</div>
      ${concMessage}
    </div>
    <button class="btn-gold" style="width:100%;margin-top:16px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">OK</button>`;
};

window._confirmShortRest = async (charId) => {
  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const classes = getClasses(d);
  const stats = d.stats || {};
  const conMod = mod(stats.con || 10);
  const update = {};

  // Calculate HP healed from hit dice
  let totalHealed = 0;
  const usedHitDice = { ...(d.usedHitDice || {}) };
  classes.forEach(c => {
    const el = document.getElementById('rest_hd_' + c.name.replace(/\s/g,'_'));
    const spent = parseInt(el?.value) || 0;
    if (spent > 0) {
      const clData = CLASSES[c.name];
      const hd = clData ? clData.hd : 8;
      for (let i = 0; i < spent; i++) {
        totalHealed += Math.max(1, Math.floor(Math.random() * hd) + 1 + conMod);
      }
      usedHitDice[c.name] = (usedHitDice[c.name] || 0) + spent;
    }
  });

  update.usedHitDice = usedHitDice;
  if (totalHealed > 0) {
    update.hp = Math.min(d.hpMax || 0, (d.hp || 0) + totalHealed);
  }

  // Occultiste: restore pact slots
  if (classes.some(c => c.name === 'Occultiste')) {
    const usedSlots = { ...(d.usedSpellSlots || {}) };
    delete usedSlots['pact'];
    update.usedSpellSlots = usedSlots;
  }

  // Restore short-rest charges
  const usedCharges = { ...(d.usedCharges || {}) };
  const allCharges = getCharacterCharges(d);
  allCharges.forEach(ch => {
    if (ch.recharge === 'short') usedCharges[ch.id] = 0;
    // Some abilities recharge on short rest starting at a certain level
    if (ch.shortAtLvl && ch.classLevel >= ch.shortAtLvl) usedCharges[ch.id] = 0;
  });
  update.usedCharges = usedCharges;

  // Remove class conditions (rage, wild shape end on rest)
  const conditions = (d.conditions||[]).filter(c => !CLASS_CONDITIONS.find(cc => cc.id === c));
  update.conditions = conditions;

  await updateDoc(doc(db, "characters", charId), update);

  // Count restored charges for display
  const restoredCharges = allCharges.filter(ch => ch.recharge === 'short' || (ch.shortAtLvl && ch.classLevel >= ch.shortAtLvl));

  const content = document.getElementById('forgeContent');
  content.innerHTML = `
    <div style="text-align:center;padding:30px 20px">
      <div style="font-size:2.5rem;margin-bottom:12px">☀</div>
      <h3 class="step-title" style="border:none">Repos court terminé</h3>
      ${totalHealed > 0 ? `<div style="color:#4caf50;font-size:1rem;margin:8px 0">+${totalHealed} PV récupérés</div>` : ''}
      ${classes.some(c=>c.name==='Occultiste') ? '<div style="color:#9b59b6;font-size:0.88rem">Emplacements de pacte restaurés</div>' : ''}
      ${restoredCharges.length ? `<div style="color:var(--gold);font-size:0.88rem;margin-top:4px">${restoredCharges.map(ch=>ch.icon+' '+ch.name).join(', ')} restauré(s)</div>` : ''}
    </div>
    <button class="btn-gold" style="width:100%;margin-top:16px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">OK</button>`;
};

window._doLongRest = async (charId) => {
  if (!confirm("Effectuer un repos long ?\n\nEffets :\n• PV restaurés au maximum\n• PV temporaires remis à 0\n• Tous les emplacements de sorts restaurés\n• Moitié des dés de vie récupérés (minimum 1)\n• Jets de mort réinitialisés\n• Aptitudes de repos long rechargées")) return;

  const snap = await getDoc(doc(db, "characters", charId));
  if (!snap.exists()) return;
  const d = snap.data();
  const classes = getClasses(d);

  const update = {};

  // Restore HP to max
  update.hp = d.hpMax || 0;

  // Remove temp HP
  update.tmpHp = 0;

  // Restore all spell slots
  update.usedSpellSlots = {};

  // Reset death saves
  update.deathSaves = { success: 0, fail: 0 };

  // Restore all class charges
  update.usedCharges = {};

  // Remove class conditions (rage, wild shape, etc.)
  const conditions = (d.conditions||[]).filter(c => !CLASS_CONDITIONS.find(cc => cc.id === c));
  // Also remove concentration
  const concIdx = conditions.indexOf('concentrating');
  if (concIdx >= 0) conditions.splice(concIdx, 1);
  update.conditions = conditions;
  update.concentratingOn = null;

  // Recover half of total hit dice (minimum 1)
  const totalHitDice = classes.reduce((s, c) => s + c.level, 0);
  const recover = Math.max(1, Math.floor(totalHitDice / 2));
  const usedHitDice = { ...(d.usedHitDice || {}) };
  let toRecover = recover;
  // Recover proportionally across classes
  for (const c of classes) {
    const used = usedHitDice[c.name] || 0;
    const recoverThis = Math.min(used, toRecover);
    usedHitDice[c.name] = used - recoverThis;
    toRecover -= recoverThis;
    if (toRecover <= 0) break;
  }
  update.usedHitDice = usedHitDice;

  await updateDoc(doc(db, "characters", charId), update);

  const content = document.getElementById('forgeContent');
  document.getElementById('forgeProgress').innerHTML = '<div class="progress-step active">🌙</div>';
  document.getElementById('forgePrev').style.visibility = 'hidden';
  document.getElementById('forgeNext').style.display = 'none';

  content.innerHTML = `
    <div style="text-align:center;padding:30px 20px">
      <div style="font-size:2.5rem;margin-bottom:12px">🌙</div>
      <h3 class="step-title" style="border:none">Repos long terminé</h3>
      <div style="font-size:0.92rem;color:#555;line-height:1.6;margin-top:12px">
        <div style="color:#4caf50">✓ PV restaurés au maximum (${d.hpMax||0})</div>
        <div style="color:#4caf50">✓ Tous les emplacements de sorts restaurés</div>
        <div style="color:#4caf50">✓ ${recover} dé(s) de vie récupéré(s)</div>
        <div style="color:#4caf50">✓ Jets de mort réinitialisés</div>
        <div style="color:#888">✓ PV temporaires retirés</div>
      </div>
    </div>
    <button class="btn-gold" style="width:100%;margin-top:16px" onclick="window._closeForge();document.getElementById('forgeNext').style.display=''">OK</button>`;
  document.getElementById('forgeOverlay').style.display = 'flex';
};

    {name:"Arme sacrée",level:1,school:"Évocation",time:"1 action bonus",range:"Contact",duration:"1 round",components:"V",classes:["Paladin"],desc:"Dépenser un emplacement: +2d8 radiant ou nécrotique sur la prochaine touche.",source:"PHB"},
    {name:"Armure d'Agathys",level:1,school:"Abjuration",time:"1 action",range:"Soi-même",duration:"1 heure",components:"V, S, M",classes:["Occultiste"],desc:"5 PV temporaires. Quiconque frappe en mêlée subit 5 dégâts de froid. +5/niveau.",source:"PHB"},
    {name:"Armure de mage",level:1,school:"Abjuration",time:"1 action",range:"Contact",duration:"8 heures",components:"V, S, M",classes:["Ensorceleur","Magicien"],desc:"CA de la cible = 13 + mod DEX (sans armure).",source:"PHB"},
    {name:"Baies nourricières",level:1,school:"Transmutation",time:"1 action",range:"Contact",duration:"24 heures",components:"V, S, M",classes:["Druide","Rôdeur"],desc:"Créer jusqu'à 10 baies magiques: chacune soigne 1 PV et nourrit pour 1 journée.",source:"PHB"},
    {name:"Bénédiction",level:1,school:"Enchantement",time:"1 action",range:"9m",duration:"Concentration, 1 minute",components:"V, S, M",classes:["Clerc","Paladin"],desc:"Jusqu'à 3 cibles: +1d4 aux jets d'attaque et de sauvegarde. +1 cible/niveau.",source:"PHB"},
    {name:"Blessure",level:1,school:"Nécromancie",time:"1 action",range:"Contact",duration:"Instantanée",components:"V, S",classes:["Clerc"],desc:"Attaque de contact: 1d12 nécrotique. +1d12/niveau (max 7d12).",source:"PHB"},
    {name:"Bouclier",level:1,school:"Abjuration",time:"1 réaction",range:"Soi-même",duration:"1 round",components:"V, S",classes:["Artificier","Ensorceleur","Magicien"],desc:"+5 CA jusqu'au début du prochain tour. Annule Projectile magique.",source:"PHB"},
    {name:"Bouclier de la foi",level:1,school:"Abjuration",time:"1 action bonus",range:"18m",duration:"Concentration, 10 minutes",components:"V, S, M",classes:["Clerc","Paladin"],desc:"+2 CA à une créature.",source:"PHB"},
    {name:"Catapulte",level:1,school:"Transmutation",time:"1 action",range:"18m",duration:"Instantanée",components:"S",classes:["Artificier","Ensorceleur","Magicien"],desc:"Choisissez un objet pesant de 500 g à 2,5 kg à portée et qui n'est ni porté ni transporté. L'objet vole en ligne droite jusqu'à 27 mètres dans une direction que vous choisissez avant de tomber au sol, s'arrêtant plus tôt s'il rencontre une surface solide. Si l'objet va frapper une créature, cette créature doit faire un jet de sauvegarde de Dextérité. En cas d'échec à la sauvegarde, l'objet frappe la cible et arrête sa course. Lorsque l'objet heurte quelque chose, l'objet et ce qu'il frappe subissent chacun 3d8 dégâts contondants. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 2 ou supérieur, le poids maximal de l'objet que vous pouvez cibler avec ce sort augmente de 2,5 kg et les dégâts augmentent de 1d8 pour chaque niveau d'emplacement au-delà du niveau 1."},
    {name:"Cérémonie",level:1,school:"Abjuration",time:"1 heure (rituel)",range:"Contact",duration:"Instantanée",components:"V, S, M (eau bénite 25 po)",classes:["Clerc","Paladin"],desc:"Vous réalisez une cérémonie religieuse qui est imprégnée de magie. Lorsque vous lancez ce sort, choisissez l'un des rites suivants, la cible devant se trouver à 3 mètres ou moins de vous durant tout le temps d'incantation. Expiation. Vous touchez une créature consentante dont l'alignement a changé et faites un jet de Sagesse (Intuition) DD 20. En cas de réussite, vous restaurez l'alignement original de la cible. Eau bénite. Vous touchez une fiole d'eau et celle-ci devient de l'eau bénite. Passage à l'âge adulte. Vous touchez un humanoïde suffisamment âgé pour être un jeune adulte. Pendant les prochaines 24 heures, lorsque la cible effectue un jet de caractéristique, elle peut lancer un d4 et ajouter le résultat au jet de caractéristique. Une créature ne peut bénéficier de ce rite qu'une seule fois. Dévouement. Vous touchez un humanoïde qui souhaite se mettre au service de votre dieu. Pendant les prochaines 24 heures, lorsque la cible effectue un jet de sauvegarde, elle peut lancer un d4 et ajouter le résultat au jet de sauvegarde. Une créature ne peut bénéficier de ce rite qu'une seule fois. Rite funéraire. Vous touchez un cadavre et pendant les 7 prochains jours, la cible ne peut pas devenir un mort-vivant par aucun autre moyen que le sort souhait. Mariage. Vous touchez des humanoïdes adultes prêts à s'unir par les liens du mariage. Pour les 7 prochains jours, chaque cible gagne un bonus de +2 à la CA tant qu'ils sont à 9 mètres ou moins l'un de l'autre. Une créature ne peut bénéficier de nouveau de ce rite que si elle est veuve."},
    {name:"Charme-personne",level:1,school:"Enchantement",time:"1 action",range:"9m",duration:"1 heure",components:"V, S",classes:["Barde","Druide","Ensorceleur","Magicien","Occultiste"],desc:"Vous pouvez tenter de charmer un humanoïde que vous pouvez voir à portée. Ce dernier doit effectuer un jet de sauvegarde de Sagesse, avec un avantage à son jet si vous ou vos compagnons le combattez. En cas d'échec, il est charmé jusqu'à la fin de la durée du sort ou jusqu'à ce que vous ou vos compagnons cherchiez à lui nuire. La créature charmée vous considère comme un bon ami. Quand le sort prend fin, la créature sait que vous l'avez charmée. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 2 ou supérieur, vous pouvez cibler une créature supplémentaire pour chaque niveau d'emplacement au-delà du niveau 1. Les créatures doivent se trouver à 9 mètres maximum les unes des autres lorsque vous les ciblez."},
    {name:"Châtiment aveuglant",level:1,school:"Évocation",time:"1 action bonus",range:"Soi-même",duration:"Concentration, 1 minute",components:"V",classes:["Paladin"],desc:"La prochaine fois que vous touchez une créature avec une attaque au corps à corps avec une arme durant la durée du sort, votre arme rayonne d'une vive lumière, et l'attaque inflige à la cible 3d8 dégâts radiants supplémentaires. De plus, la cible doit réussir un jet de sauvegarde de Constitution sous peine d'être aveuglée jusqu'à la fin du sort. Une créature aveuglée par ce sort effectue un nouveau jet de sauvegarde de Constitution à la fin de chacun de ses tours. Sur un jet de sauvegarde réussi, elle n'est plus aveuglée."},
    {name:"Châtiment calcinant",level:1,school:"Évocation",time:"1 action bonus",range:"Soi-même",duration:"Concentration, 1 minute",components:"V",classes:["Paladin"],desc:"La prochaine fois que vous touchez une créature avec une attaque au corps à corps avec une arme pendant la durée du sort, votre arme est chauffée à blanc, et votre attaque inflige 1d6 dégâts de feu supplémentaires à la cible et l'enflamme. Au début de chacun de ses tours jusqu'à la fin du sort, la cible doit effectuer un jet de sauvegarde de Constitution. En cas d'échec, elle subit 1d6 dégâts de feu. En cas de réussite, le sort prend fin. Si la cible, ou une créature située à 1,50 mètre d'elle, utilise son action pour étouffer les flammes, ou si tout autre effet éteint les flammes (par exemple si la cible se plonge dans l'eau), le sort prend fin. Aux niveaux supérieurs. Si vous lancez ce sort en utilisant un emplacement de sort de niveau 2 ou supérieur, les dégâts supplémentaires initiaux infligés par l'attaque augmentent de 1d6 pour chaque niveau d'emplacement au-delà du niveau 1."},
    {name:"Châtiment courroucé",level:1,school:"Évocation",time:"1 action bonus",range:"Soi-même",duration:"1 round",components:"V",classes:["Paladin"],desc:"La prochaine fois que vous touchez une cible lors d'une attaque au corps à corps avec une arme pendant la durée du sort, votre attaque inflige 1d6 dégâts psychiques supplémentaires. De plus, si la cible est une créature, elle doit réussir un jet de sauvegarde de Sagesse ou être effrayée jusqu'à la fin du sort. Par une action, la créature peut effectuer un jet de Sagesse contre le DD de sauvegarde de votre sort pour mettre un terme à cet effet et au sort."},
    {name:"Châtiment débilitant",level:1,school:"Nécromancie",time:"1 action bonus",range:"Soi-même",duration:"Concentration, 1 minute",components:"V",classes:["Paladin"],desc:"La prochaine fois que vous touchez une créature lors d'une attaque au corps à corps avec une arme pendant la durée du sort, votre arme frappe à la fois le corps et l'esprit de la cible, et lui inflige 4d6 dégâts psychiques supplémentaires. La cible doit effectuer un jet de sauvegarde de Sagesse. En cas d'échec, elle a un désavantage à ses jets d'attaque et à ses jets de caractéristique, et ne peut utiliser de réaction, jusqu'à la fin de son prochain tour."},
    {name:"Châtiment du ban",level:1,school:"Abjuration",time:"1 action bonus",range:"Soi-même",duration:"Concentration, 1 minute",components:"V",classes:["Paladin"],desc:"La prochaine fois que vous touchez une créature avec une attaque avec une arme avant que ce sort ne prenne fin, votre arme crépite avec force, votre attaque infligeant 5d10 dégâts de force supplémentaires à la cible. De plus, si cette attaque réduit la cible à 50 points de vie ou moins, vous la bannissez. Si la cible est native d'un autre plan d'existence que celui sur lequel vous vous trouvez, la cible disparaît, retournant sur son plan d'origine. Si la cible est native du plan d'existence sur lequel vous êtes, la créature est envoyée sur un demi-plan non-dangereux. Tant qu'elle s'y trouve, la cible est incapable d'agir. Elle y reste jusqu'à ce que le sort prenne fin, puis la cible réapparaît à l'endroit qu'elle avait quitté ou à l'espace inoccupé le plus proche si cet espace est déjà occupé."},
    {name:"Châtiment révélateur",level:1,school:"Divination",time:"1 action bonus",range:"Soi-même",duration:"Concentration, 1 minute",components:"V",classes:["Paladin"],desc:"La prochaine fois que vous touchez une créature lors d'une attaque avec une arme avant que le sort ne prenne fin, votre arme rayonne d'une lueur astrale au moment de l'impact. L'attaque inflige 2d6 dégâts radiants supplémentaires à la cible, qui devient visible si elle était invisible, et la cible émet une lumière faible dans un rayon de 1,50 mètre et ne peut devenir invisible tant que le sort persiste. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 3 ou supérieur, les dégâts supplémentaires augmentent de 1d6 pour chaque niveau d'emplacement au-delà du niveau 2."},
    {name:"Châtiment tonitruant",level:1,school:"Évocation",time:"1 action bonus",range:"Soi-même",duration:"Concentration, 1 minute",components:"V",classes:["Paladin"],desc:"La première fois que vous touchez une cible lors une attaque au corps à corps avec une arme pendant que le sort est actif, votre arme résonne tel un tonnerre audible à 90 mètres à la ronde, et l'attaque inflige 2d6 dégâts de tonnerre supplémentaires à la cible. De plus, si la cible est une créature, elle doit réussir un jet de sauvegarde de Force sous peine d'être repoussée de vous sur 3 mètres puis de tomber à terre."},
    {name:"Collet",level:1,school:"Abjuration",time:"1 action",range:"Contact",duration:"8 heures",components:"S, M (filin de métal)",classes:["Rôdeur"],desc:"Lorsque vous lancez ce sort, vous utilisez la corde pour créer un cercle de 1,50 mètre de rayon au sol. Une fois le sort lancé, la corde disparaît et le cercle devient un piège magique. Le piège est presque invisible et demande un jet d'Intelligence (Investigation) réussi contre le DD de sauvegarde de votre sort pour être décelé. Le piège se déclenche lorsqu'une créature de taille P, M ou G marche sur le sol dans le rayon du sort. Cette créature doit réussir un jet de sauvegarde de Dextérité ou bien être magiquement hissée dans les airs, pour se retrouver pendue la tête à l'envers à 90 cm au-dessus du sol. La créature est entravée jusqu'à ce que le sort se termine. Une créature entravée peut effectuer un jet de sauvegarde de Dextérité à la fin de chacun de ses tours, mettant fin à l'effet sur elle-même en cas de réussite. La créature ou quelqu'un d'autre qui peut l'atteindre peut aussi utiliser son action pour effectuer un jet d'Intelligence (Arcanes) contre le DD de sauvegarde de votre sort. En cas de réussite, l'effet d'entrave prend fin. Après le déclenchement du piège, le sort se termine lorsque le piège ne retient plus aucune créature."},
    {name:"Communication avec les animaux",level:1,school:"Divination",time:"1 action (rituel)",range:"Soi-même",duration:"10 minutes",components:"V, S",classes:["Barde","Druide","Rôdeur"],desc:"Vous gagnez la capacité de comprendre et de communiquer verbalement (ou oralement) avec des bêtes pour la durée du sort. Les connaissances et la compréhension de nombreuses bêtes sont limitées par leur intelligence, mais au minimum, elles peuvent vous communiquer des informations sur les alentours et les bêtes à proximité, incluant tout ce qu'elles peuvent percevoir ou ont perçu au cours des derniers jours. Vous devriez être capable de convaincre une bête de vous rendre un petit service, à la discrétion du MD."},
    {name:"Compréhension des langues",level:1,school:"Divination",time:"1 action (rituel)",range:"Soi-même",duration:"1 heure",components:"V, S, M",classes:["Barde","Ensorceleur","Magicien","Occultiste"],desc:"Pendant la durée du sort, vous comprenez la signification littérale de toute langue parlée que vous pouvez entendre. Vous comprenez également tout langage écrit que vous pouvez voir, mais vous devez toucher la surface sur laquelle les mots sont inscrits. Il faut une minute pour lire une page de texte. Ce sort ne décode pas les messages secrets dans un texte ou un glyphe, tel qu'un symbole magique, qui ne fait pas partie du langage écrit."},
    {name:"Couleurs dansantes",level:1,school:"Illusion",time:"1 action",range:"Soi-même (cône 4,5m)",duration:"1 round",components:"V, S, M",classes:["Barde","Ensorceleur","Magicien"],desc:"Un assortiment éblouissant de faisceaux lumineux et colorés fait éruption de votre main. Lancez 6d10. Cette valeur représente le nombre maximal de points de vie des créatures que vous pouvez affecter avec ce sort. Les créatures dans un cône de 4,50 mètres dont vous êtes l'origine sont affectées selon l'ordre croissant de leurs points de vie (en ignorant les créatures inconscientes et celles qui ne peuvent pas voir). En partant de la créature avec le plus petit nombre de points de vie, chaque créature affectée par ce sort est aveuglée jusqu'à la fin de votre prochain tour. Retirez les points de vie de chaque créature avant de passer à la prochaine créature avec le plus petit nombre de points de vie. Les points de vie d'une créature doivent être égaux ou inférieurs au total pour que cette créature soit affectée. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 2 ou supérieur, ajoutez 2d10 au lancer initial pour chaque niveau d'emplacement au-delà du niveau 1."},
    {name:"Coup de tonnerre",level:1,school:"Évocation",time:"1 action",range:"Soi-même (4,5m)",duration:"Instantanée",components:"V",classes:["Barde","Druide","Ensorceleur","Magicien","Rôdeur"],desc:"Vous créez un bruit de tonnerre qui peut être entendu jusqu'à 30 mètres. Hormis vous-même, toute créature à portée doit réussir un jet de sauvegarde de Constitution ou subir 1d6 dégâts de tonnerre. Les dégâts de ce sort augmentent de 1d6 lorsque vous atteignez le niveau 5 (2d6), le niveau 11 (3d6) et le niveau 17 (4d6)."},
    {name:"Création ou destruction d'eau",level:1,school:"Transmutation",time:"1 action",range:"9m",duration:"Instantanée",components:"V, S, M",classes:["Clerc","Druide"],desc:"Soit vous créez, soit vous détruisez de l'eau. Création d'eau. Vous créez jusqu'à 40 litres d'eau pure dans un contenant ouvert à portée. Vous pouvez sinon choisir de faire tomber l'eau sous forme de pluie dans un cube de 9 mètres d'arête à portée, éteignant ainsi les flammes non protégées de la zone. Destruction d'eau. Vous détruisez jusqu'à 40 litres d'eau présente dans un contenant ouvert à portée. Sinon, vous pouvez choisir de supprimer le brouillard dans un cube de 9 mètres d'arête à portée. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 2 ou supérieur, vous créez ou détruisez 40 litres d'eau supplémentaires, ou augmentez la taille du cube de 1,50 mètre d'arête, pour chaque niveau d'emplacement au-delà du niveau 1."},
    {name:"Déguisement",level:1,school:"Illusion",time:"1 action",range:"Soi-même",duration:"1 heure",components:"V, S",classes:["Artificier","Barde","Ensorceleur","Magicien"],desc:"Modifier son apparence (corps, vêtements, équipement) jusqu'à 30cm. Investigation DD 13+niv.",source:"PHB"},

    {name:"Bourrasque",level:2,school:"Évocation",time:"1 action",range:"Soi-même (18m ligne)",duration:"Concentration, 1 minute",components:"V, S, M",classes:["Druide","Ensorceleur","Magicien"],desc:"Ligne de vent 18m×1,5m: repousse créatures (JdS FOR), disperse gaz/brouillard, dévie projectiles.",source:"PHB"},
    {name:"Bouche magique",level:2,school:"Illusion",time:"1 minute (rituel)",range:"9m",duration:"Jusqu'au déclenchement",components:"V, S, M (miel 10 po)",classes:["Artificier","Barde","Magicien"],desc:"Message déclenché par une condition (jusqu'à 25 mots, mimé par une bouche magique).",source:"PHB"},
    {name:"Carquois magique",level:2,school:"Transmutation",time:"1 action bonus",range:"Contact",duration:"1 heure",components:"V, S, M",classes:["Artificier","Barde","Rôdeur"],desc:"Vous transmutez votre carquois pour qu'il produise constamment des munitions non magiques qui semblent voler jusqu'à votre main lorsque vous en avez besoin. À chacun de vos tours avant que le sort ne prenne fin, vous pouvez utiliser votre action bonus pour effectuer deux attaques avec une arme qui utilise les munitions de ce carquois. Chaque fois que vous effectuez une attaque à distance, votre carquois remplace magiquement la munition que vous venez d'utiliser par une nouvelle munition similaire non magique. Chaque munition créée par ce sort est détruite lorsque le sort prend fin. Si le carquois n'est plus en votre possession, le sort prend fin."},
    {name:"Cécité/Surdité",level:2,school:"Nécromancie",time:"1 action",range:"9m",duration:"1 minute",components:"V",classes:["Barde","Clerc","Ensorceleur","Magicien"],desc:"Vous pouvez aveugler ou assourdir un ennemi. Choisissez une créature que vous pouvez voir dans la portée du sort. Celle-ci doit réussir un jet de sauvegarde de Constitution sans quoi elle est soit aveuglée, soit assourdie (selon votre choix) pour la durée du sort. À la fin de chacun de ses tours, la cible effectue un jet de sauvegarde de Constitution. En cas de réussite, le sort prend fin. Aux niveaux supérieurs. Lorsque vous lancez ce sort en utilisant un emplacement de sort de niveau 3 ou supérieur, vous pouvez cibler une créature supplémentaire pour chaque niveau d'emplacement au-delà du niveau 2."},
    {name:"Communication à distance",level:3,school:"Évocation",time:"1 action",range:"Soi-même",duration:"1 round",components:"V, S, M",classes:["Barde","Clerc","Druide","Ensorceleur","Magicien","Occultiste"],desc:"Vous faites parvenir un court message de 25 mots ou moins à une créature avec laquelle vous êtes familier. La créature entend le message dans son esprit. Elle vous reconnaît en tant qu'émetteur si elle vous connaît. Et elle peut répondre immédiatement, de la même manière. Le sort permet aux créatures ayant au moins 1 en Intelligence de comprendre le sens du message. Vous pouvez envoyer le message sans égard à la distance, voire sur d'autres plans d'existence. Si la cible est sur un plan différent du vôtre, le message a 5 % de chance de ne pas arriver au destinataire."},
    {name:"Cordon de flèches",level:2,school:"Transmutation",time:"1 action",range:"Contact",duration:"Jusqu'à 6 coups ou 6 heures",components:"V, S, M (carquois de flèches)",classes:["Rôdeur"],desc:"Vous plantez quatre pièces de munition non magiques (flèches ou carreaux d'arbalète) dans le sol à portée et y apposez votre magie pour qu'elles protègent la zone. Jusqu'à la fin du sort, à chaque fois qu'une autre créature que vous arrive à 9 mètres ou moins des munitions, pour la première fois du tour, ou termine son tour dans ces 9 mètres, une pièce de munition s'envole pour la frapper. La créature doit réussir un jet de sauvegarde de Dextérité ou subir 1d6 dégâts perforants. La pièce de munition est ensuite détruite. La sort se termine lorsqu'il ne reste plus de munition. Lorsque vous lancez ce sort, vous pouvez désigner toutes les créatures que vous souhaitez pour que le sort les ignore. Aux niveaux supérieurs. Si vous lancez ce sort en utilisant un emplacement de sort de niveau 3 ou supérieur, le nombre de munitions qui peuvent être affectées augmente de deux pour chaque niveau d'emplacement au-delà du niveau 2."},
    {name:"Corde enchantée",level:2,school:"Transmutation",time:"1 action",range:"18m",duration:"1 heure",components:"V, S, M",classes:["Magicien"],desc:"Vous touchez une longueur de corde de 18 mètres maximum. Une extrémité de la corde se dresse alors et monte dans les airs de sorte que toute la longueur de la corde soit verticale par rapport au sol. À l'extrémité supérieure de la corde, une entrée invisible vers un espace extradimensionnel s'ouvre et reste en place pour toute la durée du sort. L'espace extradimensionnel peut être atteint en grimpant tout en haut de la corde. L'espace peut contenir jusqu'à huit créatures de taille M ou inférieure. La corde peut être tirée dans l'espace extradimensionnel, elle disparaît alors de la vue de ceux qui se trouvent à l'extérieur de l'espace extradimensionnel. Les attaques et les sorts ne peuvent pas traverser l'entrée de l'espace extradimensionnel, qu'ils viennent de l'intérieur ou de l'extérieur, mais ceux qui se trouvent dans l'espace extradimensionnel peuvent voir à l'extérieur comme s'il y avait une fenêtre de 90 cm x 1,50 m centrée sur la corde. Tout ce qui se trouve dans l'espace extradimensionnel en tombe lorsque le sort prend fin."},
    {name:"Croissance d'épines",level:2,school:"Transmutation",time:"1 action",range:"45m",duration:"Concentration, 10 minutes",components:"V, S, M",classes:["Druide"],desc:"Le sol, sur un rayon de 6 mètres centré sur un point dans la portée du sort, se retourne et fait germer des épines rigides et des ronces. La zone devient un terrain difficile pour la durée du sort. Lorsqu'une créature entre ou se déplace dans la zone, elle subit 2d4 dégâts perforants pour chaque 1,50 mètre de déplacement. La transformation du sol est camouflée afin de paraître naturelle. Toute créature qui ne voit pas la zone lorsque le sort est incanté doit réussir un jet de Sagesse (Perception) contre le DD de sauvegarde de votre sort, sans quoi elle ne reconnait pas la nature dangereuse du terrain avant d'y pénétrer."},

    {name:"Aura de vitalité",level:3,school:"Évocation",time:"1 action",range:"Soi-même (9m)",duration:"Concentration, 1 minute",components:"V",classes:["Paladin"],desc:"Aura 9m: action bonus pour soigner 2d6 PV à une créature dans l'aura, une fois par tour.",source:"PHB"},
